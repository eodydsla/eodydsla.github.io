# FastAPI + Next.js + Tailwind + shadcn/ui 실습 교재

예제 20개를 순서대로 따라가며 **웹 서비스 한 개를 처음부터 배포까지** 만들어 봅니다.

**완전 생초보 기준입니다.** 프로그래밍을 해본 적이 없어도 따라올 수 있게 썼습니다.

- 모르는 단어가 나오면 **그 자리에서 설명합니다.** "당연히 알겠지"로 넘어가지 않습니다.
- 코드는 **한 줄씩 무슨 뜻인지** 풀어 씁니다.
- 명령어는 **어디서 어떻게 치는지**까지 적습니다.
- 파이썬·자바스크립트 문법을 모른다면 [부록 A](A-python-basics.md)·[부록 B](B-js-basics.md)를
  먼저 보세요. **이 교재를 따라가는 데 필요한 만큼만** 담았습니다.

> 이미 다른 언어로 개발해 본 분이라면 설명이 조금 장황하게 느껴질 수 있습니다.
> 굵게 표시된 부분과 코드만 따라가셔도 됩니다.

---

## 이 4개가 각각 뭘 하는 건데?

```
   [ 브라우저 ]
        │  사람이 보는 화면
        ▼
 ┌──────────────────────────────────┐
 │  Next.js (+ React)               │  ← 화면을 만든다
 │   ├ React      : 화면 조각(컴포넌트)  │
 │   ├ Tailwind   : 그 조각에 색·여백    │
 │   └ shadcn/ui  : 잘 만들어진 조각 모음 │
 └──────────────────────────────────┘
        │  fetch("http://127.0.0.1:8000/notes")
        │  ↕ JSON 으로 대화
        ▼
 ┌──────────────────────────────────┐
 │  FastAPI (Python)                │  ← 데이터를 다룬다
 └──────────────────────────────────┘
        │
        ▼
 ┌──────────────────────────────────┐
 │  PostgreSQL (예제 13부터)          │  ← 데이터를 저장한다
 └──────────────────────────────────┘
```

한 문장 요약:

| 이름 | 한 줄 정의 | 없으면? |
|---|---|---|
| **FastAPI** | 파이썬으로 API 서버를 만드는 도구 | 데이터를 주고받을 창구가 없음 |
| **React** | 화면을 "컴포넌트" 단위로 조립하는 라이브러리 | HTML을 손으로 다 갱신해야 함 |
| **Next.js** | React에 라우팅·서버렌더링·빌드를 붙인 프레임워크 | 페이지 구조를 직접 다 만들어야 함 |
| **Tailwind CSS** | `class="p-4 text-lg"` 처럼 클래스로 스타일링 | 별도 CSS 파일을 계속 오가야 함 |
| **shadcn/ui** | 버튼·모달 같은 완성된 컴포넌트를 **내 코드로 복사**해 줌 | 버튼 하나도 직접 만들어야 함 |

> **shadcn/ui는 라이브러리가 아닙니다.** `npm install` 로 설치해서 가져다 쓰는 게 아니라,
> 소스 코드를 내 프로젝트 폴더에 **복사해 넣는** 방식입니다. 그래서 마음대로 뜯어고칠 수 있습니다.
> 이게 왜 중요한지는 예제 02에서 직접 확인합니다.

## 학습 순서 — 예제 20개

**반드시 순서대로** 하세요. 뒤 예제는 앞 예제의 결과물을 이어받습니다.
5부로 나뉘어 있고, 각 부가 끝날 때마다 "쓸 만한 것"이 하나씩 완성됩니다.

### 0부. 시작 전에 — 문법이 아예 처음이라면

프로그래밍 경험이 있다면 **건너뛰어도 됩니다.** 나중에 모르는 문법이 나올 때 돌아와도 됩니다.
**[00. 준비물 설치](00-setup.md)를 먼저 끝내고** 오세요. 파이썬이 있어야 부록 A를 실습할 수 있습니다.

| # | 제목 | 난이도 | 새로 배우는 것 |
|---|---|---|---|
| **A** | [파이썬 최소 문법](A-python-basics.md) | – | 변수, 자료형, `if`/`for`, 함수, 리스트·딕셔너리, 타입 힌트 |
| **B** | [JS·TS 최소 문법](B-js-basics.md) | – | 변수, 화살표 함수, `.map()`, 객체, `async/await`, 타입 |

> 문법책 한 권을 다 볼 필요는 없습니다. **이 교재에 나오는 것만** 담았습니다.
> 두 부록의 마지막 문제는 **같은 문제를 두 언어로** 풀게 되어 있어서, 차이가 한눈에 보입니다.

### 1부. 기초 — 화면과 서버가 대화하기까지

| # | 제목 | 난이도 | 새로 배우는 것 |
|---|---|---|---|
| **00** | [준비물 설치](00-setup.md) | – | Git·Docker·VS Code, 가상환경, 폴더 규약 |
| **01** | [Hello FastAPI](01-fastapi-hello.md) | ★ | 라우트, 경로/쿼리 파라미터, `/docs` 자동 문서 |
| **02** | [Hello Next.js + shadcn/ui](02-nextjs-shadcn.md) | ★ | App Router, Tailwind, 컴포넌트 복사해 오기 |
| **03** | [둘을 연결한다](03-connect.md) | ★★ | CORS, 환경변수, 서버 컴포넌트에서 `fetch` |
| **04** | 폼 다루기 — 계산기 | ★★ | 클라이언트 컴포넌트, `useState`, 제어 컴포넌트 |
| **05** | 메모장 CRUD (메모리 저장) | ★★ | Pydantic 모델, POST/PATCH/DELETE, `APIRouter` |

### 4부. 마지막 20% — 여기서부터는 "고급"

여기까지 오면 일반적인 프로그램은 혼자 만들 수 있습니다.

```

  ├──────────── 기초 80% ────────────┤        ├─ 20% ─┤

## 5. ★ PowerShell 실행 정책 (Windows 최대 함정)

파이썬 가상환경을 켜려고 하면 이런 에러가 나는 경우가 아주 많습니다:

```
.\.venv\Scripts\Activate.ps1 : 이 시스템에서 스크립트를 실행할 수 없으므로 ...
파일을 로드할 수 없습니다.
```

Windows가 기본적으로 스크립트 실행을 막아 두었기 때문입니다. **미리 풀어 둡시다:**

```powershell
Set-ExecutionPolicy -ExecutionPolicy RemoteSigned -Scope CurrentUser
```

`Y` 를 입력하고 Enter. 확인:

```powershell
Get-ExecutionPolicy -Scope CurrentUser
```

`RemoteSigned` 가 나오면 됩니다.

> **이게 위험한가요?** `RemoteSigned` 는 "내가 직접 만든 스크립트는 실행 허용,
> 인터넷에서 받은 스크립트는 서명이 있어야 허용"입니다. 개발자에게 표준적인 설정입니다.
> `-Scope CurrentUser` 라서 내 계정에만 적용되고, 관리자 권한도 필요 없습니다.

## 7. 파이썬 가상환경 연습해 보기

가상환경(virtual environment)은 **프로젝트 전용 파이썬 서랍**입니다.
프로젝트마다 필요한 패키지가 다르고 버전도 충돌하기 때문에, 폴더별로 따로 담아 둡니다.

한번 연습해 봅시다:

```powershell
cd D:\Work\클로드_정리\temp\practice
mkdir venv-test
cd venv-test

# 1) 가상환경 만들기 (.venv 폴더가 생깁니다)
python -m venv .venv

# 2) 켜기
.\.venv\Scripts\Activate.ps1
```

성공하면 프롬프트 **맨 앞에 `(.venv)`** 가 붙습니다:

```
(.venv) PS D:\Work\클로드_정리\temp\practice\venv-test>
```

**이 `(.venv)` 표시가 이 교재에서 가장 중요한 신호입니다.**
이게 없는데 `pip install` 을 하면 엉뚱한 곳에 설치됩니다.

끄는 방법:

```powershell
deactivate
```

연습이 끝났으면 지웁니다:

```powershell
cd ..
Remove-Item -Recurse -Force venv-test
```

### 가상환경 3줄 요약

| 상황 | 명령 |
|---|---|
| 처음 한 번 만들 때 | `python -m venv .venv` |
| **터미널을 열 때마다** | `.\.venv\Scripts\Activate.ps1` |
| 끝낼 때 | `deactivate` |

> 터미널을 새로 열면 `(.venv)` 는 사라집니다. **매번 켜 줘야 합니다.**
> "분명 설치했는데 `ModuleNotFoundError`" 의 90%가 이것입니다.

## 8. 터미널 2개 쓰기

예제 03부터는 **백엔드와 프론트엔드를 동시에** 띄웁니다.
터미널 하나로는 안 되고, 두 개가 필요합니다.

| 터미널 | 하는 일 | 주소 |
|---|---|---|
| 1번 | `fastapi dev main.py` | http://127.0.0.1:8000 |
| 2번 | `npm run dev` | http://localhost:3000 |

VS Code에서는 터미널 패널 오른쪽의 **`+` 버튼**으로 두 번째 터미널을 엽니다.
(분할 아이콘을 쓰면 나란히 볼 수 있어 편합니다.)

### 포트가 이미 쓰이고 있을 때

```
ERROR: [Errno 10048] error while attempting to bind on address
```

이전에 띄운 서버가 안 꺼진 것입니다. 범인을 찾아 없앱니다:

```powershell
# 8000번 포트를 쓰는 프로세스 번호(PID) 찾기
Get-NetTCPConnection -LocalPort 8000 -State Listen | Select-Object OwningProcess

# 그 번호로 종료 (아래 1234 자리에 위에서 나온 숫자)
Stop-Process -Id 1234 -Force
```

3000번 포트도 숫자만 바꿔서 똑같이 합니다.

> Next.js는 3000번이 막혀 있으면 **알아서 3001로 옮겨 갑니다.**
> 터미널에 찍히는 주소를 항상 확인하세요.

## 0. 먼저: 코드를 어디에 치나요?

두 가지 방법이 있습니다. 이 부록에서는 **둘 다** 씁니다.

### 방법 1. 대화형 셸 — 한 줄씩 실험할 때

PowerShell에서 `python` 만 치면 됩니다.

```powershell
python
```

```
Python 3.12.10 ...
>>>
```

`>>>` 가 보이면 "쳐 보세요"라는 뜻입니다. 한 줄 치고 Enter 하면 **바로 결과가 나옵니다.**

```
>>> 1 + 2
3
>>> "안녕" + "하세요"
'안녕하세요'
```

빠져나올 땐 `exit()` 를 치거나 `Ctrl + Z` 후 Enter.

> 이 부록에서 `>>>` 로 시작하는 줄은 **`>>>` 를 빼고** 입력하세요.
> 그 아래 줄은 파이썬이 출력한 결과입니다.

### 방법 2. 파일로 저장해서 실행 — 진짜 프로그램

`hello.py` 같은 파일을 만들고:

```python
print("안녕하세요")
```

```powershell
python hello.py
```

교재 본문(예제 01~)에서는 **전부 방법 2**를 씁니다.

## 1. print — 화면에 찍어 보기

```python
print("안녕하세요")
print(1 + 2)
print("답:", 42)
```

```
안녕하세요
3
답: 42
```

**`print` 는 초보의 가장 강력한 무기입니다.** 코드가 이상하게 돌 때
중간중간 `print` 를 넣어서 "여기까진 왔나?", "이 값이 뭐지?"를 확인하세요.
경력자도 이렇게 디버깅합니다.

## 2. 변수 — 값에 이름 붙이기

```python
name = "철수"
age = 20

print(name)   # 철수
print(age)    # 20
```

`=` 는 "같다"가 아니라 **"넣어라"** 입니다. 오른쪽 값을 왼쪽 이름에 담습니다.

```python
count = 1
count = count + 1   # 오른쪽을 먼저 계산(1+1=2) → count 에 넣음
print(count)        # 2
```

### `#` 은 주석

`#` 뒤는 파이썬이 무시합니다. 사람에게 남기는 메모입니다.

```python
# 이 줄은 실행되지 않습니다
age = 20   # 이렇게 코드 뒤에 붙여도 됩니다
```

### 이름 짓는 규칙

| 규칙 | 예 |
|---|---|
| 영문·숫자·`_` 만 (숫자로 시작 못 함) | `user_name` (O), `2name` (X) |
| 대소문자 구분 | `name` 과 `Name` 은 **다른 변수** |
| 파이썬은 `소문자_밑줄` 방식을 씁니다 | `user_name` (O), `userName` (△) |

> 자바스크립트는 `userName` 방식을 씁니다(부록 B).
> 같은 프로젝트인데 백엔드와 프론트엔드의 이름 규칙이 다른 건 정상입니다.

## 3. 자료형 — 값의 종류

| 종류 | 이름 | 예 |
|---|---|---|
| 문자열 | `str` | `"안녕"`, `'hello'` |
| 정수 | `int` | `42`, `-7`, `0` |
| 실수 | `float` | `3.14`, `1.75` |
| 참/거짓 | `bool` | `True`, `False` |
| 없음 | `NoneType` | `None` |

```python
>>> type(42)
<class 'int'>
>>> type("42")
<class 'str'>
```

**`42` 와 `"42"` 는 완전히 다릅니다.** 이게 예제 01의 핵심 주제입니다.

```python
>>> 42 + 1
43
>>> "42" + "1"      # 문자열끼리 + 는 이어붙이기
'421'
>>> "42" + 1        # 종류가 달라서 안 됩니다
TypeError: can only concatenate str (not "int") to str
```

### 형 변환

```python
>>> int("42") + 1
43
>>> str(42) + "살"
'42살'
>>> float("1.75")
1.75
```

> 주소창으로 들어오는 값은 **전부 문자열**입니다. `?a=3` 의 `3` 도 사실 `"3"` 이죠.
> 그래서 원래는 `int()` 로 직접 바꿔 줘야 하는데, **FastAPI가 이걸 대신해 줍니다.**
> 예제 01에서 확인합니다.

### `True` / `False` / `None` 은 대문자로 시작

```python
is_done = True
result = None      # "아직 값이 없다"는 뜻
```

## 4. 문자열 다루기

### 이어붙이기와 f-string

```python
name = "철수"

print("안녕, " + name + "님")     # 이어붙이기 — 번거롭습니다
print(f"안녕, {name}님")          # f-string — 이걸 씁니다
```

**f-string**: 따옴표 앞에 **`f`** 를 붙이면, `{ }` 안의 변수가 값으로 바뀝니다.

```python
>>> a = 3
>>> b = 4
>>> f"{a} + {b} = {a + b}"
'3 + 4 = 7'
```

`{ }` 안에는 계산식도 넣을 수 있습니다. 교재 전체에서 계속 씁니다.

### 자주 쓰는 문자열 기능

```python
>>> "안녕하세요".replace("안녕", "반가워")
'반가워하세요'
>>> "  공백  ".strip()          # 앞뒤 공백 제거
'공백'
>>> len("안녕하세요")            # 길이
5
>>> "에디슨" in "천재는 에디슨이 말했다"   # 포함되어 있나?
True
```

마지막 `in` 은 예제 03의 검색 기능에서 씁니다.

## 5. 리스트 — 여러 개를 순서대로

```python
fruits = ["사과", "바나나", "포도"]

print(fruits[0])    # 사과   ← ★ 0부터 셉니다
print(fruits[1])    # 바나나
print(fruits[-1])   # 포도   ← 뒤에서 첫 번째
print(len(fruits))  # 3
```

**★ 번호는 0부터 시작합니다.** 첫 번째가 `[0]` 입니다. 처음엔 계속 헷갈립니다.

```python
fruits.append("딸기")       # 뒤에 추가
print(fruits)               # ['사과', '바나나', '포도', '딸기']

fruits.remove("바나나")      # 값으로 지우기
print(fruits)               # ['사과', '포도', '딸기']
```

### 잘라내기 (슬라이싱)

```python
>>> numbers = [10, 20, 30, 40, 50]
>>> numbers[:3]      # 처음부터 3개
[10, 20, 30]
>>> numbers[2:]      # 2번째부터 끝까지
[30, 40, 50]
```

`numbers[:3]` 형태는 예제 03의 `limit` (개수 제한) 기능에서 씁니다.

## 6. 딕셔너리 — 이름표를 붙여서

리스트가 "순서로 찾는 것"이라면, 딕셔너리는 **"이름으로 찾는 것"** 입니다.

```python
person = {
    "name": "철수",
    "age": 20,
}

print(person["name"])   # 철수
print(person["age"])    # 20
```

```
     ┌─────────┬────────┐
     │  키(key) │ 값(value)│
     ├─────────┼────────┤
     │ "name"  │ "철수"  │
     │ "age"   │ 20      │
     └─────────┴────────┘
```

```python
person["email"] = "cs@example.com"   # 추가
person["age"] = 21                   # 수정
```

### ★ 딕셔너리 = JSON

**이게 이 교재에서 딕셔너리가 중요한 이유입니다.**

파이썬에서 딕셔너리를 반환하면, FastAPI가 그걸 **JSON으로 바꿔서** 브라우저에 보냅니다.

```python
# 파이썬 쪽
{"message": "안녕하세요", "count": 3}
```
```json
// 브라우저가 받는 것 — 거의 똑같이 생겼죠
{"message": "안녕하세요", "count": 3}
```

### 딕셔너리를 리스트에 담기

실무에서 가장 많이 보는 모양입니다. 예제 03의 명언 목록이 정확히 이 구조입니다.

```python
quotes = [
    {"id": 1, "text": "시작이 반이다.", "author": "아리스토텔레스"},
    {"id": 2, "text": "천재는 노력이다.", "author": "에디슨"},
]

print(quotes[0]["author"])   # 아리스토텔레스
```

`quotes[0]` 으로 첫 번째 딕셔너리를 꺼내고, `["author"]` 로 그 안의 값을 꺼냅니다.

## 7. if — 조건에 따라 다르게

```python
age = 20

if age >= 20:
    print("성인입니다")
else:
    print("미성년자입니다")
```

### ★ 들여쓰기가 문법입니다

파이썬은 중괄호 `{ }` 대신 **들여쓰기(띄어쓰기 4칸)** 로 "여기까지가 안쪽"을 표시합니다.

```python
if age >= 20:
    print("성인")        # ← 4칸 들여씀 = if 안쪽
print("항상 실행")        # ← 안 들여씀 = if 바깥
```

**들여쓰기를 틀리면 에러가 납니다.** 파이썬 초보가 가장 많이 만나는 에러입니다.

```
IndentationError: expected an indented block
```

> VS Code에서 `Tab` 키를 누르면 자동으로 4칸이 들어갑니다.
> **띄어쓰기와 Tab을 섞어 쓰지 마세요.** 눈에는 똑같아 보이는데 에러가 납니다.

### 조건 여러 개

```python
value = 22.5

if value < 18.5:
    grade = "저체중"
elif value < 23:          # elif = "아니고 만약에"
    grade = "정상"
elif value < 25:
    grade = "과체중"
else:
    grade = "비만"

print(grade)   # 정상
```

**위에서부터 순서대로** 검사하고, 처음 맞는 것 하나만 실행합니다.

### 비교 연산자

| 기호 | 뜻 |
|---|---|
| `==` | 같다 (**`=` 하나는 "넣어라"** — 자주 틀립니다) |
| `!=` | 다르다 |
| `>` `<` `>=` `<=` | 크다 / 작다 / 크거나 같다 / 작거나 같다 |
| `and` `or` `not` | 그리고 / 또는 / 아니다 |

```python
if age >= 20 and age < 65:
    print("성인")
```

## 8. for — 반복하기

```python
fruits = ["사과", "바나나", "포도"]

for fruit in fruits:
    print(fruit)
```

```
사과
바나나
포도
```

"`fruits` 에서 하나씩 꺼내 `fruit` 에 넣고, 안쪽을 실행해라"는 뜻입니다.
`fruit` 이라는 이름은 아무거나 지어도 됩니다.

### 숫자를 세면서 반복 — range

```python
for i in range(1, 10):     # 1부터 9까지 (10은 포함 안 됨)
    print(f"3 x {i} = {3 * i}")
```

```
3 x 1 = 3
3 x 2 = 6
...
3 x 9 = 27
```

**★ `range(1, 10)` 은 10을 포함하지 않습니다.** 이것도 자주 헷갈립니다.

### 리스트 컴프리헨션 — 한 줄로 걸러내기

```python
quotes = [
    {"author": "에디슨", "text": "..."},
    {"author": "뉴턴", "text": "..."},
]

# "에디슨"이 작성자에 들어간 것만 골라내기
found = [q for q in quotes if "에디슨" in q["author"]]
```

풀어 쓰면 이렇습니다:

```python
found = []
for q in quotes:
    if "에디슨" in q["author"]:
        found.append(q)
```

**같은 뜻입니다.** 파이썬에서는 위쪽(한 줄) 방식을 즐겨 씁니다.
예제 03의 검색 기능에서 나옵니다.

## 9. 함수 — 작업에 이름 붙이기

```python
def say_hello(name):
    return f"{name}님, 반갑습니다!"


message = say_hello("철수")
print(message)     # 철수님, 반갑습니다!
```

| 부분 | 뜻 |
|---|---|
| `def` | "함수를 정의하겠다" (define) |
| `say_hello` | 함수 이름 (내가 짓습니다) |
| `(name)` | 받을 값 — **매개변수** |
| `return` | 돌려줄 값. 여기서 함수가 **끝납니다** |

**`return` 을 안 쓰면** 그 함수는 `None` 을 돌려줍니다.

```python
def add(a, b):
    print(a + b)      # 찍기만 하고 return 이 없음

result = add(1, 2)
print(result)         # None  ← 값이 없습니다
```

**찍는 것(`print`)과 돌려주는 것(`return`)은 다릅니다.** 초보가 가장 헷갈리는 부분 중 하나입니다.

### 기본값이 있는 매개변수

```python
def greet(name, greeting="안녕"):
    return f"{greeting}, {name}님"


print(greet("철수"))              # 안녕, 철수님
print(greet("철수", "반가워"))     # 반가워, 철수님
```

`=` 로 기본값을 주면 **안 넘겨도 되는** 값이 됩니다.
예제 01의 "선택 쿼리 파라미터"가 정확히 이것입니다.

> **기본값이 있는 것은 반드시 뒤에** 와야 합니다.
> `def greet(greeting="안녕", name)` 은 에러입니다.

## 10. ★ 타입 힌트 — FastAPI의 심장

이 교재에서 **가장 중요한 문법**입니다.

파이썬은 원래 타입을 안 적어도 됩니다. 그런데 이렇게 적을 수 있습니다:

```python
def add(a: int, b: int) -> int:
    return a + b
```

| 표기 | 뜻 |
|---|---|
| `a: int` | "a 는 정수를 받습니다" |
| `-> int` | "정수를 돌려줍니다" |

### 파이썬은 이걸 강제하지 않습니다

```python
>>> add("1", "2")
'12'          # 에러 안 남! 그냥 메모일 뿐
```

**그런데 FastAPI는 이걸 진짜로 씁니다.**

```python
@app.get("/add")
def add(a: int, b: int):
    return {"result": a + b}
```

FastAPI가 `a: int` 를 보고:

1. 주소로 들어온 `"3"` 을 **자동으로 `3` 으로 바꿔 주고**
2. `"삼"` 처럼 못 바꾸면 **에러를 대신 내 주고**
3. **API 문서에도 자동으로 반영**합니다

> **타입 힌트 한 줄이 검증 코드 수십 줄을 대신합니다.**
> 이게 FastAPI를 쓰는 가장 큰 이유입니다. 예제 01에서 직접 확인합니다.

### 자주 쓰는 타입 표기

```python
name: str = "철수"
age: int = 20
height: float = 1.75
is_done: bool = False
tags: list[str] = ["a", "b"]              # 문자열들의 리스트
person: dict = {"name": "철수"}

nickname: str | None = None    # 문자열이거나, 없거나
```

마지막 `str | None` 이 중요합니다. **"이 값은 없을 수도 있다"** 는 표시이고,
FastAPI에서는 **"안 넘겨도 되는 파라미터"** 라는 뜻이 됩니다.

## 11. import — 남이 만든 것 가져오기

```python
import random                              # random 꾸러미 통째로

print(random.choice(["가위", "바위", "보"]))
```

```python
from fastapi import FastAPI                # fastapi 에서 FastAPI 만
from fastapi.middleware.cors import CORSMiddleware
```

| 방식 | 쓸 때 |
|---|---|
| `import random` | `random.choice(...)` 처럼 앞에 붙여서 |
| `from random import choice` | `choice(...)` 처럼 바로 |

**import 는 파일 맨 위에 모아 씁니다.** 이게 관례입니다.

---

## 12. 데코레이터 `@` — 지금은 이 정도만

FastAPI 코드에서 이런 걸 보게 됩니다:

```python
@app.get("/hello")
def say_hello():
    return {"message": "안녕"}
```

`@` 로 시작하는 줄을 **데코레이터**라고 합니다.
"바로 아래 함수에 기능을 덧붙인다"는 문법입니다.

**지금은 이렇게만 이해하면 충분합니다:**

> `@app.get("/hello")` = **"아래 함수를 `/hello` 주소에 연결해라"**

원리를 몰라도 교재를 끝까지 따라가는 데 아무 지장이 없습니다.
궁금해지는 날이 오면 그때 찾아보세요.

---

## 13. 자주 만나는 에러

에러 메시지는 **맨 아랫줄부터** 읽으세요. 거기에 답이 있습니다.

<details open>
<summary><b><code>IndentationError: expected an indented block</code></b></summary>

들여쓰기를 안 했습니다. `:` 로 끝나는 줄(`if`, `for`, `def`) 다음 줄은 **반드시 들여씁니다.**

```python
if age >= 20:
print("성인")        # X — 들여쓰기 없음

if age >= 20:
    print("성인")    # O
```
</details>

<details>
<summary><b><code>NameError: name 'xxx' is not defined</code></b></summary>

그런 이름의 변수·함수가 없습니다. 십중팔구:

- **오타** — `pirnt` / `Print` (대소문자 구분!)
- **아직 만들기 전에 썼음** — 파이썬은 위에서 아래로 읽습니다
- **따옴표를 빼먹음** — `print(안녕)` (X) / `print("안녕")` (O)
</details>

<details>
<summary><b><code>TypeError: can only concatenate str ... to str</code></b></summary>

문자열과 숫자를 `+` 로 붙이려 했습니다.

```python
"나이: " + 20          # X
"나이: " + str(20)     # O
f"나이: {20}"          # O — 이게 제일 편합니다
```
</details>

<details>
<summary><b><code>KeyError: 'xxx'</code></b></summary>

딕셔너리에 그런 키가 없습니다. **오타**이거나, 실제 데이터에 그 키가 없는 것입니다.

```python
person = {"name": "철수"}
print(person["Name"])   # X — 대소문자 다름
```

키 목록을 찍어서 확인하세요: `print(person.keys())`
</details>

<details>
<summary><b><code>IndexError: list index out of range</code></b></summary>

리스트에 없는 번호를 꺼내려 했습니다. **번호는 0부터**이므로,
3개짜리 리스트의 마지막은 `[2]` 입니다. `[3]` 은 없습니다.
</details>

<details>
<summary><b><code>SyntaxError: invalid syntax</code></b></summary>

문법이 깨졌습니다. 거의 항상 **에러가 난 줄의 바로 윗줄**을 보세요.

- 괄호를 안 닫음 → `print("안녕"` 
- `:` 을 빼먹음 → `if age >= 20` (X) / `if age >= 20:` (O)
- 따옴표 짝이 안 맞음
</details>

---

## 14. 이 정도면 충분합니다

체크해 보세요. 전부 "안다"면 예제 01로 가도 됩니다.

- [ ] 변수에 값을 넣고 `print` 로 찍을 수 있다
- [ ] `"42"` 와 `42` 가 다르다는 걸 안다
- [ ] f-string(`f"{name}님"`)을 쓸 수 있다
- [ ] 리스트는 `[0]` 부터, 딕셔너리는 `["키"]` 로 꺼낸다
- [ ] 딕셔너리가 JSON과 닮았다는 걸 안다
- [ ] `if` / `for` 를 쓸 수 있고, **들여쓰기가 문법**인 걸 안다
- [ ] `def` 로 함수를 만들고 `return` 으로 값을 돌려줄 수 있다
- [ ] `a: int` 같은 타입 힌트가 **FastAPI에서 검증에 쓰인다**는 걸 안다
- [ ] `@app.get("/")` 이 "이 함수를 이 주소에 연결"이라는 뜻인 걸 안다

## 1. 파이썬과 뭐가 다른가 — 3분 요약

부록 A를 봤다면 이 표만 봐도 절반은 끝납니다.

| | 파이썬 | 자바스크립트 |
|---|---|---|
| 변수 선언 | `name = "철수"` | `const name = "철수";` |
| 출력 | `print(x)` | `console.log(x)` |
| 문자열 끼워넣기 | `f"{name}님"` | `` `${name}님` `` |
| 참/거짓 | `True` / `False` | `true` / `false` |
| 없음 | `None` | `null` / `undefined` |
| 주석 | `# 메모` | `// 메모` |
| 블록 표시 | **들여쓰기** | **중괄호 `{ }`** |
| 함수 | `def f(x):` | `function f(x) { }` |
| 이름 규칙 | `user_name` | `userName` |
| `그리고` / `또는` | `and` / `or` | `&&` / `\|\|` |

**가장 큰 차이**: 파이썬은 들여쓰기가 문법이지만, 자바스크립트는 **중괄호**가 문법입니다.
자바스크립트에서 들여쓰기는 그냥 보기 좋으라고 하는 것입니다.

---

## 2. 변수 — `const` 와 `let`

```js
const name = "철수";     // 바뀌지 않는 값
let count = 0;          // 바뀔 값

count = 1;              // O
name = "영희";           // X — TypeError: Assignment to constant variable.
```

**규칙은 간단합니다: 일단 전부 `const` 로 쓰고, 바꿔야 할 때만 `let` 으로 바꾸세요.**

이 교재의 프론트엔드 코드는 대부분 `const` 입니다.

> **`var` 는 안 씁니다.** 옛날 방식이고 헷갈리는 동작이 있습니다.
> 인터넷 예제에 `var` 가 보이면 오래된 글입니다.

### 세미콜론 `;`

줄 끝의 `;` 는 있어도 되고 없어도 됩니다. 이 교재는 붙이는 쪽으로 통일했습니다.
(Prettier 확장을 설치했다면 저장할 때 알아서 정리해 줍니다.)

---

## 3. 자료형과 문자열

```js
const name = "철수";        // string
const age = 20;            // number  ← 정수/실수 구분이 없습니다
const height = 1.75;       // 이것도 number
const isDone = false;      // boolean
const nothing = null;      // 값이 없음
```

> 파이썬과 달리 **`int` 와 `float` 구분이 없습니다.** 전부 `number` 입니다.

### 템플릿 리터럴 — 파이썬의 f-string

```js
const name = "철수";

console.log("안녕, " + name + "님");    // 이어붙이기
console.log(`안녕, ${name}님`);         // 템플릿 리터럴 ← 이걸 씁니다
```

**★ 따옴표가 아니라 백틱(`` ` ``)입니다.** 키보드에서 `Tab` 위, `1` 왼쪽에 있습니다.

```js
> const a = 3, b = 4;
> `${a} + ${b} = ${a + b}`
'3 + 4 = 7'
```

교재에서 이렇게 나옵니다:

```js
fetch(`${API_URL}/quotes/random`)
```

### `null` 과 `undefined`

둘 다 "값이 없다"인데 뉘앙스가 다릅니다.

| | 뜻 |
|---|---|
| `null` | **내가 일부러** 비워 둠 |
| `undefined` | 애초에 **없음** (선언만 하고 안 넣었거나, 없는 걸 꺼냈거나) |

```js
> const person = { name: "철수" };
> person.age
undefined            // 그런 게 없음
```

지금은 **"둘 다 없다는 뜻"** 정도로 알아도 됩니다.

## 4. 배열 — 파이썬의 리스트

```js
const fruits = ["사과", "바나나", "포도"];

console.log(fruits[0]);      // 사과   ← 0부터
console.log(fruits.length);  // 3      ← len() 이 아니라 .length
```

```js
fruits.push("딸기");          // 뒤에 추가 (파이썬의 append)
```

### ★ `.map()` — 이 교재에서 제일 많이 씁니다

배열의 각 항목을 **다른 것으로 바꿔서 새 배열**을 만듭니다.

```js
> const numbers = [1, 2, 3];
> numbers.map((n) => n * 2)
[2, 4, 6]
```

React에서는 **데이터 배열을 화면 조각 배열로** 바꿀 때 씁니다.

```jsx
{stack.map((item) => (
  <Card key={item.name}>{item.name}</Card>
))}
```

> "`stack` 안의 각 `item` 을 `<Card>` 로 바꿔라"는 뜻입니다.
> 예제 02에서 카드 3장을 그릴 때 이걸 씁니다.

### `.filter()` — 걸러내기

```js
> const numbers = [1, 2, 3, 4, 5];
> numbers.filter((n) => n > 3)
[4, 5]
```

조건이 `true` 인 것만 남깁니다. 파이썬의 리스트 컴프리헨션과 같은 역할입니다.

---

## 5. 객체 — 파이썬의 딕셔너리

```js
const person = {
  name: "철수",
  age: 20,
};

console.log(person.name);      // 철수   ← 점으로 꺼냅니다
console.log(person["name"]);   // 철수   ← 이것도 됩니다
```

**파이썬 딕셔너리와 다른 점**: 키에 따옴표를 안 붙이고, `.` 으로 꺼냅니다.

```python
# 파이썬
person = {"name": "철수"}
person["name"]
```
```js
// 자바스크립트
const person = { name: "철수" };
person.name
```

### 객체를 배열에 담기 — JSON의 모양

```js
const quotes = [
  { id: 1, text: "시작이 반이다.", author: "아리스토텔레스" },
  { id: 2, text: "천재는 노력이다.", author: "에디슨" },
];

console.log(quotes[0].author);   // 아리스토텔레스
```

**이게 백엔드에서 받는 데이터의 모양입니다.** 파이썬 쪽 딕셔너리 리스트와 똑같이 생겼죠.

### 구조 분해 — 꺼내면서 이름 붙이기

```js
const person = { name: "철수", age: 20 };

const { name, age } = person;    // 한 번에 꺼내기
console.log(name);               // 철수
```

교재에서 이런 모양으로 나옵니다:

```tsx
export default function RootLayout({ children }) {
```

"넘어온 값에서 `children` 을 꺼내 쓰겠다"는 뜻입니다.
`(props)` 로 받아서 `props.children` 을 쓰는 것과 같습니다.

### `??` — 없으면 이걸로

```js
const url = process.env.NEXT_PUBLIC_API_URL ?? "http://127.0.0.1:8000";
```

"왼쪽이 `null`/`undefined` 면 오른쪽을 쓴다"는 뜻입니다.
**기본값**을 줄 때 씁니다. 예제 03의 `lib/api.ts` 에 나옵니다.

## 6. 함수

### 세 가지 모양, 같은 일

```js
// 1) 보통 함수
function add(a, b) {
  return a + b;
}

// 2) 화살표 함수
const add2 = (a, b) => {
  return a + b;
};

// 3) 화살표 함수 짧게 — return 생략
const add3 = (a, b) => a + b;
```

**3번 모양이 중요합니다.** `.map()` 안에서 계속 보게 됩니다.

```js
numbers.map((n) => n * 2)
//         └──┬──┘
//        "n 을 받아서 n*2 를 돌려줘라"
```

> **중괄호가 있으면 `return` 을 써야 하고, 없으면 자동으로 돌려줍니다.**
> `(n) => { n * 2 }` 는 아무것도 안 돌려줍니다. 자주 하는 실수입니다.

### JSX를 돌려줄 땐 소괄호

```jsx
{stack.map((item) => (
  <Card>{item.name}</Card>
))}
```

여러 줄짜리를 돌려줄 때 **소괄호 `( )`** 로 감쌉니다. 중괄호가 아닙니다.

---

## 7. if 와 반복

```js
const age = 20;

if (age >= 20) {
  console.log("성인");
} else if (age >= 14) {
  console.log("청소년");
} else {
  console.log("어린이");
}
```

**조건을 소괄호로 감싸고, 블록을 중괄호로 감쌉니다.** 파이썬의 `:` 와 들여쓰기 대신입니다.

| 파이썬 | 자바스크립트 |
|---|---|
| `elif` | `else if` |
| `and` / `or` / `not` | `&&` / `\|\|` / `!` |
| `==` | `===` ← **등호 3개** |

> **★ `===` 를 쓰세요.** `==` 는 `1 == "1"` 을 `true` 로 보는 이상한 규칙이 있습니다.
> `===` 는 타입까지 같아야 `true` 입니다.

### 삼항 연산자 — JSX에서 필수

```js
const grade = age >= 20 ? "성인" : "미성년자";
//            └─ 조건 ─┘  └ 참 ┘   └─ 거짓 ─┘
```

JSX 안에서는 `if` 를 쓸 수 없어서, **조건에 따라 다른 화면**을 그릴 때 이걸 씁니다.

```jsx
{error ? (
  <p>에러가 났습니다</p>
) : (
  <p>{quote.text}</p>
)}
```

예제 03에서 이 모양이 나옵니다.

## 8. ★ async / await — 기다리는 법

**이 교재에서 가장 중요한 개념입니다.**

서버에서 데이터를 받아오는 데는 **시간이 걸립니다.** 0.1초일 수도, 3초일 수도 있죠.
자바스크립트는 그동안 멈춰 서서 기다리지 않고 **다음 줄로 넘어가 버립니다.**

```js
const data = fetch("...");   // 아직 안 왔는데 다음 줄로 감
console.log(data);           // Promise { <pending> }  ← 데이터가 아님
```

`Promise` 는 **"나중에 값이 올 거라는 약속"** 입니다. 그래서 `await` 로 기다립니다.

```js
const res = await fetch("...");   // 올 때까지 기다림
const data = await res.json();    // 본문을 읽는 것도 기다림
console.log(data);                // 진짜 데이터
```

**규칙 하나**: `await` 를 쓰려면 그 함수에 **`async`** 를 붙여야 합니다.

```js
async function getQuote() {
  const res = await fetch("http://127.0.0.1:8000/quotes/random");
  const data = await res.json();
  return data;
}
```

### 브라우저 콘솔에서 직접 해보기

예제 01의 서버를 켜 두고, 아무 페이지의 콘솔에서:

```js
const res = await fetch("http://127.0.0.1:8000/health");
const data = await res.json();
console.log(data);
```

```
{status: 'ok'}
```

> 콘솔에서는 `async` 없이 `await` 를 바로 쓸 수 있습니다. 편의 기능입니다.

### ★ fetch 는 404에서도 실패하지 않습니다

**초보가 가장 많이 놓치는 부분입니다.**

```js
const res = await fetch("http://127.0.0.1:8000/없는주소");
// 여기서 에러가 안 납니다!
console.log(res.ok);       // false
console.log(res.status);   // 404
```

fetch 입장에서는 **"요청은 성공했고 응답이 404였을 뿐"** 입니다.
그래서 직접 확인해야 합니다:

```js
if (!res.ok) {
  throw new Error(`서버 응답 오류: ${res.status}`);
}
```

예제 03의 `lib/api.ts` 가 정확히 이렇게 되어 있습니다.

## 9. import / export — 파일 나눠 쓰기

```ts
// lib/api.ts
export const API_URL = "http://127.0.0.1:8000";      // 이름 붙여 내보내기

export async function getRandomQuote() { ... }
```

```tsx
// app/page.tsx
import { API_URL, getRandomQuote } from "@/lib/api";   // 중괄호로 가져오기
```

### default export — 파일의 대표 하나

```tsx
export default function Home() { ... }     // 대표 하나
```
```tsx
import Home from "./page";                 // 중괄호 없이, 이름은 마음대로
```

**`page.tsx` 는 반드시 `export default` 된 컴포넌트가 하나 있어야 합니다.**

| | 개수 | 가져올 때 |
|---|---|---|
| `export` | 여러 개 | `import { A, B } from "..."` |
| `export default` | **파일당 하나** | `import 아무이름 from "..."` |

### `@/` 는 뭔가요?

```tsx
import { Button } from "@/components/ui/button";
```

`@/` = **프로젝트 최상위 폴더**. 상대경로(`../../components/...`)를 안 쓰려고 만든 별칭입니다.
`tsconfig.json` 에 정의되어 있습니다.

## 10. 타입스크립트 — 자바스크립트 + 타입

이 교재의 프론트엔드는 `.ts` / `.tsx` 파일을 씁니다. **자바스크립트에 타입 표기가 추가된 것**입니다.

```ts
const name: string = "철수";
const age: number = 20;
const isDone: boolean = false;
const fruits: string[] = ["사과", "바나나"];
```

> **대부분은 안 적어도 됩니다.** `const name = "철수";` 라고만 써도
> 타입스크립트가 알아서 "이건 string이구나" 하고 압니다. 이걸 **타입 추론**이라고 합니다.

### 함수에 타입 붙이기

```ts
function add(a: number, b: number): number {
  return a + b;
}
//                                  └─ 돌려주는 값의 타입
```

### `type` — 데이터 모양에 이름 붙이기 ★

**이 교재에서 제일 많이 쓰는 타입스크립트 문법입니다.**

```ts
type Quote = {
  id: number;
  text: string;
  author: string;
};
```

"명언이라는 건 id·text·author 를 가진 것"이라고 **모양을 선언**한 것입니다.

```ts
const q: Quote = { id: 1, text: "시작이 반이다.", author: "아리스토텔레스" };

q.autor;   // ← 오타! 편집기가 빨간 줄로 알려 줍니다
```

**백엔드가 주는 JSON의 모양을 여기에 적어 둡니다.** 그러면 `q.` 만 쳐도 자동완성이 뜹니다.

> ⚠️ 타입스크립트는 **백엔드가 진짜 뭘 주는지 모릅니다.** 내가 적은 걸 믿을 뿐입니다.
> 백엔드를 고쳤으면 이 타입도 같이 고쳐야 합니다. 안 그러면 **거짓말**이 됩니다.

### `|` — 이거이거나 저거

```ts
let quote: Quote | null = null;    // Quote 이거나, 아직 없거나
```

예제 03에서 "아직 못 받아왔을 수도 있다"를 표현할 때 씁니다.

### `Promise<Quote>` — 나중에 Quote가 올 것

```ts
async function getRandomQuote(): Promise<Quote> {
  ...
}
```

`async` 함수는 항상 Promise를 돌려주므로, **"기다리면 Quote가 나온다"** 는 표기입니다.

### `!` — "내가 확인했어"

```tsx
{quote!.text}
```

타입스크립트가 "`quote` 가 `null` 일 수도 있는데 `.text` 를 읽어도 되냐"고 물을 때,
**"괜찮아, 내가 확인했어"** 라고 알려 주는 표시입니다.

> 남용하면 위험합니다. **정말 확인했을 때만** 쓰세요.

## 11. 자주 만나는 에러

<details open>
<summary><b><code>Uncaught SyntaxError: Unexpected token</code></b></summary>

문법이 깨졌습니다. 거의 항상:

- **중괄호·소괄호 짝**이 안 맞음 → VS Code에서 괄호를 클릭하면 짝이 표시됩니다
- 쉼표를 빼먹음 → 객체·배열의 항목 사이엔 `,` 가 필요합니다
- 백틱과 따옴표를 섞음 → `` `${name}` `` 은 백틱이어야 합니다
</details>

<details>
<summary><b><code>Cannot read properties of undefined (reading 'xxx')</code></b></summary>

**가장 자주 보게 될 에러입니다.** 없는 걸 꺼내려 했습니다.

```js
const person = undefined;
person.name;      // 💥
```

원인은 대부분:
- 데이터가 **아직 안 왔는데** 화면을 그림 (`await` 를 안 했거나)
- 백엔드가 주는 이름과 **다른 이름**으로 꺼냄 (`autor` vs `author`)

`console.log` 로 실제로 뭐가 들어 있는지 먼저 확인하세요.
</details>

<details>
<summary><b><code>x is not a function</code></b></summary>

함수가 아닌 걸 `( )` 로 호출했습니다. 오타이거나, 그 값이 `undefined` 입니다.

```js
fruits.lenght()   // 오타 + 원래 함수도 아님
fruits.length     // O
```
</details>

<details>
<summary><b>화면에 아무것도 안 나옴 (에러도 없음)</b></summary>

화살표 함수에서 `return` 을 빠뜨렸을 가능성이 큽니다.

```jsx
{items.map((item) => { <li>{item}</li> })}     // X — 아무것도 안 돌려줌
{items.map((item) => <li>{item}</li>)}         // O
{items.map((item) => { return <li>{item}</li>; })}   // O
```
</details>

<details>
<summary><b><code>Assignment to constant variable</code></b></summary>

`const` 로 선언한 값을 바꾸려 했습니다. `let` 으로 바꾸세요.

```js
let count = 0;
count = 1;      // O
```
</details>

---

## 12. 이 정도면 충분합니다

- [ ] `const` 와 `let` 의 차이를 안다 (기본은 `const`)
- [ ] 백틱 템플릿 리터럴 `` `${name}님` `` 을 쓸 수 있다
- [ ] 배열의 `.map()` 이 "각 항목을 바꿔 새 배열을 만든다"는 걸 안다
- [ ] 객체를 `.` 으로 꺼낼 수 있고, 구조 분해 `{ children }` 를 안다
- [ ] 화살표 함수 `(n) => n * 2` 를 읽을 수 있다
- [ ] `===` 를 쓴다 (`==` 아님)
- [ ] 삼항 연산자 `조건 ? A : B` 를 읽을 수 있다
- [ ] **`async` / `await` 로 서버 응답을 기다릴 수 있다**
- [ ] **`fetch` 는 404에서도 예외를 안 던진다**는 걸 안다
- [ ] `import` / `export default` 를 구분한다
- [ ] `type Quote = { ... }` 로 데이터 모양을 적을 수 있다

## 개념 먼저: API가 뭔데?

식당으로 비유하면 이렇습니다.

| 식당 | 웹 |
|---|---|
| 손님 | 브라우저 / 프론트엔드 |
| **메뉴판** | **API** — 뭘 주문할 수 있는지 적힌 목록 |
| 주방 | 백엔드 서버 |
| 음식 | JSON 데이터 |

우리가 이번에 만드는 건 **메뉴판과 주방**입니다.
손님석(화면)은 예제 02에서 만듭니다.

### 주소 하나를 뜯어보면

```
http://127.0.0.1:8000/add?a=3&b=4
└─┬──┘ └────┬────┘ └┬─┘└┬─┘ └──┬──┘
프로토콜   내 컴퓨터  포트 경로  쿼리
```

- **`127.0.0.1`** = 내 컴퓨터 자신. `localhost` 와 같은 뜻입니다.
- **`8000`** = 포트. 한 컴퓨터 안에서 여러 서버를 구분하는 번호.
  이 교재에선 백엔드가 8000, 프론트엔드가 3000을 씁니다.
- **`/add`** = 경로(path). "무엇을 요청하는지"
- **`?a=3&b=4`** = 쿼리(query). "어떤 조건으로"

## 따라 만들기

### 1단계. 폴더와 가상환경

```powershell
cd D:\Work\클로드_정리\temp\practice

프롬프트 앞에 **`(.venv)`** 가 붙었는지 확인하세요. 안 붙었으면 여기서 멈추고

### 2단계. FastAPI 설치

```powershell
pip install "fastapi[standard]"
```

> **따옴표를 꼭 넣으세요.** PowerShell에서 `[` `]` 는 특별한 의미가 있어서,
> 따옴표 없이 쓰면 엉뚱하게 동작합니다.

`[standard]` 는 "기본 세트로 깔아 줘"라는 뜻입니다.
서버 실행기(uvicorn), `fastapi` 명령어 등이 함께 설치됩니다. 30초쯤 걸립니다.

설치가 끝나면 목록을 파일로 남겨 둡니다. 나중에 배포할 때 쓰입니다.

```powershell
pip freeze > requirements.txt
```

### 3단계. `main.py` 만들기

VS Code로 지금 폴더를 엽니다:

```powershell
code .
```

`backend` 폴더에 **`main.py`** 파일을 만들고 아래를 입력합니다.
**복사하지 말고 직접 쳐 보세요.** 손이 기억해야 합니다.

```python
# backend/main.py
from fastapi import FastAPI

app = FastAPI(
    title="나의 첫 API",
    description="FastAPI 연습용 서버입니다.",
)


@app.get("/")
def read_root():
    return {"message": "안녕하세요, FastAPI!"}
```

**한 줄씩 뜯어보면:**

| 코드 | 뜻 |
|---|---|
| `from fastapi import FastAPI` | 설치한 라이브러리에서 `FastAPI` 를 가져온다 |
| `app = FastAPI(...)` | API 전체를 담을 **그릇**을 하나 만든다 |
| `@app.get("/")` | "GET 방식으로 `/` 주소에 요청이 오면 아래 함수를 실행해라" |
| `def read_root():` | 실행될 함수. **이름은 아무거나 좋습니다** (주소와 무관) |
| `return {"message": ...}` | 파이썬 `dict` 를 반환하면 FastAPI가 **JSON으로 바꿔 줍니다** |

> `@` 로 시작하는 줄을 **데코레이터**라고 합니다.
> "바로 아래 함수에 기능을 덧붙인다"는 파이썬 문법입니다.
> 지금은 **"이 함수를 이 주소에 연결한다"** 정도로만 이해해도 충분합니다.

INFO:     Uvicorn running on http://127.0.0.1:8000 (Press CTRL+C to quit)

### 5단계. ★ 자동 문서 구경하기

**http://127.0.0.1:8000/docs** 를 열어 보세요.

우리가 문서를 한 글자도 안 썼는데 이런 화면이 나옵니다:

```
┌────────────────────────────────────────┐
│  나의 첫 API                     [0.1.0] │
│  FastAPI 연습용 서버입니다.               │
│                                        │
│  GET   /            Read Root      [∨] │
│                                        │
└────────────────────────────────────────┘
```

1. `GET /` 줄을 클릭해 펼칩니다
2. 오른쪽 **`Try it out`** 버튼 클릭
3. **`Execute`** 클릭
4. 아래에 응답이 그대로 나옵니다

**이게 FastAPI의 킬러 기능입니다.** 프론트엔드를 안 만들어도 API를 테스트할 수 있고,
나중에 팀원에게 "문서 보세요" 하고 이 주소만 주면 됩니다.

> `/redoc` 도 열어 보세요. 같은 내용의 다른 디자인 버전입니다.

### 6단계. 경로 파라미터

**주소의 일부를 값으로** 받아 봅시다. `main.py` 맨 아래에 추가:

```python
@app.get("/hello/{name}")
def say_hello(name: str):
    return {"message": f"{name}님, 반갑습니다!"}
```

저장하면 터미널에 `Reloading...` 이 찍힙니다. 브라우저에서:

- http://127.0.0.1:8000/hello/철수 → `{"message":"철수님, 반갑습니다!"}`
- http://127.0.0.1:8000/hello/영희 → `{"message":"영희님, 반갑습니다!"}`

**핵심**: 주소의 `{name}` 과 함수 인자 `name` 의 **이름이 같아야** 연결됩니다.
이름이 다르면 서버가 에러를 냅니다.

> `f"{name}님"` 은 f-string입니다. 문자열 앞에 `f`를 붙이면
> 중괄호 안의 변수가 값으로 바뀝니다.

### 7단계. ★ 쿼리 파라미터와 자동 검증

이번 편에서 **가장 중요한 부분**입니다. 아래를 추가하세요:

```python
@app.get("/add")
def add(a: int, b: int):
    return {"a": a, "b": b, "result": a + b}
```

http://127.0.0.1:8000/add?a=3&b=4 →

```json
{"a":3,"b":4,"result":7}
```

**이제 일부러 틀려 봅시다.** http://127.0.0.1:8000/add?a=삼&b=4 →

```json
{
  "detail": [
    {
      "type": "int_parsing",
      "loc": ["query", "a"],
      "msg": "Input should be a valid integer, unable to parse string as an integer",
      "input": "삼"
    }
  ]
}
```

**여기서 잠깐 멈추고 생각해 보세요.**

주소창으로 들어오는 값은 **전부 문자열**입니다. `?a=3` 의 `3`도 사실은 `"3"`이죠.
그런데 우리 함수는 `a + b` 로 덧셈을 했고, 결과는 `"34"`가 아니라 `7`이었습니다.

우리가 한 일은 `a: int` 라고 **타입을 적은 것뿐**입니다. FastAPI가:

1. `"3"` → `3` 으로 **변환**하고
2. `"삼"` 처럼 변환이 안 되면 **422 에러를 대신 내 주고**
3. 그 내용을 **`/docs` 문서에도 자동 반영**합니다

다른 프레임워크에서 직접 짜야 했던 검증 코드가 **타입 힌트 한 줄로** 끝납니다.
이게 FastAPI가 인기 있는 이유입니다.

### 8단계. 기본값 = 선택 파라미터

`=` 뒤에 기본값을 주면 그 파라미터는 **안 넣어도 되는 것**이 됩니다.

```python
@app.get("/bmi")
def bmi(height: float, weight: float, unit: str = "kg"):
    if unit == "lb":
        weight = weight * 0.4536  # 파운드 → 킬로그램

    value = weight / (height**2)

    if value < 18.5:
        grade = "저체중"
    elif value < 23:
        grade = "정상"
    elif value < 25:
        grade = "과체중"
    else:
        grade = "비만"

    return {"bmi": round(value, 1), "grade": grade}
```

- http://127.0.0.1:8000/bmi?height=1.75&weight=70 → `{"bmi":22.9,"grade":"정상"}`
- http://127.0.0.1:8000/bmi?height=1.75&weight=154&unit=lb → `{"bmi":22.8,"grade":"정상"}`

> 154파운드 ≈ 69.85kg 이라 70kg일 때(22.9)와 소수점 첫째 자리에서 살짝 다릅니다. 정상입니다.

`/docs` 에서 보면 `height`, `weight` 는 **`* required`** 로,
`unit` 은 기본값 `kg` 이 채워진 채로 표시됩니다.

### 9단계. health 엔드포인트

마지막으로 하나 더. 실무의 거의 모든 서버가 가지고 있는 주소입니다.

```python
@app.get("/health")
def health():
    return {"status": "ok"}
```

"서버 살아 있니?" 를 확인하는 용도입니다.
예제 20에서 배포할 때 **실제로 쓰게 됩니다.**

<details open>
<summary><b>1. <code>fastapi : 용어를 인식할 수 없습니다</code></b></summary>

**원인**: 가상환경이 안 켜져 있습니다. 프롬프트 앞의 `(.venv)` 를 확인하세요.

그래도 안 되면 `pip install "fastapi[standard]"` 에서 `[standard]` 를 빼먹은 것입니다.
`fastapi` 명령어는 `[standard]` 에 들어 있습니다.
</details>

<details>
<summary><b>2. <code>ERROR: [Errno 10048] ... bind on address</code></b></summary>

**원인**: 8000번 포트를 이미 다른 서버가 쓰고 있습니다. 이전 터미널이 안 꺼졌을 가능성이 큽니다.

```powershell
Get-NetTCPConnection -LocalPort 8000 -State Listen | Select-Object OwningProcess
Stop-Process -Id <위에서 나온 번호> -Force
```

또는 그냥 다른 포트로 띄웁니다: `fastapi dev main.py --port 8001`
</details>

<details>
<summary><b>3. <code>{"detail":"Not Found"}</code></b></summary>

**원인**: 그 주소에 연결된 함수가 없습니다. 십중팔구 오타입니다.

- `/hello` (X) → `/hello/철수` (O) — 경로 파라미터는 **생략할 수 없습니다**
- `/docs` 를 열어서 **실제로 있는 주소 목록**을 확인하세요
</details>

<details>
<summary><b>4. 코드를 고쳤는데 반영이 안 됨</b></summary>

- 파일을 **저장**했나요? (`Ctrl + S`)
- 터미널에 `Reloading...` 이 찍혔나요? 안 찍혔다면 `fastapi run` 으로 띄운 것입니다.
  `Ctrl+C` 후 **`fastapi dev`** 로 다시 띄우세요.
- 브라우저 캐시일 수 있습니다. `Ctrl + Shift + R` 로 강력 새로고침.
</details>

<details>
<summary><b>5. <code>{"detail":[{"type":"int_parsing"...}]}</code> 422 에러</b></summary>

## 개념 먼저

### 1. React = 화면을 함수로 만든다

React에서는 화면 조각을 **함수**로 만듭니다. 이 함수를 **컴포넌트**라고 부릅니다.

```tsx
function Hello() {
  return <h1>안녕하세요</h1>;
}
```

함수인데 HTML처럼 생긴 걸 반환하죠? 이 문법이 **JSX**입니다.
자바스크립트 안에 HTML을 쓸 수 있게 해 주는 문법 설탕입니다.

**HTML과 다른 점 3가지** (여기서 제일 많이 틀립니다):

| HTML | JSX | 이유 |
|---|---|---|
| `class="..."` | **`className="..."`** | `class` 는 JS 예약어 |
| `<br>` | **`<br />`** | 모든 태그를 닫아야 함 |
| `<!-- 주석 -->` | **`{/* 주석 */}`** | JSX 안에서는 중괄호 |

그리고 **중괄호 `{}` 안에는 자바스크립트를 쓸 수 있습니다:**

```tsx
const name = "철수";
return <h1>안녕, {name}!</h1>;   // → 안녕, 철수!
```

### 2. Next.js = 폴더 구조가 곧 주소

React만으로는 "어떤 주소에 어떤 화면"인지 정하는 기능이 없습니다.
Next.js는 그걸 **폴더 이름으로** 정합니다.

```
app/
├─ page.tsx           →  /
├─ about/
│   └─ page.tsx       →  /about
└─ notes/
    ├─ page.tsx       →  /notes
    └─ [id]/
        └─ page.tsx   →  /notes/1, /notes/2, ...
```

규칙은 딱 하나: **`page.tsx` 라는 이름의 파일이 있으면 그 폴더가 주소가 됩니다.**

`[id]` 처럼 대괄호를 쓰면 예제 01의 경로 파라미터와 같은 역할입니다.

### 3. layout.tsx = 모든 페이지의 공통 껍데기

```
layout.tsx  ← <html>, <body>, 상단 메뉴, 하단 푸터 (한 번만 씀)
    └─ page.tsx  ← 페이지마다 바뀌는 내용
```

주소를 옮겨 다녀도 `layout.tsx` 는 **다시 그려지지 않습니다.**
그래서 상단 메뉴 같은 걸 여기에 둡니다.

### 4. Tailwind = 클래스로 스타일링

CSS 파일을 따로 만들지 않고, 클래스 이름으로 바로 씁니다.

```tsx
<div className="mt-4 rounded-lg bg-white p-6 text-lg font-bold">
```

| 클래스 | 뜻 | 대응 CSS |
|---|---|---|
| `p-6` | padding 24px | `padding: 1.5rem` |
| `mt-4` | margin-top 16px | `margin-top: 1rem` |
| `text-lg` | 큰 글자 | `font-size: 1.125rem` |
| `flex gap-2` | 가로 배치, 간격 8px | `display:flex; gap:.5rem` |
| `rounded-lg` | 모서리 둥글게 | `border-radius: .5rem` |
| `md:grid-cols-3` | **768px 이상일 때만** 3열 | 미디어 쿼리 |

**숫자 규칙**: 대부분 `1 = 4px` 입니다. `p-4` = 16px, `p-6` = 24px.

> 외울 필요 없습니다. **Tailwind CSS IntelliSense 확장**을 깔았다면
> `className="` 안에서 자동완성이 뜨고, 마우스를 올리면 실제 CSS를 보여 줍니다.

```
frontend/

├─ package.json         설치된 패키지 목록, 실행 명령
├─ next.config.ts       Next.js 설정
├─ tsconfig.json        TypeScript 설정 (@/ 별칭이 여기 정의됨)
└─ node_modules/        설치된 패키지 실체 (열어볼 일 없음)
```

`package.json` 의 `scripts` 를 보세요:

```json
"scripts": {
  "dev": "next dev",       ← npm run dev  (개발용, 자동 새로고침)
  "build": "next build",   ← npm run build (배포용 빌드)
  "start": "next start"    ← 빌드 결과 실행
}
```

### 4단계. 첫 수정 — 손맛 보기

`app/page.tsx` 의 **내용을 전부 지우고** 이렇게만 써 보세요:

```tsx
export default function Home() {
  return <h1>안녕하세요!</h1>;
}
```

저장하면 **브라우저가 알아서 바뀝니다** (새로고침 안 해도 됩니다).

이제 Tailwind를 붙여 봅시다:

```tsx
export default function Home() {
  return (
    <h1 className="mt-20 text-center text-4xl font-bold text-blue-600">
      안녕하세요!
    </h1>
  );
}
```

숫자를 바꿔 가며 뭐가 달라지는지 **직접 확인해 보세요.**
`text-4xl` → `text-6xl`, `text-blue-600` → `text-red-500`, `mt-20` → `mt-4`.

> **`export default` 가 뭔가요?** "이 파일의 대표 함수는 이거야"라는 표시입니다.
> `page.tsx` 는 반드시 `export default` 된 컴포넌트가 하나 있어야 합니다.

### 5단계. ★ shadcn/ui 설치

이제 이번 편의 주인공입니다. **개발 서버는 켜 둔 채로**, 터미널을 하나 더 열어
`frontend` 폴더에서:

```powershell
npx shadcn@latest init
```

프롬프트가 **두 번** 나옵니다. 둘 다 **맨 위 기본값에서 Enter**:

```
? Select a component library »
> Base UI (Recommended)      ← Enter
  React Aria
  Radix UI

? Which preset would you like to use? »
> Nova - Lucide / Geist      ← Enter
  Vega
  Maia
  ...
```

> **프리셋(Nova, Vega...)은 디자인 테마입니다.** 색감과 모서리 둥글기 등이 다릅니다.
> 나중에 마음에 안 들면 바꿀 수 있으니 지금은 Nova로 갑니다.

끝나면 이런 게 생깁니다:

```
✔ Writing components.json.      ← shadcn 설정 파일
✔ Created 1 file: lib\utils.ts  ← 클래스 이름 합치는 도우미 함수
✔ Updating app\globals.css      ← 색상 변수들이 추가됨
```

### 6단계. ★ 컴포넌트 가져오기

```powershell
npx shadcn@latest add button card
```

```
✔ Created 2 files:
  - components\ui\button.tsx
  - components\ui\card.tsx
```

**여기서 멈추고 `components/ui/button.tsx` 를 열어 보세요.**

버튼의 소스 코드가 **통째로 내 프로젝트 안에** 들어와 있습니다.

이게 shadcn/ui의 정체입니다:

| 보통의 UI 라이브러리 | shadcn/ui |
|---|---|
| `npm install` 로 설치 | **소스 코드를 복사해 넣음** |
| `node_modules` 안에 숨어 있음 | `components/ui/` 에 그냥 있음 |
| 디자인을 바꾸려면 우회 방법 필요 | **파일을 직접 고치면 끝** |
| 라이브러리 업데이트가 내 화면을 바꿈 | 내가 안 고치면 안 바뀜 |

> **그래서 shadcn/ui는 `package.json` 에 없습니다.** 라이브러리가 아니라
> "잘 만들어진 컴포넌트를 복붙해 주는 도구"입니다.
> 마음에 안 드는 부분은 그냥 그 파일을 고치면 됩니다.

### 7단계. 완성 페이지 만들기

`app/page.tsx` 를 아래 내용으로 채웁니다.

```tsx
// frontend/app/page.tsx
import { Button } from "@/components/ui/button";
import {
  Card,
  CardContent,
  CardDescription,
  CardFooter,
  CardHeader,
  CardTitle,
} from "@/components/ui/card";

const stack = [
  {
    name: "FastAPI",
    role: "데이터를 다룬다",
    detail: "파이썬으로 API 서버를 만듭니다. 예제 01에서 만들어 봤죠.",
  },
  {
    name: "Next.js + React",
    role: "화면을 만든다",
    detail: "지금 보고 있는 이 페이지가 Next.js로 그려진 화면입니다.",
  },
  {
    name: "Tailwind + shadcn/ui",
    role: "화면을 꾸민다",
    detail: "이 카드와 버튼이 shadcn/ui 컴포넌트입니다.",
  },
];

export default function Home() {
  return (
    <main className="mx-auto max-w-4xl px-6 py-16">
      <h1 className="text-4xl font-bold tracking-tight">나의 첫 Next.js 앱</h1>
      <p className="mt-3 text-muted-foreground">
        아직 백엔드와 연결되지 않았습니다. 연결은 예제 03에서 합니다.
      </p>

      <div className="mt-10 grid grid-cols-1 gap-4 md:grid-cols-3">
        {stack.map((item) => (
          <Card key={item.name}>
            <CardHeader>
              <CardTitle>{item.name}</CardTitle>
              <CardDescription>{item.role}</CardDescription>
            </CardHeader>
            <CardContent>
              <p className="text-sm text-muted-foreground">{item.detail}</p>
            </CardContent>
          </Card>
        ))}
      </div>

      <Card className="mt-10">
        <CardHeader>
          <CardTitle>버튼은 이렇게 생겼습니다</CardTitle>
          <CardDescription>
            variant 를 바꾸면 모양이 바뀝니다. size 도 있습니다.
          </CardDescription>
        </CardHeader>
        <CardContent className="flex flex-wrap gap-2">
          <Button>default</Button>
          <Button variant="secondary">secondary</Button>
          <Button variant="outline">outline</Button>
          <Button variant="ghost">ghost</Button>
          <Button variant="destructive">destructive</Button>
          <Button variant="link">link</Button>
        </CardContent>
        <CardFooter className="flex flex-wrap gap-2">
          <Button size="sm">작은 버튼</Button>
          <Button size="lg">큰 버튼</Button>
        </CardFooter>
      </Card>
    </main>
  );
}
```

**새로 나온 것들:**

| 코드 | 설명 |
|---|---|
| `import { Button } from "@/components/ui/button"` | `@/` 는 프로젝트 최상위 폴더를 가리키는 별칭 |
| `stack.map((item) => ...)` | 배열을 돌면서 화면 조각을 여러 개 만든다 |
| `key={item.name}` | 목록을 그릴 때 **필수**. 없으면 콘솔에 경고가 뜹니다 |
| `text-muted-foreground` | shadcn이 정의한 "흐린 글자색". 다크모드까지 알아서 처리 |
| `variant="outline"` | 컴포넌트에 넘기는 값(props). 모양이 바뀝니다 |

## 흔한 에러

<details open>
<summary><b>1. <code>Module not found: Can't resolve '@/components/ui/button'</code></b></summary>

**원인**: `npx shadcn@latest add button` 을 안 했거나, 다른 폴더에서 실행했습니다.

- `frontend` 폴더 안에서 실행했는지 확인 (`components.json` 이 보이는 곳)
- `components/ui/button.tsx` 파일이 실제로 있는지 확인
</details>

<details>
<summary><b>2. <code>You need to create a components.json file to add components</code></b></summary>

**원인**: `init` 없이 `add` 부터 했습니다. 순서가 있습니다:

```powershell
npx shadcn@latest init    # 먼저 이거
npx shadcn@latest add button card
```
</details>

<details>
<summary><b>3. Tailwind 클래스를 썼는데 아무 변화가 없음</b></summary>

- **오타**를 확인하세요. `text-blue-600` (O) / `text-blue600` (X)
  → Tailwind는 모르는 클래스를 **조용히 무시**합니다. 에러가 안 납니다.
- `class=` 라고 쓰지 않았나요? JSX에서는 **`className=`** 입니다.
- 개발 서버를 껐다 켜 보세요.
</details>

<details>
<summary><b>4. <code>Error: × Unexpected token</code> / JSX 문법 에러</b></summary>

거의 항상 이 셋 중 하나입니다:

- 태그를 안 닫음 → `<br>` 대신 `<br />`
- **반환값이 두 덩어리** → JSX는 **하나의 태그로 감싸야** 합니다

  ```tsx
  return (
    <>            {/* ← 이 빈 태그(Fragment)로 감싸면 됩니다 */}
      <h1>제목</h1>
      <p>내용</p>
    </>
  );
  ```
- `return` 뒤에 바로 줄바꿈 → `return (` 처럼 **괄호를 열고** 줄을 바꾸세요
</details>

<details>
<summary><b>5. <code>Warning: Each child in a list should have a unique "key" prop</code></b></summary>

`.map()` 으로 목록을 그릴 때 `key` 를 안 준 것입니다.
에러는 아니지만 **반드시 고치세요.** 나중에 목록이 이상하게 갱신되는 버그의 원인이 됩니다.

```tsx
{stack.map((item) => <Card key={item.name}>...</Card>)}
```
</details>

<details>
<summary><b>6. 포트 3000이 아니라 3001로 열림</b></summary>

3000번이 이미 쓰이고 있으면 Next.js가 알아서 다음 번호로 갑니다.
**터미널에 찍힌 주소를 그대로** 쓰면 됩니다. 굳이 3000을 비우고 싶다면
[00-setup.md의 8번](00-setup.md#8-터미널-2개-쓰기) 참고.
</details>

## 개념 먼저: 서버 컴포넌트 vs 클라이언트 컴포넌트

**이 부분이 Next.js App Router에서 가장 많이 막히는 지점입니다.** 천천히 읽어 주세요.

### 두 가지 컴포넌트가 있다

App Router에서 만드는 모든 컴포넌트는 **기본이 서버 컴포넌트**입니다.

```
┌─ 서버 컴포넌트 (기본값, 아무것도 안 붙임) ─────────────┐
│  실행 위치 : Next.js 서버 (내 컴퓨터의 node)          │
│  할 수 있음: async/await, DB 접근, 비밀 키 사용        │
│  할 수 없음: onClick, useState, useEffect             │
│  브라우저로 : 결과 HTML만 전송 (코드는 안 감)          │
└──────────────────────────────────────────────────┘

┌─ 클라이언트 컴포넌트 (맨 위에 "use client") ──────────┐
│  실행 위치 : 브라우저                                 │
│  할 수 있음: onClick, useState, useEffect, 애니메이션  │
│  할 수 없음: 비밀 키 사용 (다 노출됨)                  │
│  브라우저로 : JS 코드가 실제로 전송됨                   │
└──────────────────────────────────────────────────┘
```

### 언제 `"use client"` 를 붙이나?

아래 중 **하나라도 필요하면** 붙입니다. 아니면 붙이지 마세요.

- `onClick`, `onChange` 같은 **이벤트 핸들러**
- `useState`, `useEffect`, `useRouter` 등 **훅(hook)**
- `window`, `localStorage` 같은 **브라우저 전용 객체**

> **왜 아끼나요?** 클라이언트 컴포넌트는 그 코드가 브라우저로 전송됩니다.
> 다 클라이언트로 만들면 페이지가 무거워지고, 서버 컴포넌트의 장점(빠른 첫 화면, 비밀 유지)이 사라집니다.

### 실전 요령: 필요한 부분만 잘라 낸다

이번 예제의 구조가 정확히 그 패턴입니다.

```
page.tsx                     ← 서버 컴포넌트 (데이터를 가져와 그림)
  └─ <RefreshButton />       ← 클라이언트 컴포넌트 (클릭만 담당)
```

**"버튼 하나 때문에 페이지 전체를 클라이언트로 만들지 않는다."**
이게 App Router를 쓰는 방식입니다.

> 반대로 클라이언트 컴포넌트 **안에** 서버 컴포넌트를 직접 넣을 수는 없습니다.
> (`children` 으로 넘기는 우회법이 있지만 지금은 몰라도 됩니다.)

    {"id": 2, "text": "시작이 반이다.", "author": "아리스토텔레스"},
    {"id": 3, "text": "천재는 1%의 영감과 99%의 노력이다.", "author": "에디슨"},
    {"id": 4, "text": "가장 큰 위험은 위험 없는 삶이다.", "author": "스티븐 코비"},

    return {"message": "명언 API 입니다. /quotes/random 을 호출해 보세요."}

### 3단계. 프론트엔드 뼈대

**새 터미널**을 엽니다 (VS Code 터미널 패널의 `+`).

### 4단계. 환경변수

백엔드 주소를 코드에 직접 박지 않고 **설정 파일**로 뺍니다.
배포할 때 주소가 바뀌기 때문입니다(예제 20).

`frontend/.env.local` 파일을 새로 만듭니다:

```
NEXT_PUBLIC_API_URL=http://127.0.0.1:8000
```

**규칙 두 가지:**

| 규칙 | 이유 |
|---|---|
| `NEXT_PUBLIC_` 으로 시작해야 브라우저에서 읽힌다 | Next.js 약속 |
| **비밀 값에는 절대 `NEXT_PUBLIC_` 을 붙이지 않는다** | 브라우저에 그대로 노출됨 |

> ⚠️ **`.env.local` 을 고치면 개발 서버를 껐다 켜야 합니다.** 자동 반영 안 됩니다.
> "분명 고쳤는데 안 바뀌어요"의 90%가 이것입니다.
>
> `.env.local` 은 `.gitignore` 에 이미 들어 있어서 깃에 올라가지 않습니다. 의도된 동작입니다.

### 5단계. API 호출 함수 모으기

`frontend/lib/api.ts` 를 새로 만듭니다. (`lib` 폴더가 없으면 만드세요.)

```ts
// frontend/lib/api.ts
export const API_URL =
  process.env.NEXT_PUBLIC_API_URL ?? "http://127.0.0.1:8000";

export type Quote = {
  id: number;
  text: string;
  author: string;
};

export async function getRandomQuote(): Promise<Quote> {
  const res = await fetch(`${API_URL}/quotes/random`, {
    cache: "no-store",
  });

  if (!res.ok) {
    throw new Error(`백엔드 응답 오류: ${res.status}`);
  }

  return res.json();
}
```

**세 가지 짚고 갑니다:**

1. **`type Quote`** — 백엔드가 주는 JSON의 모양을 타입으로 적어 둡니다.
   이걸 해 두면 `quote.` 만 쳐도 `text`, `author` 가 자동완성됩니다.
   백엔드와 모양이 다르면 여기가 **거짓말**이 되니 항상 맞춰 주세요.

2. **`cache: "no-store"`** — "캐시하지 마라". 없으면 새로고침해도
   같은 명언만 계속 나올 수 있습니다.

3. **`if (!res.ok)`** — ★중요★ `fetch` 는 404나 500을 받아도 **예외를 던지지 않습니다.**
   "요청은 성공했고 응답이 404였을 뿐"으로 봅니다.
   그래서 `res.ok` 를 **직접** 확인해야 합니다. 초보자가 가장 많이 놓치는 부분입니다.

### 6단계. 서버 컴포넌트로 화면 그리기

`frontend/app/page.tsx` 를 전부 지우고:

```tsx

import { getRandomQuote, type Quote } from "@/lib/api";

  let error: string | null = null;

  try {
    quote = await getRandomQuote();
  } catch {
    error = "백엔드 서버에 연결할 수 없습니다.";

  return (
    <main className="mx-auto max-w-2xl px-6 py-16">
      <h1 className="text-3xl font-bold tracking-tight">오늘의 명언</h1>
      <p className="mt-2 text-sm text-muted-foreground">
        이 문장은 FastAPI 서버에서 가져온 것입니다.
      </p>

      {error ? (
        <Card className="mt-8 border-destructive/40">
          <CardHeader>

```

**여기서 놀라야 할 부분:**

```tsx
export default async function Home() {
  const quote = await getRandomQuote();
```

**컴포넌트 함수에 `async` 가 붙어 있습니다.** 그리고 `await` 를 바로 씁니다.

React를 조금 해 본 사람이라면 이게 이상하게 느껴질 겁니다.
원래는 `useEffect` 안에서 fetch하고, `useState` 로 담고, 로딩 상태를 관리해야 했죠.
**서버 컴포넌트에서는 그냥 `await` 하면 끝입니다.**

`{조건 ? A : B}` 는 삼항 연산자입니다. JSX 안에서 `if` 를 쓸 수 없어서
"조건에 따라 다른 화면"은 이렇게 씁니다.

```powershell
npm run dev
```

http://localhost:3000 에서 명언이 보이면 성공입니다. 🎉

### 7단계. ★ CORS의 정체

여기서 **아주 중요한 걸** 확인합니다.

우리는 CORS 설정을 **아직 안 했는데도** 화면이 잘 나왔습니다. 왜일까요?

```
      ❌ 이렇게 동작한 게 아닙니다
      브라우저 ────fetch────> :8000

      ⭕ 실제로는 이렇게 동작했습니다
      브라우저 ──> Next 서버(:3000) ──fetch──> :8000
                        └─ 여기서 fetch가 일어남
```

`page.tsx` 는 **서버 컴포넌트**라서, `fetch` 를 실행한 주체가 브라우저가 아니라
**Next.js 서버(node)** 입니다. CORS는 **브라우저의 보안 규칙**이므로 적용되지 않습니다.

**이제 브라우저가 직접 부르게 해 봅시다.**

1. http://localhost:3000 에서 **F12** 를 눌러 개발자 도구 → **Console** 탭
2. 아래를 붙여넣고 Enter:

```js
fetch("http://127.0.0.1:8000/quotes/random").then(r => r.json()).then(console.log)
```

이런 빨간 에러가 나옵니다:

```
Access to fetch at 'http://127.0.0.1:8000/quotes/random' from origin
'http://localhost:3000' has been blocked by CORS policy:
No 'Access-Control-Allow-Origin' header is present on the requested resource.
```

**이게 CORS 에러입니다.** 이번 편에서 꼭 한 번 보고 넘어가야 할 화면입니다.

#### 왜 막나요?

브라우저는 "A 사이트에서 받은 코드가 B 서버를 마음대로 부르는 것"을 기본적으로 막습니다.
안 그러면 악성 사이트가 여러분이 로그인해 둔 은행 사이트에 몰래 요청을 보낼 수 있으니까요.

**출처(origin)** = `프로토콜 + 호스트 + 포트`. 셋 중 **하나라도** 다르면 남남입니다.

| A | B | 같은 출처? |
|---|---|---|
| `http://localhost:3000` | `http://localhost:8000` | ❌ 포트가 다름 |
| `http://localhost:3000` | `http://127.0.0.1:3000` | ❌ 호스트 표기가 다름 |
| `http://localhost:3000` | `https://localhost:3000` | ❌ 프로토콜이 다름 |

#### 어디서 푸나요?

**★ 서버에서 풉니다. 프론트엔드에서는 아무것도 할 수 없습니다. ★**

"백엔드가 '3000번은 내 손님이야'라고 응답 헤더에 적어 주면, 브라우저가 통과시켜 준다"
— 이게 CORS의 전부입니다.

`backend/main.py` 상단을 이렇게 고칩니다:

```python
import random

from fastapi import FastAPI
from fastapi.middleware.cors import CORSMiddleware   # ← 추가

app = FastAPI(title="명언 API")

# ── 여기부터 추가 ──────────────────────────────
origins = [
    "http://localhost:3000",
    "http://127.0.0.1:3000",
]

app.add_middleware(
    CORSMiddleware,
    allow_origins=origins,
    allow_credentials=True,
    allow_methods=["*"],
    allow_headers=["*"],
)
# ── 여기까지 ──────────────────────────────────
```

저장하면 백엔드가 자동 재시작됩니다. **브라우저 콘솔에서 아까 그 fetch를 다시 실행**해 보세요.
이번엔 명언 객체가 찍힙니다. ✅

> **`localhost` 와 `127.0.0.1` 을 둘 다 넣은 이유**: 같은 컴퓨터를 가리키지만
> 브라우저는 **다른 출처로 취급**합니다. 하나만 넣으면 주소창에 뭘 쳤느냐에 따라 막힙니다.
>
> **`allow_origins=["*"]` 로 다 열면 안 되나요?** 개발 중엔 편하지만,
> `allow_credentials=True` 와 **함께 쓰면 동작하지 않습니다**(브라우저 규칙).
> 그리고 배포할 땐 반드시 실제 도메인만 적어야 합니다. 예제 20에서 다시 다룹니다.

지금 화면은 서버 컴포넌트라 CORS 없이도 돌아가지만,
**예제 05부터는 브라우저가 직접 POST/DELETE를 보내므로** 이 설정이 반드시 필요합니다.

### 8단계. 클라이언트 컴포넌트 — 새로고침 버튼

이제 "다른 명언 보기" 버튼을 만듭니다. **클릭**이 필요하므로 클라이언트 컴포넌트입니다.

`frontend/components/refresh-button.tsx`:

```tsx
// frontend/components/refresh-button.tsx
"use client";

import { useRouter } from "next/navigation";
import { useState, useTransition } from "react";

import { Button } from "@/components/ui/button";

export function RefreshButton() {
  const router = useRouter();
  const [isPending, startTransition] = useTransition();
  const [count, setCount] = useState(0);

  function handleClick() {
    setCount((c) => c + 1);
    startTransition(() => {
      router.refresh();
    });
  }

  return (
    <div className="flex items-center gap-3">
      <Button onClick={handleClick} disabled={isPending}>
        {isPending ? "가져오는 중..." : "다른 명언 보기"}
      </Button>
      <span className="text-sm text-muted-foreground">{count}번 눌렀습니다</span>
    </div>
  );
}
```

**`router.refresh()` 가 하는 일**: "서버 컴포넌트를 다시 실행해서 데이터를 새로 받아 와라".
브라우저 새로고침(F5)과 다릅니다. 페이지 전체를 다시 불러오지 않고,
**서버에서 받은 부분만 갈아 끼웁니다.** 입력 중이던 값 같은 건 유지됩니다.

`page.tsx` 에서 이 버튼을 씁니다. import를 추가하고:

```tsx
import { RefreshButton } from "@/components/refresh-button";
```

`</main>` 바로 위에 넣습니다:

```tsx
      <div className="mt-6">
        <RefreshButton />
      </div>
    </main>
```

버튼을 눌러 보세요. 명언이 바뀌고 카운터가 올라갑니다.

**지금 무슨 일이 일어났는지 정리하면:**

1. 브라우저에서 버튼 클릭 (클라이언트 컴포넌트)
2. `router.refresh()` → Next 서버에 "다시 그려 줘" 요청
3. Next 서버가 `page.tsx` 를 다시 실행 → FastAPI에 `fetch`
4. 새 명언이 담긴 조각을 브라우저로 전송, 화면 갈아 끼움
5. `count` 상태는 **그대로 유지** (클라이언트 컴포넌트니까)

## 흔한 에러

<details open>
<summary><b>1. <code>blocked by CORS policy</code></b></summary>

브라우저가 직접 백엔드를 부를 때 나옵니다. **백엔드**에서 풉니다.

- `app.add_middleware(CORSMiddleware, ...)` 를 넣었나요?
- `allow_origins` 에 **정확한 주소**가 있나요? 포트까지 일치해야 합니다.
- 3000이 아니라 3001로 떴다면 `"http://localhost:3001"` 도 추가해야 합니다.
- 백엔드가 재시작됐나요? 터미널에 `Reloading...` 확인.
</details>

<details>
<summary><b>2. 화면에 "백엔드 서버에 연결할 수 없습니다"</b></summary>

- 백엔드 터미널이 살아 있나요? http://127.0.0.1:8000/health 를 직접 열어 확인
- `.env.local` 의 주소에 오타는 없나요? **끝에 슬래시(`/`)를 붙이면 안 됩니다**
  → `http://127.0.0.1:8000/` (X), `http://127.0.0.1:8000` (O)
- `.env.local` 을 만든 뒤 **프론트 서버를 껐다 켰나요?**
</details>

<details>
<summary><b>3. <code>Error: Event handlers cannot be passed to Client Component props</code><br>
또는 <code>You're importing a component that needs useState</code></b></summary>

**서버 컴포넌트에서 `onClick`이나 `useState` 를 쓴 것입니다.**

해당 파일 맨 위(모든 import보다도 위)에 `"use client";` 를 추가하세요.

```tsx
"use client";       // ← 반드시 첫 줄

import { useState } from "react";
```
</details>

<details>
<summary><b>4. 새로고침해도 명언이 안 바뀜</b></summary>

`cache: "no-store"` 를 빼먹었을 가능성이 큽니다.
Next.js가 응답을 캐시해 두고 재사용하는 것입니다.

```ts
const res = await fetch(url, { cache: "no-store" });
```
</details>

<details>
<summary><b>5. <code>'quote' is possibly 'null'</code> (TypeScript 에러)</b></summary>

`quote` 를 `Quote | null` 로 선언했기 때문에, TypeScript가
"null일 수도 있는데 `.text` 를 읽어도 되냐"고 묻는 것입니다.

교재에서는 `quote!.text` 처럼 **`!`** 를 썼습니다.
"내가 확인했으니 null 아니야"라고 알려 주는 표시입니다.
(`error` 가 없을 때만 이 분기에 들어오니 실제로 안전합니다.)
</details>

<details>
<summary><b>6. 한글이 깨져 보임</b></summary>

`.env.local` 이나 `main.py` 를 저장할 때 인코딩 문제일 수 있습니다.
VS Code 우측 하단의 인코딩 표시가 **UTF-8** 인지 확인하세요.
</details>

### ★ 문제 1 — 전체 목록 페이지

`/quotes` 주소에 명언 전체를 목록으로 보여 주세요.

- 백엔드의 `GET /quotes` 를 씁니다 (`{"total": 5, "items": [...]}` 모양)
- `app/quotes/page.tsx` 를 만드세요
- `lib/api.ts` 에 `getQuotes()` 함수를 추가하세요

> 힌트: 응답 모양이 다르니 타입도 새로 필요합니다.
> `type QuoteList = { total: number; items: Quote[] }`

### ★★ 문제 2 — 작성자로 검색

백엔드에 `GET /quotes?author=에디슨` 을 추가하고, 프론트에서 쓰세요.

```python
@app.get("/quotes")
def list_quotes(limit: int = 10, author: str | None = None):
    items = QUOTES
    if author:
        items = [q for q in items if author in q["author"]]
    return {"total": len(items), "items": items[:limit]}
```

> `author: str | None = None` → "안 넘겨도 되는 파라미터".
> `/docs` 에서 어떻게 표시되는지 확인해 보세요.

### ★★★ 문제 3 — 클라이언트에서 직접 가져오기

`RefreshButton` 을 고쳐서, `router.refresh()` 대신
**버튼이 직접 `fetch` 로 명언을 가져와** 화면에 표시하게 만들어 보세요.

```tsx
"use client";
const [quote, setQuote] = useState<Quote | null>(null);

async function handleClick() {
  const res = await fetch(`${API_URL}/quotes/random`);
  setQuote(await res.json());
}
```

**이건 CORS 설정이 없으면 실패합니다.** 7단계에서 넣은 설정이 여기서 진짜로 쓰입니다.
시험 삼아 `main.py` 의 `add_middleware` 를 잠깐 주석 처리하고 확인해 보세요.

그리고 스스로 답해 보세요:

> 서버 컴포넌트 방식과 클라이언트 fetch 방식, **각각의 장단점은 뭘까?**

## 개념 먼저: `useState` — 화면이 기억하는 값

### 왜 그냥 변수로는 안 되나?

이렇게 하면 될 것 같죠. **안 됩니다.**

```tsx
let count = 0;                       // ❌ 이렇게 하면

function Counter() {
  return <button onClick={() => count++}>{count}</button>;
}
```

숫자는 올라가지만 **화면이 안 바뀝니다.**
React는 "값이 변했으니 다시 그려야겠다"는 걸 **모르기 때문**입니다.

### `useState` 는 React에게 알려 주는 장치입니다

```tsx
const [count, setCount] = useState(0);
//     └─┬─┘  └───┬──┘          └┬┘
//    지금 값  바꾸는 함수      맨 처음 값
```

```tsx
"use client";
import { useState } from "react";

export function Counter() {
  const [count, setCount] = useState(0);

  return <button onClick={() => setCount(count + 1)}>{count}번</button>;
}
```

이제 됩니다. `setCount` 를 부르면 React가:

1. `count` 값을 바꾸고
2. **이 컴포넌트 함수를 처음부터 다시 실행해서**
3. 화면을 새로 그립니다

> **★ 중요**: 컴포넌트 함수는 화면을 그릴 때마다 **통째로 다시 실행됩니다.**
> `useState(0)` 도 매번 실행되지만, **처음 한 번만** 0으로 시작하고
> 그 뒤로는 React가 기억해 둔 값을 돌려줍니다.

### 규칙 세 가지

| 규칙 | 왜 |
|---|---|
| `"use client"` 가 있는 파일에서만 | 훅은 브라우저에서 도는 기능입니다 |
| 컴포넌트 **맨 위**에서 부른다 | `if` 나 `for` 안에서 부르면 안 됩니다 |
| **직접 바꾸지 않는다** | `count = 5` (X) / `setCount(5)` (O) |

### 상태가 여러 개면 `useState` 도 여러 개

```tsx
const [a, setA] = useState("");
const [b, setB] = useState("");
const [op, setOp] = useState("add");
```

하나에 몰아넣지 말고 **의미 단위로 나누세요.** 읽기 훨씬 쉽습니다.

`backend/main.py`:

```python
# backend/main.py
from fastapi import FastAPI, HTTPException
from fastapi.middleware.cors import CORSMiddleware

app = FastAPI(title="계산기 API")

origins = [
    "http://localhost:3000",
    "http://127.0.0.1:3000",
]

app.add_middleware(
    CORSMiddleware,
    allow_origins=origins,
    allow_credentials=True,
    allow_methods=["*"],
    allow_headers=["*"],
)


@app.get("/calc")
def calc(a: float, b: float, op: str = "add"):
    if op == "add":
        result = a + b
    elif op == "sub":
        result = a - b
    elif op == "mul":
        result = a * b
    elif op == "div":
        if b == 0:
            raise HTTPException(status_code=400, detail="0으로 나눌 수 없습니다.")
        result = a / b
    else:
        raise HTTPException(status_code=400, detail=f"모르는 연산입니다: {op}")

    return {"a": a, "b": b, "op": op, "result": round(result, 6)}


@app.get("/health")
def health():
    return {"status": "ok"}
```

**새로 나온 것: `HTTPException`**

```python
raise HTTPException(status_code=400, detail="0으로 나눌 수 없습니다.")
```

`raise` 는 "에러를 내라"는 파이썬 명령입니다. FastAPI가 이걸 받아서
브라우저에 이렇게 보냅니다:

```json
{"detail": "0으로 나눌 수 없습니다."}
```

**왜 400인가요?** 숫자로 상황을 구분하는 약속이 있습니다.

| 번호 | 뜻 | 누구 잘못 |
|---|---|---|
| **200** | 잘 됐다 | – |
| **400** | 요청이 잘못됐다 | **보낸 쪽** |
| **404** | 그런 거 없다 | 보낸 쪽 |
| **422** | 형식이 안 맞는다 (FastAPI가 자동으로) | 보낸 쪽 |
| **500** | 서버가 터졌다 | **서버** |

0으로 나눈 건 **사용자가 잘못 보낸 것**이니 400입니다.
`if b == 0` 검사를 안 하면 파이썬이 `ZeroDivisionError` 를 내고 **500**이 나가는데,
그건 "서버가 터졌다"는 뜻이라 잘못된 신호입니다.

```powershell
fastapi dev main.py
```

http://127.0.0.1:8000/docs 에서 `/calc` 를 눌러 직접 테스트해 보세요.
`b` 에 0을 넣고 `op` 를 `div` 로 하면 400이 나옵니다.

### 4단계. API 함수

`frontend/lib/api.ts`:

```ts
// frontend/lib/api.ts
export const API_URL =
  process.env.NEXT_PUBLIC_API_URL ?? "http://127.0.0.1:8000";

export type CalcResult = {
  a: number;
  b: number;
  op: string;
  result: number;
};

export async function calc(
  a: number,
  b: number,
  op: string
): Promise<CalcResult> {
  const res = await fetch(`${API_URL}/calc?a=${a}&b=${b}&op=${op}`);

  if (!res.ok) {
    const body = await res.json().catch(() => null);
    throw new Error(body?.detail ?? `서버 오류 (${res.status})`);
  }

  return res.json();
}
```

**여기가 예제 03보다 한 발 나갔습니다.**

```ts
const body = await res.json().catch(() => null);
throw new Error(body?.detail ?? `서버 오류 (${res.status})`);
```

- 백엔드가 보낸 `{"detail": "0으로 나눌 수 없습니다."}` 에서 **메시지를 꺼내** 던집니다
- `body?.detail` — `body` 가 `null` 이면 그냥 `undefined` (에러 안 남). **옵셔널 체이닝**입니다
- `?? "서버 오류..."` — 그것도 없으면 기본 문구

이렇게 해 두면 **백엔드가 정한 메시지가 그대로 화면에 뜹니다.**

### 5단계. ★ 계산기 컴포넌트

`frontend/components/calculator.tsx` 를 새로 만듭니다.
길지만 **한 덩어리씩** 설명하니 따라오세요.

```tsx
// frontend/components/calculator.tsx
"use client";

import { useState } from "react";

import { Button } from "@/components/ui/button";
import {
  Card,
  CardContent,
  CardDescription,
  CardHeader,
  CardTitle,
} from "@/components/ui/card";
import { Input } from "@/components/ui/input";
import { Label } from "@/components/ui/label";
import { calc } from "@/lib/api";

const OPS = [
  { id: "add", symbol: "＋", name: "더하기" },
  { id: "sub", symbol: "－", name: "빼기" },
  { id: "mul", symbol: "×", name: "곱하기" },
  { id: "div", symbol: "÷", name: "나누기" },
];

export function Calculator() {
  const [a, setA] = useState("");
  const [b, setB] = useState("");
  const [op, setOp] = useState("add");

  const [result, setResult] = useState<number | null>(null);
  const [error, setError] = useState<string | null>(null);
  const [loading, setLoading] = useState(false);

  const canSubmit = a.trim() !== "" && b.trim() !== "" && !loading;

  async function handleSubmit(event: React.FormEvent) {
    event.preventDefault();

    setError(null);
    setResult(null);
    setLoading(true);

    try {
      const data = await calc(Number(a), Number(b), op);
      setResult(data.result);
    } catch (err) {
      setError(err instanceof Error ? err.message : "알 수 없는 오류입니다.");
    } finally {
      setLoading(false);
    }
  }

  return (
    <Card>
      <CardHeader>
        <CardTitle>계산기</CardTitle>
        <CardDescription>
          계산은 브라우저가 아니라 FastAPI 서버가 합니다.
        </CardDescription>
      </CardHeader>

      <CardContent>
        <form onSubmit={handleSubmit} className="flex flex-col gap-5">
          <div className="grid grid-cols-2 gap-3">
            <div className="flex flex-col gap-2">
              <Label htmlFor="a">첫 번째 숫자</Label>
              <Input
                id="a"
                type="number"
                value={a}
                onChange={(e) => setA(e.target.value)}
                placeholder="0"
              />
            </div>

            <div className="flex flex-col gap-2">
              <Label htmlFor="b">두 번째 숫자</Label>
              <Input
                id="b"
                type="number"
                value={b}
                onChange={(e) => setB(e.target.value)}
                placeholder="0"
              />
            </div>
          </div>

          <div className="flex flex-col gap-2">
            <Label>연산</Label>
            <div className="flex gap-2">
              {OPS.map((item) => (
                <Button
                  key={item.id}
                  type="button"
                  variant={op === item.id ? "default" : "outline"}
                  onClick={() => setOp(item.id)}
                  className="flex-1"
                >
                  <span className="mr-1">{item.symbol}</span>
                  {item.name}
                </Button>
              ))}
            </div>
          </div>

          <Button type="submit" disabled={!canSubmit}>
            {loading ? "계산 중..." : "계산하기"}
          </Button>
        </form>

        {error && (
          <p className="mt-5 rounded-md bg-destructive/10 px-4 py-3 text-sm text-destructive">
            {error}
          </p>
        )}

        {result !== null && (
          <div className="mt-5 rounded-md bg-muted px-4 py-3">
            <p className="text-sm text-muted-foreground">결과</p>
            <p className="text-3xl font-semibold tabular-nums">{result}</p>
          </div>
        )}
      </CardContent>
    </Card>
  );
}
```

## 코드 뜯어보기

### ① 제어 컴포넌트 — 입력칸과 상태를 묶는다

```tsx
<Input value={a} onChange={(e) => setA(e.target.value)} />
```

이 **두 개가 한 쌍**입니다.

```
     사용자가 타이핑
          │
          ▼
   onChange 발생 → setA("3") → 상태가 "3"
          │
          ▼
   컴포넌트 다시 그림 → value={a} 이므로 칸에 "3" 표시
```

**화면에 보이는 글자의 출처는 입력칸이 아니라 `a` 라는 상태입니다.**
입력칸은 그저 상태를 비추는 거울입니다. 이걸 **제어 컴포넌트**라고 합니다.

> **`value` 만 주고 `onChange` 를 안 주면** 아무리 타이핑해도 글자가 안 써집니다.
> (상태가 안 바뀌니 거울도 안 바뀌죠.) 자주 하는 실수이고, 콘솔에 경고도 뜹니다.

`e.target.value` 는 "이벤트가 일어난 요소(`target`)의 현재 값"입니다.

### ② `event.preventDefault()` — 페이지 새로고침 막기

```tsx
async function handleSubmit(event: React.FormEvent) {
  event.preventDefault();
```

HTML `<form>` 은 원래 제출되면 **페이지를 새로고침**합니다. 20년 전 방식이죠.
이걸 막지 않으면 계산 결과가 뜨자마자 화면이 초기화됩니다.

**증상**: 버튼을 누르면 화면이 깜빡하고 입력값이 사라짐 → `preventDefault()` 를 빠뜨린 것입니다.

### ③ `type="button"` — 이거 빠뜨리면 고생합니다

```tsx
<Button type="button" onClick={() => setOp(item.id)}>
```

`<form>` 안의 버튼은 **기본이 `type="submit"`** 입니다.
연산 고르는 버튼에 `type="button"` 을 안 붙이면, 누를 때마다 폼이 제출됩니다.

| 위치 | type | 결과 |
|---|---|---|
| 연산 선택 버튼 | `"button"` | 상태만 바꿈 |
| 계산하기 버튼 | `"submit"` | 폼 제출 → `handleSubmit` 실행 |

### ④ 상태로 스타일 바꾸기

```tsx
variant={op === item.id ? "default" : "outline"}
```

"지금 고른 연산이면 진하게, 아니면 테두리만." **삼항 연산자**입니다.

`setOp("mul")` 을 부르면 → 컴포넌트가 다시 그려지고 → 이 줄이 다시 계산되어
곱하기 버튼만 진해집니다. **상태가 화면을 만든다**는 걸 눈으로 보는 부분입니다.

### ⑤ 세 가지 상태: 로딩 · 에러 · 결과

서버를 부르는 화면은 **항상 이 세 가지를 생각해야 합니다.**

```tsx
setError(null);      // 이전 에러 지우기
setResult(null);     // 이전 결과 지우기
setLoading(true);    // 로딩 시작

try {
  const data = await calc(...);
  setResult(data.result);        // 성공
} catch (err) {
  setError(err.message);         // 실패
} finally {
  setLoading(false);             // 성공이든 실패든 로딩은 끝
}
```

`finally` 는 **성공하든 실패하든 반드시 실행**됩니다.
`try` 안에만 `setLoading(false)` 를 넣으면, 에러가 났을 때 영원히 "계산 중..."이 됩니다.

### ⑥ 조건부 렌더링 — `&&` 와 `? :`

```tsx
{error && <p>{error}</p>}
```

"`error` 가 있으면 `<p>` 를 그려라." `error` 가 `null` 이면 아무것도 안 그립니다.

```tsx
{result !== null && <div>{result}</div>}
```

> **⚠️ 왜 `{result && ...}` 가 아니라 `{result !== null && ...}` 인가요?**
> 계산 결과가 **0** 이면 `0 && ...` 은 `0` 이 되고, React는 **화면에 `0` 을 그려 버립니다.**
> 숫자 상태를 다룰 땐 반드시 `!== null` 로 명확하게 쓰세요. 유명한 함정입니다.

### ⑦ `disabled` — 못 누르게 막기

```tsx
const canSubmit = a.trim() !== "" && b.trim() !== "" && !loading;

<Button type="submit" disabled={!canSubmit}>
```

- 빈 칸이 있으면 못 누름
- **이미 계산 중이면 못 누름** ← 중복 요청 방지. 실무에서 꼭 필요합니다

## 흔한 에러

<details open>
<summary><b>1. 버튼을 누르면 화면이 깜빡이고 입력이 사라진다</b></summary>

`event.preventDefault()` 를 빠뜨렸습니다. 폼의 기본 동작(새로고침)이 일어난 것입니다.

```tsx
async function handleSubmit(event: React.FormEvent) {
  event.preventDefault();   // ← 첫 줄에
```
</details>

<details>
<summary><b>2. 연산 버튼을 눌렀는데 계산이 실행된다</b></summary>

`type="button"` 이 없습니다. 폼 안의 버튼은 기본이 submit입니다.
</details>

<details>
<summary><b>3. 입력칸에 글자가 안 써진다</b></summary>

`value` 는 줬는데 `onChange` 를 안 준 것입니다. 둘은 한 쌍입니다.

```tsx
<Input value={a} onChange={(e) => setA(e.target.value)} />
```
</details>

<details>
<summary><b>4. <code>You're importing a component that needs useState</code></b></summary>

파일 맨 위에 `"use client";` 가 없습니다. **모든 import보다 위**에 있어야 합니다.
</details>

<details>
<summary><b>5. <code>Too many re-renders</code></b></summary>

`onClick` 에 함수를 **넘기지 않고 실행**해 버린 것입니다.

```tsx
onClick={setOp("add")}          // ❌ 그리자마자 실행 → 무한 반복
onClick={() => setOp("add")}    // ✅ "누르면 실행할 함수"를 넘김
```

`() =>` 를 빠뜨리는 실수입니다.
</details>

<details>
<summary><b>6. 결과가 0인데 아무것도 안 보인다</b></summary>

`{result && ...}` 로 썼습니다. `0` 은 거짓으로 취급됩니다.
`{result !== null && ...}` 로 고치세요.
</details>

<details>
<summary><b>7. 계산 중인데 "계산 중..."에서 안 바뀐다</b></summary>

`setLoading(false)` 를 `finally` 가 아니라 `try` 안에 넣었고, 에러가 난 것입니다.
</details>

## 개념 먼저

### CRUD — 데이터로 할 수 있는 네 가지

| 한글 | 영어 | HTTP 메서드 | 이번 예제 |
|---|---|---|---|
| 만들기 | **C**reate | `POST` | `POST /notes` |
| 읽기 | **R**ead | `GET` | `GET /notes`, `GET /notes/1` |
| 고치기 | **U**pdate | `PATCH` (또는 `PUT`) | `PATCH /notes/1` |
| 지우기 | **D**elete | `DELETE` | `DELETE /notes/1` |

**주소는 "무엇"을, 메서드는 "무엇을 할지"를 말합니다.**

```
GET    /notes      →  메모 목록 줘
POST   /notes      →  메모 새로 만들어
GET    /notes/3    →  3번 메모 줘
PATCH  /notes/3    →  3번 메모 고쳐
DELETE /notes/3    →  3번 메모 지워
```

`/notes/3/delete` 같은 주소를 만들지 않습니다. **주소는 명사, 동작은 메서드**입니다.

> **`PUT` 과 `PATCH` 의 차이**
> `PUT` = 통째로 갈아끼우기 (안 보낸 항목은 사라짐)
> `PATCH` = 보낸 것만 고치기
> 우리는 "제목만 고치기"를 하고 싶으니 **`PATCH`** 를 씁니다.

### 요청 본문(body) — 주소에 담을 수 없는 것

지금까지는 값을 **주소에** 실어 보냈습니다.

```
GET /calc?a=3&b=4
```

그런데 메모 내용이 500자라면? 주소에 넣을 수 없습니다.
그래서 `POST` 는 값을 **본문**에 실어 보냅니다.

```
POST /notes
Content-Type: application/json

{"title": "장보기", "content": "우유, 계란"}
```

- 주소에 안 보이니 **길어도 됩니다**
- 브라우저 기록·서버 로그에 안 남습니다 (비밀번호를 GET으로 안 보내는 이유)

### Pydantic 모델 — 본문의 모양을 정하는 법

쿼리 파라미터는 `a: int` 로 끝났지만, 본문은 구조가 있으므로 **클래스**로 적습니다.

```python
from pydantic import BaseModel

class NoteCreate(BaseModel):
    title: str
    content: str = ""
```

이렇게 해 두면 FastAPI가 알아서:

1. 들어온 JSON을 `NoteCreate` 로 **변환**하고
2. `title` 이 없거나 타입이 틀리면 **422로 거절**하고
3. `/docs` 에 **입력 예시까지 만들어 줍니다**

예제 01의 타입 힌트와 완전히 같은 원리입니다. 대상이 본문으로 바뀌었을 뿐입니다.

**`routers/__init__.py`** 를 만드세요. **내용은 비워도 됩니다.**

### 3단계. `routers/notes.py`

```python
# backend/routers/notes.py
from datetime import datetime

from fastapi import APIRouter, HTTPException
from pydantic import BaseModel, Field

router = APIRouter(prefix="/notes", tags=["메모"])


class NoteCreate(BaseModel):
    title: str = Field(..., min_length=1, max_length=100)
    content: str = Field(default="", max_length=2000)


class NoteUpdate(BaseModel):
    title: str | None = Field(default=None, min_length=1, max_length=100)
    content: str | None = Field(default=None, max_length=2000)


class Note(BaseModel):
    id: int
    title: str
    content: str
    created_at: datetime


notes: list[Note] = []
next_id = 1


def find_note(note_id: int) -> Note:
    for note in notes:
        if note.id == note_id:
            return note
    raise HTTPException(status_code=404, detail=f"{note_id}번 메모가 없습니다.")


@router.get("", response_model=list[Note])
def list_notes():
    return list(reversed(notes))


@router.get("/{note_id}", response_model=Note)
def get_note(note_id: int):
    return find_note(note_id)


@router.post("", response_model=Note, status_code=201)
def create_note(payload: NoteCreate):
    global next_id

    note = Note(
        id=next_id,
        title=payload.title,
        content=payload.content,
        created_at=datetime.now(),
    )
    notes.append(note)
    next_id += 1

    return note


@router.patch("/{note_id}", response_model=Note)
def update_note(note_id: int, payload: NoteUpdate):
    note = find_note(note_id)

    changes = payload.model_dump(exclude_unset=True)
    for key, value in changes.items():
        setattr(note, key, value)

    return note


@router.delete("/{note_id}", status_code=204)
def delete_note(note_id: int):
    note = find_note(note_id)
    notes.remove(note)
```

**하나씩 짚어 봅시다.**

#### `APIRouter`

```python
router = APIRouter(prefix="/notes", tags=["메모"])
```

- `prefix="/notes"` → 아래 주소들 앞에 자동으로 붙습니다. `@router.get("")` 이 곧 `/notes`
- `tags=["메모"]` → `/docs` 에서 묶어서 보여 줍니다

#### 스키마를 **세 개**로 나눈 이유

| 클래스 | 언제 |
|---|---|
| `NoteCreate` | 만들 때 **받는** 것 (`id` 없음 — 서버가 정하니까) |
| `NoteUpdate` | 고칠 때 **받는** 것 (전부 선택) |
| `Note` | 밖으로 **내보내는** 것 (`id`, `created_at` 포함) |

**받는 모양과 내보내는 모양은 다릅니다.** 클라이언트가 `id` 를 정하게 두면 안 되니까요.
지금은 과해 보이지만, 12편에서 DB가 붙고 17편에서 비밀번호가 생기면
"내보내면 안 되는 항목"이 나오면서 이 분리가 진가를 발휘합니다.

#### `Field(...)`

```python
title: str = Field(..., min_length=1, max_length=100)
```

- `...` (점 세 개)는 **"필수"** 를 뜻하는 파이썬 기호입니다 (`Ellipsis`)
- `min_length=1` → 빈 문자열 `""` 을 **422로 거절**합니다

검증 코드를 우리가 안 씁니다. **선언만 합니다.**

#### `global next_id`

```python
global next_id
next_id += 1
```

함수 안에서 **바깥 변수를 바꾸려면** `global` 이 필요합니다.
안 쓰면 파이썬이 "함수 안의 새 변수"로 취급해서 에러가 납니다.

> 이건 지금처럼 메모리에 저장할 때만 필요한 코드입니다.
> 12편에서 DB를 쓰면 id는 **데이터베이스가 알아서** 매겨 줍니다.

#### `exclude_unset=True` — 이번 편에서 제일 중요한 한 줄

```python
changes = payload.model_dump(exclude_unset=True)
```

`{"title": "새 제목"}` 만 보냈다고 해 봅시다.

| | 결과 |
|---|---|
| `model_dump()` | `{"title": "새 제목", "content": None}` → **내용이 지워집니다** |
| `model_dump(exclude_unset=True)` | `{"title": "새 제목"}` → 내용은 그대로 |

**"안 보낸 것"과 "비우라고 보낸 것"을 구분하는 장치**입니다.
이게 `PATCH` 를 제대로 만드는 핵심입니다.

#### 상태 코드 201 과 204

| 코드 | 뜻 | 본문 |
|---|---|---|
| `201 Created` | 새로 만들어졌다 | 만들어진 것을 돌려줌 |
| `204 No Content` | 성공했고 돌려줄 게 없다 | **없어야 함** |

`204` 에서는 `return` 을 하면 안 됩니다. 그래서 `delete_note` 는 아무것도 안 돌려줍니다.

### 5단계. ★ `/docs` 로 먼저 테스트

**프론트엔드를 만들기 전에** 백엔드가 제대로 도는지 확인합시다.

```powershell
fastapi dev main.py
```

http://127.0.0.1:8000/docs 에서:

1. **`POST /notes`** → `Try it out` → 본문을 이렇게 고치고 `Execute`

   ```json
   { "title": "장보기", "content": "우유, 계란" }
   ```

   → `201` 과 함께 `"id": 1` 이 붙은 메모가 돌아옵니다

2. **`GET /notes`** → 방금 만든 게 보입니다
3. **`PATCH /notes/1`** → `{ "title": "장보기 완료" }` 만 보내고,
   `content` 가 **안 지워졌는지** 확인하세요 ← `exclude_unset` 이 하는 일
4. **`DELETE /notes/1`** → `204`
5. **`GET /notes/1`** → `404` 와 `"1번 메모가 없습니다."`
6. **`POST /notes`** 에 `{"title": ""}` → **422**

**프론트엔드 없이 백엔드를 다 테스트했습니다.** 이게 자동 문서의 힘입니다.

### 7단계. API 함수들

`frontend/lib/api.ts`:

```ts
// frontend/lib/api.ts
export const API_URL =
  process.env.NEXT_PUBLIC_API_URL ?? "http://127.0.0.1:8000";

export type Note = {
  id: number;
  title: string;
  content: string;
  created_at: string;
};

async function readError(res: Response): Promise<string> {
  const body = await res.json().catch(() => null);
  const detail = body?.detail;

  if (typeof detail === "string") return detail;
  if (Array.isArray(detail) && detail.length > 0) {
    return detail[0]?.msg ?? "입력값이 올바르지 않습니다.";
  }
  return `서버 오류 (${res.status})`;
}

export async function listNotes(): Promise<Note[]> {
  const res = await fetch(`${API_URL}/notes`, { cache: "no-store" });
  if (!res.ok) throw new Error(await readError(res));
  return res.json();
}

export async function createNote(input: {
  title: string;
  content: string;
}): Promise<Note> {
  const res = await fetch(`${API_URL}/notes`, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify(input),
  });
  if (!res.ok) throw new Error(await readError(res));
  return res.json();
}

export async function updateNote(
  id: number,
  input: Partial<{ title: string; content: string }>
): Promise<Note> {
  const res = await fetch(`${API_URL}/notes/${id}`, {
    method: "PATCH",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify(input),
  });
  if (!res.ok) throw new Error(await readError(res));
  return res.json();
}

export async function deleteNote(id: number): Promise<void> {
  const res = await fetch(`${API_URL}/notes/${id}`, { method: "DELETE" });
  if (!res.ok) throw new Error(await readError(res));
}

export function formatDate(iso: string): string {
  return iso.replace("T", " ").slice(0, 16);
}
```

**세 가지를 짚습니다.**

#### ① POST 는 재료가 세 개

```ts
{
  method: "POST",
  headers: { "Content-Type": "application/json" },
  body: JSON.stringify(input),
}
```

| 재료 | 빠뜨리면 |
|---|---|
| `method` | GET으로 나가서 405 에러 |
| `headers` | 서버가 본문을 JSON으로 안 읽음 → **422** |
| `JSON.stringify` | 객체가 `[object Object]` 로 나감 |

**`JSON.stringify` 를 빠뜨리는 게 제일 흔합니다.** `body` 에는 문자열만 들어갑니다.

#### ② `readError` — 두 가지 모양을 다 받는다

FastAPI의 `detail` 은 상황에 따라 모양이 다릅니다.

```json
{"detail": "1번 메모가 없습니다."}                    ← HTTPException: 문자열
{"detail": [{"msg": "String should have at least 1 character", ...}]}  ← 422: 배열
```

둘 다 처리해 두면 어떤 에러든 화면에 쓸 만한 문구가 나옵니다.

#### ③ `deleteNote` 는 `res.json()` 을 안 부른다

204는 **본문이 없습니다.** `res.json()` 을 부르면 파싱 에러가 납니다.

#### ④ 날짜를 `toLocaleString()` 으로 안 만드는 이유

```ts
export function formatDate(iso: string): string {
  return iso.replace("T", " ").slice(0, 16);
}
```

`toLocaleString()` 은 **서버(node)와 브라우저의 결과가 다를 수 있습니다.**
그러면 "서버가 그린 화면과 다르다"는 하이드레이션 경고가 콘솔에 뜹니다.
이 방식은 문자열을 자르기만 하므로 **항상 같습니다.**

### 9단계. 메모 한 칸 — 보기 / 수정 / 삭제

`frontend/components/note-item.tsx`:

```tsx
// frontend/components/note-item.tsx
"use client";

import { useRouter } from "next/navigation";
import { useState } from "react";

import { Button } from "@/components/ui/button";
import { Card, CardContent } from "@/components/ui/card";
import { Input } from "@/components/ui/input";
import { Textarea } from "@/components/ui/textarea";
import { deleteNote, formatDate, updateNote, type Note } from "@/lib/api";

type Props = {
  note: Note;
};

export function NoteItem({ note }: Props) {
  const router = useRouter();

  const [editing, setEditing] = useState(false);
  const [title, setTitle] = useState(note.title);
  const [content, setContent] = useState(note.content);
  const [busy, setBusy] = useState(false);
  const [error, setError] = useState<string | null>(null);

  async function handleSave() {
    setError(null);
    setBusy(true);
    try {
      await updateNote(note.id, { title, content });
      setEditing(false);
      router.refresh();
    } catch (err) {
      setError(err instanceof Error ? err.message : "수정하지 못했습니다.");
    } finally {
      setBusy(false);
    }
  }

  function handleCancel() {
    setTitle(note.title);
    setContent(note.content);
    setError(null);
    setEditing(false);
  }

  async function handleDelete() {
    if (!confirm(`"${note.title}" 메모를 지울까요?`)) return;

    setError(null);
    setBusy(true);
    try {
      await deleteNote(note.id);
      router.refresh();
    } catch (err) {
      setError(err instanceof Error ? err.message : "삭제하지 못했습니다.");
      setBusy(false);
    }
  }

  if (editing) {
    return (
      <Card>
        <CardContent className="flex flex-col gap-3 pt-6">
          <Input value={title} onChange={(e) => setTitle(e.target.value)} />
          <Textarea
            value={content}
            onChange={(e) => setContent(e.target.value)}
            rows={3}
          />

          {error && <p className="text-sm text-destructive">{error}</p>}

          <div className="flex gap-2">
            <Button onClick={handleSave} disabled={title.trim() === "" || busy}>
              {busy ? "저장 중..." : "저장"}
            </Button>
            <Button variant="outline" onClick={handleCancel} disabled={busy}>
              취소
            </Button>
          </div>
        </CardContent>
      </Card>
    );
  }

  return (
    <Card>
      <CardContent className="pt-6">
        <div className="flex items-start justify-between gap-4">
          <div className="min-w-0">
            <h3 className="font-semibold">{note.title}</h3>

            {note.content && (
              <p className="mt-1 whitespace-pre-wrap text-sm text-muted-foreground">
                {note.content}
              </p>
            )}

            <p className="mt-2 text-xs text-muted-foreground tabular-nums">
              {formatDate(note.created_at)}
            </p>
          </div>

          <div className="flex flex-none gap-2">
            <Button size="sm" variant="outline" onClick={() => setEditing(true)}>
              수정
            </Button>
            <Button
              size="sm"
              variant="destructive"
              onClick={handleDelete}
              disabled={busy}
            >
              {busy ? "..." : "삭제"}
            </Button>
          </div>
        </div>

        {error && <p className="mt-3 text-sm text-destructive">{error}</p>}
      </CardContent>
    </Card>
  );
}
```

**새로 나온 것: props**

```tsx
type Props = {
  note: Note;
};

export function NoteItem({ note }: Props) {
```

밖에서 `<NoteItem note={someNote} />` 로 값을 넘겨받는 것을 **props** 라고 합니다.
`{ note }` 는 부록 B에서 본 **구조 분해**입니다.

props는 7편에서 제대로 다룹니다. 지금은 **"밖에서 받은 값"** 정도로 충분합니다.

**한 화면, 두 모습**

```tsx
if (editing) {
  return ( ...수정 화면... );
}

return ( ...보기 화면... );
```

`editing` 상태 하나로 완전히 다른 화면을 그립니다.
JSX 안에서 삼항 연산자로 감싸도 되지만, **덩어리가 크면 `if` 로 일찍 `return`** 하는 게 훨씬 읽기 쉽습니다.

**`whitespace-pre-wrap`**

기본적으로 HTML은 줄바꿈을 무시합니다. 이 클래스를 줘야 메모의 엔터가 살아납니다.

- [ ] 제목을 비우면 버튼이 꺼져 있다

- [ ] "삭제" → 확인창 → 사라진다

- [ ] **백엔드를 껐다 켜면 메모가 전부 사라진다** ← 12편에서 해결합니다

## 흔한 에러

<details open>
<summary><b>1. POST 했더니 422 가 온다</b></summary>

거의 항상 셋 중 하나입니다.

- **헤더 누락** → `headers: { "Content-Type": "application/json" }`
- **`JSON.stringify` 누락** → `body: JSON.stringify(input)`
- **필수 항목 누락** → `title` 을 안 보냈거나 빈 문자열

응답 본문의 `detail[0].loc` 를 보면 **어떤 항목이 문제인지** 나옵니다.
</details>

<details>
<summary><b>2. <code>405 Method Not Allowed</code></b></summary>

주소는 맞는데 **메서드**가 없습니다.

- `POST /notes/` 처럼 **끝에 슬래시**를 붙였을 수 있습니다 → `POST /notes`
- 백엔드에 `@router.post("")` 를 안 만들었을 수 있습니다
</details>

<details>
<summary><b>3. <code>ModuleNotFoundError: No module named 'routers'</code></b></summary>

- `routers/__init__.py` 를 안 만들었습니다 (**비어 있어도 필요**)
- 또는 `backend` 폴더가 아닌 곳에서 `fastapi dev main.py` 를 실행했습니다
</details>

<details>
<summary><b>4. PATCH 했더니 내용이 사라진다</b></summary>

`model_dump()` 에 **`exclude_unset=True`** 를 빠뜨렸습니다.
안 보낸 항목이 `None` 으로 덮어써진 것입니다.
</details>

<details>
<summary><b>5. 삭제는 됐는데 목록이 안 바뀐다</b></summary>

`router.refresh()` 를 안 불렀거나, `listNotes` 에 `cache: "no-store"` 가 없습니다.
Next.js가 예전 목록을 캐시해 두고 재사용하는 것입니다.
</details>

<details>
<summary><b>6. <code>Unexpected end of JSON input</code> (삭제할 때)</b></summary>

`deleteNote` 에서 `res.json()` 을 불렀습니다.
**204 응답에는 본문이 없습니다.** 파싱하려 하면 안 됩니다.
</details>

<details>
<summary><b>7. 수정 후 다른 메모의 입력칸이 이상하다</b></summary>

`.map()` 에서 `key` 를 안 줬거나 `key={index}` 로 줬을 수 있습니다.
**`key={note.id}`** 처럼 **바뀌지 않는 고유값**을 주세요.
index를 쓰면 목록 순서가 바뀔 때 React가 엉뚱한 칸에 상태를 남깁니다.
</details>

### ★★★ 문제 3 — 검색

제목·내용에서 검색하는 기능을 만드세요.

```python
@router.get("", response_model=list[Note])
def list_notes(q: str | None = None):
    items = list(reversed(notes))
    if q:
        items = [n for n in items if q in n.title or q in n.content]
    return items
```

> 프론트에서 검색어를 상태로 들고 `listNotes(q)` 를 다시 부르면 되는데,

> 검색어는 클라이언트 컴포넌트에 있죠. 어떻게 이어 줄까요?
>
> 이 문제의 정석 답이 **11편(검색·정렬·페이지네이션)** 입니다.

## 이번에 만드는 것

## 개념 먼저

### 폴더가 곧 주소 — 규칙은 하나뿐

**`page.tsx` 라는 이름의 파일이 있으면, 그 폴더가 주소가 됩니다.**

```
app/
├─ page.tsx                    →  /
├─ notes/
│   ├─ page.tsx                →  /notes
│   └─ [id]/
│       ├─ page.tsx            →  /notes/1, /notes/2, ...
│       └─ edit/
│           └─ page.tsx        →  /notes/1/edit
```

`page.tsx` 가 없는 폴더는 주소가 아닙니다. 그냥 정리용 폴더죠.

### 특별한 이름의 파일들

폴더 안에 두면 Next.js가 알아서 쓰는 파일들이 있습니다.

| 파일 | 언제 쓰이나 |
|---|---|
| `page.tsx` | 그 주소의 **화면** |
| `layout.tsx` | 그 폴더 **아래 전부**를 감싸는 껍데기 |
| `not-found.tsx` | `notFound()` 가 불렸을 때 |
| `loading.tsx` | 로딩 중일 때 (**09편**) |
| `error.tsx` | 에러가 났을 때 (**09편**) |

### `[id]` — 주소의 일부를 값으로

대괄호 폴더는 **"여기엔 아무 값이나 온다"** 는 뜻입니다.

```
app/notes/[id]/page.tsx
           └┬┘
       이 이름으로 값을 받습니다
```

- `/notes/1` → `id` 는 `"1"`
- `/notes/abc` → `id` 는 `"abc"`

**★ 항상 문자열입니다.** 숫자로 쓰려면 `Number(id)` 로 바꿔야 합니다.
예제 01의 FastAPI 경로 파라미터(`/hello/{name}`)와 같은 개념입니다.

### `<Link>` vs `<a>`

```tsx
<a href="/notes">목록</a>          // ❌ 페이지 전체를 새로 받음
<Link href="/notes">목록</Link>    // ✅ 바뀐 부분만 갈아 끼움
```

| | `<a>` | `<Link>` |
|---|---|---|
| 화면 | **하얗게 깜빡임** | 부드럽게 전환 |
| 받아오는 것 | HTML, CSS, JS 전부 다시 | 바뀐 조각만 |
| 미리 받기 | 없음 | 링크가 화면에 보이면 **미리 받아 둠** |

**내 사이트 안을 오갈 땐 항상 `<Link>`** 를 쓰세요.
외부 사이트로 나갈 때만 `<a>` 입니다.

### 2단계. 목록을 `/notes` 로 옮기기

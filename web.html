### 2단계. PostgreSQL 띄우기

`backend/docker-compose.yml` 을 만듭니다.

```yaml
services:
  db:
    image: postgres:17-alpine
    container_name: notes-db
    restart: unless-stopped

    environment:
      POSTGRES_USER: notes
      POSTGRES_PASSWORD: notes_password
      POSTGRES_DB: notesdb

    ports:
      - "5432:5432"

    volumes:
      - pgdata:/var/lib/postgresql/data

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U notes -d notesdb"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  pgdata:
```

```powershell
docker compose up -d
```

처음엔 이미지를 받느라 1~2분 걸립니다. 확인:

```powershell
docker compose ps
```

```
NAME       IMAGE                STATUS
notes-db   postgres:17-alpine   Up 30 seconds (healthy)
```

**`(healthy)`** 가 뜨면 준비된 것입니다.

#### 알아 둘 명령

| 명령 | 하는 일 |
|---|---|
| `docker compose up -d` | 켜기 (`-d` = 백그라운드) |
| `docker compose ps` | 상태 보기 |
| `docker compose logs -f` | 로그 보기 (`Ctrl+C` 로 나감) |
| `docker compose down` | 끄기 — **데이터는 남습니다** |
| `docker compose down -v` | 끄고 **데이터까지 삭제** ⚠️ |

#### ★ `volumes` 가 하는 일

```yaml
volumes:
  - pgdata:/var/lib/postgresql/data
```

**이게 없으면 컨테이너를 지울 때 데이터가 전부 사라집니다.**
`pgdata` 라는 저장 공간을 만들어 컨테이너 바깥에 두는 것입니다.

컨테이너는 지웠다 다시 만들어도, 데이터는 남습니다.

### 3단계. `.env` 로 접속 정보 관리

`backend/.env` 를 만듭니다.

```
DATABASE_URL=postgresql+psycopg://notes:notes_password@localhost:5432/notesdb
```

주소를 뜯어보면:

```
postgresql+psycopg://notes:notes_password@localhost:5432/notesdb
└───┬────┘ └──┬──┘   └─┬─┘ └──────┬─────┘ └───┬───┘ └┬─┘ └──┬──┘
  DB 종류   드라이버   사용자    비밀번호      주소   포트   DB이름
```

> ⚠️ **`.env` 는 절대 깃에 올리지 마세요.** 비밀번호가 들어 있습니다.
> `.gitignore` 에 `.env` 를 넣고, 대신 **`.env.example`** 을 올려서
> "무엇이 필요한지"만 알려 줍니다. 실무의 표준 관행입니다.

`backend/config.py`:

```python
# backend/config.py
from pydantic_settings import BaseSettings, SettingsConfigDict


class Settings(BaseSettings):
    model_config = SettingsConfigDict(env_file=".env", extra="ignore")

    database_url: str = "sqlite:///./notes.db"

    cors_origins: list[str] = [
        "http://localhost:3000",
        "http://127.0.0.1:3000",
    ]


settings = Settings()
```

**환경변수가 `.env` 보다 우선합니다.** 배포할 때 이 성질을 씁니다 —
파일을 안 올리고 서비스 설정에 값을 넣으면 됩니다 (20편).

### 4단계. `database.py` 고치기

```python
# backend/database.py
from sqlalchemy import create_engine
from sqlalchemy.orm import DeclarativeBase, sessionmaker

from config import settings

DATABASE_URL = settings.database_url

connect_args = (
    {"check_same_thread": False} if DATABASE_URL.startswith("sqlite") else {}
)

engine = create_engine(
    DATABASE_URL,
    connect_args=connect_args,
    pool_pre_ping=True,
)

SessionLocal = sessionmaker(bind=engine, autoflush=False, autocommit=False)


class Base(DeclarativeBase):
    pass


def get_db():
    db = SessionLocal()
    try:
        yield db
    finally:
        db.close()
```

**바뀐 곳 세 군데:**

- 주소를 `settings` 에서 읽습니다 → `.env` 만 고치면 DB를 갈아탈 수 있습니다
- `check_same_thread` 를 **SQLite일 때만** 줍니다 (PostgreSQL엔 주면 오류)
- **`pool_pre_ping=True`** — 오래 놀던 연결이 끊겼는지 미리 확인합니다.
  없으면 한참 뒤 첫 요청에서 `connection closed` 오류가 납니다. 실무 필수 옵션입니다.

### 5단계. Alembic 시작하기

```powershell
alembic init alembic
```

이런 게 생깁니다:

```
backend/
├─ alembic.ini            설정
└─ alembic/
    ├─ env.py             ★ 우리가 고칠 파일
    ├─ script.py.mako     마이그레이션 파일의 틀
    └─ versions/          ★ 마이그레이션들이 쌓이는 곳
```

### 6단계. ★★ `alembic.ini` — 한글을 넣으면 안 됩니다

**한국어 Windows에서 반드시 걸리는 함정입니다.**

Alembic은 이 파일을 이렇게 읽습니다:

```python
file_config.read(path, encoding="locale")
```

**`encoding="locale"`** — 한국어 Windows에서는 **cp949**입니다.
그런데 VS Code는 UTF-8로 저장하죠. 그래서 **한글 주석을 한 줄이라도 넣으면**
모든 alembic 명령이 이렇게 죽습니다:

```
UnicodeDecodeError: 'cp949' codec can't decode byte 0xed in position 267
```

> **`alembic.ini` 에는 영어로만 쓰세요.** 다른 파일(`env.py`, 마이그레이션)은
> 파이썬이 UTF-8로 읽으므로 한글 주석을 넣어도 됩니다. **`.ini` 파일만 다릅니다.**

`alembic.ini` 에서 두 곳을 고칩니다.

```ini
# 1) 파일 이름에 날짜가 들어가게 (순서를 알아보기 쉽습니다)
file_template = %%(year)d%%(month).2d%%(day).2d_%%(hour).2d%%(minute).2d_%%(slug)s

# 2) sqlalchemy.url 줄을 지우거나 주석 처리합니다.
#    비밀번호가 들어가는 값이라 파일에 박아 두면 안 됩니다.
# sqlalchemy.url = driver://user:pass@localhost/dbname
```

### 7단계. `alembic/env.py` 고치기

`alembic init` 이 만들어 준 파일에서 **세 곳**을 고칩니다.

```python
# backend/alembic/env.py  (윗부분)
from logging.config import fileConfig

from alembic import context
from sqlalchemy import engine_from_config, pool

# ★ 1) 우리 설정과 모델을 가져옵니다
from config import settings
from database import Base
import models  # noqa: F401

config = context.config

# ★ 2) 접속 주소를 .env 에서 읽어 넣습니다
config.set_main_option("sqlalchemy.url", settings.database_url)

if config.config_file_name is not None:
    fileConfig(config.config_file_name)

# ★ 3) "지금 코드가 원하는 테이블 모양"을 알려 줍니다
target_metadata = Base.metadata
```

그리고 `run_migrations_online()` 안의 `context.configure(...)` 에 두 줄 추가:

```python
        context.configure(
            connection=connection,
            target_metadata=target_metadata,
            compare_type=True,
            render_as_batch=connection.dialect.name == "sqlite",
        )
```

| 옵션 | 하는 일 |
|---|---|
| `target_metadata` | **필수.** 이게 없으면 autogenerate가 아무것도 못 찾습니다 |
| `compare_type=True` | 칸의 **타입 변경**까지 감지 (기본값은 무시) |
| `render_as_batch` | SQLite에서 칸 수정이 되게 함 (SQLite는 `ALTER TABLE` 이 약합니다) |

**`import models` 를 빠뜨리면** `Base` 가 `notes` 테이블을 모릅니다.
그러면 autogenerate가 "테이블을 전부 지워라"라는 **무서운 마이그레이션**을 만듭니다.

### 8단계. `main.py` 에서 `create_all` 제거

```python
# backend/main.py
from fastapi import FastAPI
from fastapi.middleware.cors import CORSMiddleware

from config import settings
from routers import notes

app = FastAPI(title="메모장 API")

# Base.metadata.create_all(bind=engine)   ← 지웁니다

app.add_middleware(
    CORSMiddleware,
    allow_origins=settings.cors_origins,
    allow_credentials=True,
    allow_methods=["*"],
    allow_headers=["*"],
)

app.include_router(notes.router)


@app.get("/health")
def health():
    return {"status": "ok"}
```

**이제 테이블은 Alembic이 만듭니다.** 둘 다 쓰면 서로 충돌합니다.

```powershell
alembic revision --autogenerate -m "create notes table"
```

```
INFO  [alembic.autogenerate.compare] Detected added table 'notes'
  Generating ...\alembic\versions\20260718_0900_create_notes_table.py ... done
```

**만들어진 파일을 반드시 열어 보세요.**

```python
revision: str = "0001_create_notes"
down_revision: Union[str, None] = None


def upgrade() -> None:
    op.create_table(
        "notes",
        sa.Column("id", sa.Integer(), nullable=False),
        sa.Column("title", sa.String(length=100), nullable=False),
        sa.Column("content", sa.Text(), nullable=False),
        sa.Column("created_at", sa.DateTime(),
                  server_default=sa.text("CURRENT_TIMESTAMP"), nullable=False),
        sa.PrimaryKeyConstraint("id"),
    )
    op.create_index(op.f("ix_notes_title"), "notes", ["title"], unique=False)


def downgrade() -> None:
    op.drop_index(op.f("ix_notes_title"), table_name="notes")
    op.drop_table("notes")
```

| 부분 | 뜻 |
|---|---|
| `revision` | 이 마이그레이션의 이름표 |
| `down_revision` | **바로 앞** 마이그레이션. 첫 번째라 `None` |
| `upgrade()` | 앞으로 가기 |
| `downgrade()` | 되돌리기 — **`upgrade` 의 정확한 반대** (순서도 반대) |

> ⚠️ **autogenerate를 믿되, 반드시 확인하세요.**
> 이름 바꾸기를 "지우고 새로 만들기"로 해석하는 등, **데이터를 날리는 코드**를
> 만들 때가 있습니다. 사람이 읽고 고치라고 파일로 만들어 주는 것입니다.

```

```
INFO  [alembic.runtime.migration] Running upgrade  -> 0001_create_notes, create notes table
```

`head` 는 "가장 최신까지"라는 뜻입니다.

```powershell

```

```

```

## 마이그레이션 실전 흐름

이제 진짜로 칸을 하나 추가해 봅시다.

**1) `models.py` 를 고칩니다**

```python
from sqlalchemy import Boolean   # 추가

class Note(Base):
    # ...
    done: Mapped[bool] = mapped_column(Boolean, nullable=False, server_default="false")
```

**2) 마이그레이션을 만듭니다**

```powershell
alembic revision --autogenerate -m "add done to notes"
```

**3) 파일을 확인합니다**

```python
def upgrade() -> None:
    op.add_column("notes", sa.Column("done", sa.Boolean(), nullable=False,
                                     server_default="false"))

def downgrade() -> None:
    op.drop_column("notes", "done")
```

**4) 적용합니다**

```powershell
alembic upgrade head
```

**★ 기존 메모가 그대로 남아 있습니다.** 이게 마이그레이션의 전부입니다.

> **`server_default` 를 왜 줬나요?**
> 이미 있는 줄들에도 값이 필요합니다. `nullable=False` 인데 기본값이 없으면
> **"기존 행에 뭘 넣으라고?"** 하며 마이그레이션이 실패합니다.
>
> **칸을 추가할 때 가장 흔한 실패**입니다. 기억해 두세요.

## 이 교재에서 검증한 것과 못 한 것

정직하게 적어 둡니다.

| 항목 | 상태 |
|---|---|
| Alembic 설정·마이그레이션·되돌리기 | ✅ **실제로 실행해 확인** (SQLite 기준) |
| `alembic.ini` 한글 인코딩 문제 | ✅ **직접 재현하고 해결책 확인** |
| `.env` + pydantic-settings 연동 | ✅ 확인 |
| **PostgreSQL 접속 자체** | ⚠️ **이 교재를 쓴 환경에 Docker가 없어 미검증** |

PostgreSQL 부분은 공식 문서와 표준 설정을 따랐지만, 직접 실행해 보지는 못했습니다.
막히면 [PostgreSQL 도커 이미지 문서](https://hub.docker.com/_/postgres)를 확인하세요.

**SQLite로도 이번 편을 전부 실습할 수 있습니다.** `.env` 를 이렇게 두면 됩니다:

```
DATABASE_URL=sqlite:///./notes.db
```

Alembic 부분은 완전히 똑같이 동작합니다. Docker 설치가 부담되면 이렇게 하고
14편으로 넘어가도 좋습니다.

def upgrade() -> None:
    op.execute("UPDATE notes SET title = TRIM(title)")

## 개념 먼저

### 왜 폴더 이름을 메모에 그냥 안 적나?

```
  ❌ 이렇게 하면 안 되나요?
 ┌────┬──────────┬──────────┐
 │ id │ title    │ folder   │
 ├────┼──────────┼──────────┤
 │ 1  │ 회의록    │ 업무     │
 │ 2  │ 주간보고  │ 업무     │
 │ 3  │ 회의준비  │ 업무     │
 └────┴──────────┴──────────┘
```

**"업무"를 "회사"로 바꾸고 싶다면?** 모든 줄을 다 고쳐야 합니다.
한 줄이라도 놓치면 폴더가 두 개로 갈라집니다.

**id로 가리키면** 폴더 이름은 한 곳에만 있습니다. 고칠 곳도 한 곳입니다.

이게 **정규화**의 기본 아이디어입니다: **같은 정보를 두 번 저장하지 않는다.**

### 외래 키 — 진짜 연결고리

```python
folder_id: Mapped[int | None] = mapped_column(
    ForeignKey("folders.id", ondelete="CASCADE"),
    nullable=True,
)
```

**외래 키**(Foreign Key)는 "이 값은 저 테이블의 id 여야 한다"는 **약속**입니다.
데이터베이스가 이걸 **강제**합니다. 없는 폴더 번호를 넣으면 거부당합니다.

### `relationship` — 파이썬 쪽 편의 기능

```python
class Folder(Base):
    notes: Mapped[list["Note"]] = relationship(back_populates="folder")

class Note(Base):
    folder: Mapped["Folder | None"] = relationship(back_populates="notes")
```

**★ 이건 테이블의 칸이 아닙니다.** 데이터베이스에는 이런 칸이 없습니다.
SQLAlchemy가 이렇게 쓸 수 있게 해 주는 것뿐입니다:

```python
note.folder.name        # "업무"
folder.notes            # [Note, Note, ...]
```

| | 진짜 칸인가 | 하는 일 |
|---|---|---|
| `folder_id` | **✅ 예** | 실제 저장되는 숫자 |
| `folder` / `notes` | ❌ 아니오 | 파이썬에서 편하게 오가기 |

`back_populates` 는 "이 둘은 같은 관계의 양쪽이야"라고 알려 주는 것입니다.
한쪽을 바꾸면 다른 쪽도 따라 바뀝니다.

### ★★ N+1 문제 — 실무에서 가장 흔한 성능 사고

메모 30개를 폴더 이름과 함께 보여 준다고 합시다.

```python
notes = db.scalars(select(Note)).all()      # 쿼리 1번

for note in notes:
    print(note.folder.name)                 # ★ 여기서 30번 더!
```

`note.folder` 를 **처음 읽는 순간** SQLAlchemy가 조용히 쿼리를 하나 더 날립니다.
메모가 30개면 **1 + 30 = 31번**입니다.

```
  N+1 (느림)                    selectinload (빠름)
  SELECT * FROM notes           SELECT * FROM notes
  SELECT * FROM folders WHERE id=1   SELECT * FROM folders WHERE id IN (1,2,3)
  SELECT * FROM folders WHERE id=1
  SELECT * FROM folders WHERE id=2   ← 총 2번
  ... 28번 더
```

**해결은 한 줄입니다.**

```python
stmt = select(Note).options(selectinload(Note.folder))
```

> **왜 조용히 일어나나요?** 편하게 만들려다 보니 그렇게 됐습니다.
> `note.folder` 가 그냥 되니까 문제를 눈치채기 어렵습니다.
> **개발할 땐 데이터가 10개라 빠르고, 운영에서 10000개가 되면 죽습니다.**
>
> 그래서 **목록을 뽑을 땐 항상 "관련 데이터를 같이 가져오나?"를 확인**하는 습관이 필요합니다.

### 2단계. 모델에 폴더 추가

```python
# backend/models.py
from datetime import datetime

from sqlalchemy import DateTime, ForeignKey, Integer, String, Text, func
from sqlalchemy.orm import Mapped, mapped_column, relationship

from database import Base


class Folder(Base):
    __tablename__ = "folders"

    id: Mapped[int] = mapped_column(Integer, primary_key=True)
    name: Mapped[str] = mapped_column(String(50), nullable=False, unique=True)
    created_at: Mapped[datetime] = mapped_column(
        DateTime, nullable=False, server_default=func.now()
    )

    notes: Mapped[list["Note"]] = relationship(
        back_populates="folder",
        cascade="all, delete-orphan",
    )


class Note(Base):
    __tablename__ = "notes"

    id: Mapped[int] = mapped_column(Integer, primary_key=True)
    title: Mapped[str] = mapped_column(String(100), nullable=False, index=True)
    content: Mapped[str] = mapped_column(Text, nullable=False, default="")

    folder_id: Mapped[int | None] = mapped_column(
        ForeignKey("folders.id", ondelete="CASCADE"),
        nullable=True,
        index=True,
    )

    created_at: Mapped[datetime] = mapped_column(
        DateTime, nullable=False, server_default=func.now()
    )

    folder: Mapped["Folder | None"] = relationship(back_populates="notes")
```

**세 가지 선택을 짚습니다.**

| 선택 | 이유 |
|---|---|
| `unique=True` (name) | 같은 이름 폴더 두 개 방지. **데이터베이스가** 막습니다 |
| `nullable=True` (folder_id) | 폴더에 안 넣은 메모도 허용 |
| `index=True` (folder_id) | "이 폴더의 메모"를 자주 찾으니까 |
| `cascade="all, delete-orphan"` | 폴더를 지우면 안의 메모도 함께 |

> **`cascade` 는 신중히 정하세요.** 선택지가 셋입니다.
> 1. **같이 지운다** (지금 방식) — 폴더 = 담는 그릇일 때
> 2. **폴더만 지우고 메모는 `NULL` 로** (`ondelete="SET NULL"`) — 메모가 더 중요할 때
> 3. **폴더에 메모가 있으면 삭제 거부** — 실수 방지가 중요할 때
>
> 정답은 없습니다. **"이 데이터가 사라져도 되는가"** 로 판단하세요.

### 3단계. 스키마 — 중첩 응답

```python
# backend/schemas.py
class FolderRead(BaseModel):
    model_config = ConfigDict(from_attributes=True)

    id: int
    name: str
    created_at: datetime


class FolderWithCount(FolderRead):
    note_count: int


class NoteCreate(BaseModel):
    title: str = Field(..., min_length=1, max_length=100)
    content: str = Field(default="", max_length=2000)
    folder_id: int | None = None


class NoteRead(BaseModel):
    model_config = ConfigDict(from_attributes=True)

    id: int
    title: str
    content: str
    created_at: datetime

    folder: FolderRead | None = None      # ★ 중첩
```

**중첩 스키마**를 쓰면 응답이 이렇게 나갑니다:

```json
{
  "id": 1,
  "title": "회의록",
  "folder": { "id": 1, "name": "업무", "created_at": "..." }
}
```

프론트엔드가 **폴더 이름을 알려고 다시 요청할 필요가 없습니다.**

> **`class FolderWithCount(FolderRead)`** — 상속입니다.
> `FolderRead` 의 모든 칸에 `note_count` 를 더한 것입니다.
> 같은 걸 두 번 안 적으려고 이렇게 씁니다.

### 4단계. 마이그레이션

```powershell
alembic revision --autogenerate -m "add folders"
```

**만들어진 파일을 꼭 확인하세요.** 순서가 중요합니다.

```python
def upgrade() -> None:
    # 1) 폴더 테이블을 먼저
    op.create_table(
        "folders",
        sa.Column("id", sa.Integer(), nullable=False),
        sa.Column("name", sa.String(length=50), nullable=False),
        sa.Column("created_at", sa.DateTime(),
                  server_default=sa.text("CURRENT_TIMESTAMP"), nullable=False),
        sa.PrimaryKeyConstraint("id"),
        sa.UniqueConstraint("name"),
    )

    # 2) 그다음 notes 에 folder_id 추가
    with op.batch_alter_table("notes") as batch:
        batch.add_column(sa.Column("folder_id", sa.Integer(), nullable=True))
        batch.create_foreign_key(
            "fk_notes_folder_id", "folders", ["folder_id"], ["id"],
            ondelete="CASCADE",
        )

    op.create_index(op.f("ix_notes_folder_id"), "notes", ["folder_id"])


def downgrade() -> None:
    op.drop_index(op.f("ix_notes_folder_id"), table_name="notes")

    with op.batch_alter_table("notes") as batch:
        batch.drop_constraint("fk_notes_folder_id", type_="foreignkey")
        batch.drop_column("folder_id")

    op.drop_table("folders")
```

**★ 순서가 왜 중요한가**: `notes.folder_id` 가 `folders.id` 를 가리키므로,
**폴더 테이블이 먼저 있어야** 합니다. 지울 땐 정확히 반대 순서입니다.

**`nullable=True` 로 추가한 이유**: 기존 메모들이 이미 있기 때문입니다.
`nullable=False` 로 하면 "기존 행에 뭘 넣으라고?" 하며 실패합니다 (13편에서 본 그 문제).

```powershell
alembic upgrade head
```

### 5단계. 폴더 라우터

`backend/routers/folders.py`:

```python
# backend/routers/folders.py
from fastapi import APIRouter, Depends, HTTPException
from sqlalchemy import func, select
from sqlalchemy.exc import IntegrityError
from sqlalchemy.orm import Session

import models
import schemas
from database import get_db

router = APIRouter(prefix="/folders", tags=["폴더"])


@router.get("", response_model=list[schemas.FolderWithCount])
def list_folders(db: Session = Depends(get_db)):
    stmt = (
        select(models.Folder, func.count(models.Note.id).label("note_count"))
        .join(models.Note, models.Note.folder_id == models.Folder.id, isouter=True)
        .group_by(models.Folder.id)
        .order_by(models.Folder.name)
    )

    rows = db.execute(stmt).all()

    return [
        schemas.FolderWithCount(
            id=folder.id,
            name=folder.name,
            created_at=folder.created_at,
            note_count=count,
        )
        for folder, count in rows
    ]


@router.post("", response_model=schemas.FolderRead, status_code=201)
def create_folder(payload: schemas.FolderCreate, db: Session = Depends(get_db)):
    folder = models.Folder(name=payload.name)
    db.add(folder)

    try:
        db.commit()
    except IntegrityError:
        db.rollback()
        raise HTTPException(
            status_code=409, detail=f"'{payload.name}' 폴더가 이미 있습니다."
        )

    db.refresh(folder)
    return folder


@router.delete("/{folder_id}", status_code=204)
def delete_folder(folder_id: int, db: Session = Depends(get_db)):
    folder = db.get(models.Folder, folder_id)
    if folder is None:
        raise HTTPException(status_code=404, detail=f"{folder_id}번 폴더가 없습니다.")

    db.delete(folder)
    db.commit()
```

#### 개수 세기 — `JOIN` + `GROUP BY`

```python
select(models.Folder, func.count(models.Note.id).label("note_count"))
    .join(models.Note, models.Note.folder_id == models.Folder.id, isouter=True)
    .group_by(models.Folder.id)
```

```sql
SELECT folders.*, count(notes.id) AS note_count
FROM folders LEFT JOIN notes ON notes.folder_id = folders.id
GROUP BY folders.id
```

**★ `isouter=True` (LEFT JOIN) 이 중요합니다.**
이게 없으면 **메모가 하나도 없는 폴더는 목록에서 아예 사라집니다.**
빈 폴더도 `0` 으로 나와야 하니까요.

폴더마다 `len(folder.notes)` 로 세면 **N+1** 이 됩니다. 한 번의 쿼리로 끝냅니다.

#### `IntegrityError` 와 `rollback`

```python
try:
    db.commit()
except IntegrityError:
    db.rollback()          # ★ 이거 빠뜨리면 안 됩니다
    raise HTTPException(status_code=409, ...)
```

`unique=True` 를 어기면 데이터베이스가 `IntegrityError` 를 냅니다.

**`db.rollback()` 을 안 하면** 그 세션은 망가진 상태로 남아서,
**다음 요청까지 전부 실패**합니다. 반드시 넣으세요.

> **409 Conflict** 는 "규칙과 충돌했다"는 뜻입니다.
> 400(잘못된 요청)보다 상황을 정확히 표현합니다.

### 6단계. 메모 라우터 고치기

```python
# backend/routers/notes.py  (핵심 부분)
from sqlalchemy.orm import Session, selectinload


def check_folder(db: Session, folder_id: int | None) -> None:
    if folder_id is None:
        return
    if db.get(models.Folder, folder_id) is None:
        raise HTTPException(status_code=404, detail=f"{folder_id}번 폴더가 없습니다.")


@router.get("", response_model=list[schemas.NoteRead])
def list_notes(folder_id: int | None = None, db: Session = Depends(get_db)):
    stmt = (
        select(models.Note)
        .options(selectinload(models.Note.folder))     # ★ N+1 방지
        .order_by(models.Note.id.desc())
    )

    if folder_id is not None:
        stmt = stmt.where(models.Note.folder_id == folder_id)

    return db.scalars(stmt).all()


@router.post("", response_model=schemas.NoteRead, status_code=201)
def create_note(payload: schemas.NoteCreate, db: Session = Depends(get_db)):
    check_folder(db, payload.folder_id)

    note = models.Note(
        title=payload.title,
        content=payload.content,
        folder_id=payload.folder_id,
    )
    db.add(note)
    db.commit()
    db.refresh(note)

    return note
```

**`check_folder` 를 왜 만드나요?**

없는 폴더 번호를 넣으면 데이터베이스가 외래 키 오류를 냅니다. 그런데 그건
**500 (서버 잘못)** 으로 나갑니다. 사실은 **사용자가 잘못 보낸 것**이죠.

미리 확인해서 **404** 로 알려 주면 프론트엔드가 제대로 대응할 수 있습니다.

#### `selectinload` 와 `joinedload`

| | 방식 | 언제 |
|---|---|---|
| `selectinload` | 쿼리 2번 (`WHERE id IN (...)`) | **1:N** — 목록을 가져올 때 |
| `joinedload` | 쿼리 1번 (JOIN) | **N:1** — 한 건을 가져올 때 |

헷갈리면 **`selectinload` 를 먼저** 써 보세요. 대부분 잘 맞습니다.

## 흔한 에러

<details open>
<summary><b>1. <code>ForeignKeyViolation</code> / <code>FOREIGN KEY constraint failed</code></b></summary>

없는 폴더 번호를 넣었습니다. `check_folder` 로 미리 확인하세요.
</details>

<details>
<summary><b>2. 409 한 번 난 뒤로 모든 요청이 실패한다</b></summary>

**`db.rollback()` 을 빠뜨렸습니다.** 세션이 망가진 채로 남은 것입니다.
</details>

<details>
<summary><b>3. <code>MissingGreenlet</code> 또는 <code>DetachedInstanceError</code></b></summary>

세션이 닫힌 뒤에 `note.folder` 를 읽으려 한 것입니다.
`selectinload` 로 **미리** 가져오세요.
</details>

<details>
<summary><b>4. 빈 폴더가 목록에 안 나온다</b></summary>

`join(...)` 에 **`isouter=True`** 를 빠뜨렸습니다. INNER JOIN이 되어
메모가 있는 폴더만 남은 것입니다.
</details>

<details>
<summary><b>5. 마이그레이션이 <code>no such table: folders</code> 로 실패</b></summary>

`folders` 테이블을 만들기 **전에** 외래 키를 추가했습니다. 순서를 확인하세요.
</details>

<details>
<summary><b>6. 응답의 <code>folder</code> 가 항상 null</b></summary>

- `NoteRead` 에 `folder: FolderRead | None = None` 을 넣었나요?
- `folder_id` 를 실제로 저장했나요? (`models.Note(folder_id=...)`)
- `db.refresh(note)` 를 했나요?
</details>

<details>
<summary><b>7. SQLite에서 폴더를 지워도 메모가 남는다</b></summary>

SQLite는 외래 키 강제가 **기본으로 꺼져** 있습니다.
다만 우리는 `cascade="all, delete-orphan"` 을 썼기 때문에
**SQLAlchemy가 직접** 지웁니다. 그래서 동작합니다.

DB 쪽 `ondelete="CASCADE"` 에만 의존하면 SQLite에서 동작이 다를 수 있습니다.
**ORM 쪽 `cascade` 를 같이 주는 것**이 안전합니다.
</details>

### ★★★ 문제 3 — 태그 (N:M 관계)

메모 하나에 태그 여럿, 태그 하나에 메모 여럿. **N:M 관계**입니다.

이건 **중간 테이블**이 필요합니다.

```
  notes          note_tags           tags
 ┌────┐        ┌─────────┬───────┐  ┌────┐
 │ 1  │◀───────│ note_id │tag_id │─▶│ 1  │
 └────┘        │    1    │   1   │  └────┘
               │    1    │   2   │
               └─────────┴───────┘
```

```python
note_tags = Table(
    "note_tags",
    Base.metadata,
    Column("note_id", ForeignKey("notes.id", ondelete="CASCADE"), primary_key=True),
    Column("tag_id", ForeignKey("tags.id", ondelete="CASCADE"), primary_key=True),
)

class Note(Base):
    tags: Mapped[list["Tag"]] = relationship(secondary=note_tags, back_populates="notes")
```

> `secondary=` 가 "이 테이블을 거쳐서 연결해"라는 뜻입니다.
>
> **주의**: 목록에서 태그를 같이 보여 주면 또 N+1입니다.
> `selectinload(Note.tags)` 를 잊지 마세요.

## 개념 먼저

### 왜 서버에서 걸러야 하나

08편에서는 이렇게 했습니다.

```tsx
const visible = notes.filter(...)   // 브라우저에서 거름
```

메모가 20개일 땐 완벽합니다. **10만 개라면?**

```
  브라우저에서 거르기              서버에서 거르기
  ────────────────              ──────────────
  10만 개를 전부 전송             10개만 전송
  → 수십 MB                      → 몇 KB
  → 브라우저가 멈춤               → 즉시
```

**데이터가 많아지면 반드시 서버로 옮겨야 합니다.**

### `LIMIT` 과 `OFFSET`

```sql
SELECT * FROM notes ORDER BY id DESC LIMIT 10 OFFSET 20;
                                     └──┬──┘ └───┬───┘
                                     10개만   앞의 20개는 건너뛰고
```

| 쪽 | OFFSET | 보여 줄 것 |
|---|---|---|
| 1쪽 | 0 | 1~10번째 |
| 2쪽 | 10 | 11~20번째 |
| 3쪽 | 20 | 21~30번째 |

**공식**: `offset = (page - 1) × size`

### ★ URL을 상태 저장소로

08편의 문제를 기억하시나요? 검색해 놓고 메모를 열었다가 뒤로 가면 검색어가 사라졌죠.

**상태를 `useState` 대신 주소에 두면** 이런 게 공짜로 됩니다.

| | `useState` | **URL** |
|---|---|---|
| 새로고침 | 사라짐 | **유지됨** |
| 뒤로가기 | 안 됨 | **이전 검색으로** |
| 링크 공유 | 불가능 | **가능** |
| 서버가 읽기 | 불가능 | **가능** ← 이게 결정적 |

마지막이 핵심입니다. 서버 컴포넌트는 `useState` 를 볼 수 없지만,
**`searchParams` 는 읽을 수 있습니다.**

> **모든 상태를 URL에 넣으라는 건 아닙니다.**
> "모달이 열렸나" 같은 건 `useState` 가 맞습니다.
>
> **판단 기준**: 새로고침했을 때 유지돼야 하나? 남에게 링크로 줄 만한가?
> 둘 중 하나라도 "네"면 URL입니다.

실습하려면 메모가 **25개쯤** 있어야 합니다. `/docs` 에서 만들거나,
파이썬으로 한 번에 넣으세요.

### 2단계. 응답 모양 바꾸기

```python
# backend/schemas.py 에 추가
class NotePage(BaseModel):
    items: list[NoteRead]
    total: int
    page: int
    size: int
    pages: int
```

**★ 배열에서 객체로 바뀝니다.**

```json
// 전
[{...}, {...}]

// 후
{ "items": [{...}], "total": 25, "page": 1, "size": 10, "pages": 3 }
```

배열만 주면 **"전체가 몇 개인지"** 를 알려 줄 방법이 없습니다.
페이지 번호를 그리려면 `total` 이 반드시 필요합니다.

> **이건 API 계약을 깨는 변경입니다.** 12편에서는 프론트를 안 고쳤지만,
> 이번엔 고쳐야 합니다. 실무에서는 이럴 때 `/api/v2/notes` 처럼
> 버전을 나누기도 합니다.

### 3단계. ★ 백엔드 목록 라우터

```python
# backend/routers/notes.py
import math
from typing import Literal

from fastapi import APIRouter, Depends, HTTPException, Query
from sqlalchemy import func, or_, select
from sqlalchemy.orm import Session, selectinload


@router.get("", response_model=schemas.NotePage)
def list_notes(
    q: str | None = Query(default=None, max_length=100, description="제목·내용 검색"),
    folder_id: int | None = None,
    sort: Literal["newest", "oldest", "title"] = "newest",
    page: int = Query(default=1, ge=1),
    size: int = Query(default=10, ge=1, le=100),
    db: Session = Depends(get_db),
):
    # ── 1) 조건 쌓기 ──
    stmt = select(models.Note)

    if q:
        keyword = f"%{q}%"
        stmt = stmt.where(
            or_(
                models.Note.title.ilike(keyword),
                models.Note.content.ilike(keyword),
            )
        )

    if folder_id is not None:
        stmt = stmt.where(models.Note.folder_id == folder_id)

    # ── 2) 전체 개수 (자르기 전에!) ──
    total = db.scalar(select(func.count()).select_from(stmt.subquery())) or 0

    # ── 3) 정렬 ──
    if sort == "oldest":
        stmt = stmt.order_by(models.Note.id.asc())
    elif sort == "title":
        stmt = stmt.order_by(models.Note.title.asc(), models.Note.id.asc())
    else:
        stmt = stmt.order_by(models.Note.id.desc())

    # ── 4) 자르기 ──
    stmt = (
        stmt.options(selectinload(models.Note.folder))
        .offset((page - 1) * size)
        .limit(size)
    )

    items = db.scalars(stmt).all()

    return schemas.NotePage(
        items=items,
        total=total,
        page=page,
        size=size,
        pages=math.ceil(total / size) if total else 0,
    )
```

**다섯 가지를 짚습니다.**

#### ① 쿼리를 "쌓아 나간다"

```python
stmt = select(models.Note)
if q:
    stmt = stmt.where(...)      # 조건 추가
if folder_id:
    stmt = stmt.where(...)      # 또 추가
```

**아직 실행되지 않습니다.** `db.scalars(stmt)` 를 부를 때 비로소 SQL이 나갑니다.
그전까지는 "설계도"를 조립하는 중입니다.

이 방식 덕분에 **조건이 있을 때만** 붙일 수 있습니다.

#### ② ★ 개수는 자르기 **전에** 센다

```python
total = db.scalar(select(func.count()).select_from(stmt.subquery())) or 0
```

**순서가 결정적입니다.** `.limit(10)` 을 건 뒤에 세면 **항상 10** 이 나옵니다.
조건은 적용됐지만 페이지는 아직 안 자른 시점에서 세야 합니다.

#### ③ `Literal` 로 값 제한

```python
sort: Literal["newest", "oldest", "title"] = "newest"
```

이 셋 말고 다른 값이 오면 **FastAPI가 422로 막습니다.**
문자열로 받아서 `if` 로 검사하는 것보다 안전하고, `/docs` 에 선택지로 표시됩니다.

#### ④ ★ `le=100` — 보안 장치

```python
size: int = Query(default=10, ge=1, le=100)
```

**이게 없으면** 누군가 `?size=999999` 로 서버를 주저앉힐 수 있습니다.
공개 API에서 상한을 안 거는 건 사고입니다.

#### ⑤ 정렬에 두 번째 기준

```python
stmt = stmt.order_by(models.Note.title.asc(), models.Note.id.asc())
```

제목이 같은 메모가 두 개면? 순서가 **매번 달라질 수 있습니다.**
그러면 1쪽과 2쪽에 같은 메모가 나오거나, 어떤 건 아예 안 보입니다.

**정렬 기준이 유일하지 않으면 항상 `id` 를 덧붙이세요.**

### 4단계. `/docs` 로 확인

- `GET /notes` → `total: 25, pages: 3`
- `?page=3` → 5개만 나옴
- `?q=회의` → 걸러진 개수
- `?sort=hack` → **422**
- `?size=999` → **422**
- `?page=0` → **422**

### 5단계. 프론트엔드 — API 함수

```ts
// frontend/lib/api.ts
export type NotePage = {
  items: Note[];
  total: number;
  page: number;
  size: number;
  pages: number;
};

export type ListParams = {
  q?: string;
  sort?: SortKey;
  page?: number;
  size?: number;
  folderId?: number;
};

export function buildNotesQuery(params: ListParams): string {
  const sp = new URLSearchParams();

  if (params.q) sp.set("q", params.q);
  if (params.sort && params.sort !== "newest") sp.set("sort", params.sort);
  if (params.page && params.page > 1) sp.set("page", String(params.page));
  if (params.size) sp.set("size", String(params.size));
  if (params.folderId) sp.set("folder_id", String(params.folderId));

  return sp.toString();
}

export async function listNotes(params: ListParams = {}): Promise<NotePage> {
  const query = buildNotesQuery(params);
  const res = await fetch(`${API_URL}/notes${query ? `?${query}` : ""}`, {
    cache: "no-store",
  });

  if (!res.ok) throw new Error(await readError(res));
  return res.json();
}
```

**기본값은 주소에 안 넣습니다.** `?sort=newest&page=1` 은 지저분하니까요.
`/notes` 와 `/notes?page=1` 이 **같은 화면**이 되는 게 좋습니다.

### 6단계. ★ 검색창 — URL에 쓰기

```tsx
// frontend/components/note-search.tsx
"use client";

import { useRouter, useSearchParams } from "next/navigation";
import { useEffect, useState, useTransition } from "react";

import { Input } from "@/components/ui/input";

type Props = {
  initialQuery: string;
};

export function NoteSearch({ initialQuery }: Props) {
  const router = useRouter();
  const searchParams = useSearchParams();

  const [value, setValue] = useState(initialQuery);
  const [isPending, startTransition] = useTransition();

  useEffect(() => {
    const timer = setTimeout(() => {
      const params = new URLSearchParams(searchParams.toString());

      if (value.trim()) {
        params.set("q", value.trim());
      } else {
        params.delete("q");
      }

      params.delete("page");

      const query = params.toString();

      startTransition(() => {
        router.replace(query ? `/notes?${query}` : "/notes");
      });
    }, 300);

    return () => clearTimeout(timer);
    // eslint-disable-next-line react-hooks/exhaustive-deps
  }, [value]);

  return (
    <div className="relative">
      <Input
        value={value}
        onChange={(e) => setValue(e.target.value)}
        placeholder="제목·내용 검색"
        className="sm:max-w-xs"
      />

      {isPending && (
        <span className="absolute right-3 top-1/2 -translate-y-1/2 text-xs text-muted-foreground">
          검색 중...
        </span>
      )}
    </div>
  );
}
```

**이번 편에서 가장 중요한 컴포넌트입니다.** 네 가지를 짚습니다.

#### ① 왜 `useState` 를 아직 쓰나?

**타이핑은 즉각 반응해야 하기 때문입니다.**
주소가 바뀔 때까지 기다리면 글자가 뚝뚝 끊깁니다.

```
  화면용 상태 (즉각)  →  300ms 기다림  →  주소 변경 (진짜 상태)
       value                                      q
```

#### ② ★ 디바운스 — 이 패턴을 외우세요

```tsx
useEffect(() => {
  const timer = setTimeout(() => { /* 할 일 */ }, 300);
  return () => clearTimeout(timer);      // ★ 이 줄이 핵심
}, [value]);
```

`useEffect` 가 **돌려주는 함수는 "정리(cleanup)"** 입니다.
다음 입력이 들어와 effect가 다시 실행되기 **직전에** 불립니다.

```
  ㅎ 입력 → 타이머A 예약
  ㅗ 입력 → 타이머A 취소, 타이머B 예약
  ㅣ 입력 → 타이머B 취소, 타이머C 예약
  (300ms 침묵) → 타이머C 실행 ← 요청 한 번만!
```

**없으면** 글자 수만큼 요청이 나갑니다.

#### ③ `replace` vs `push`

```tsx
router.replace(...)     // ✅ 기록을 남기지 않음
router.push(...)        // ❌ 글자마다 기록이 쌓임
```

`push` 를 쓰면 "회의"를 치고 뒤로가기를 누를 때 `회의 → 회으 → 회 → ` 를
차례로 거칩니다. 최악입니다.

#### ④ 검색하면 1쪽으로

```tsx
params.delete("page");
```

3쪽을 보다가 검색하면? 결과가 1쪽뿐인데 3쪽을 보게 되어 **빈 화면**이 됩니다.
**필터가 바뀌면 항상 1쪽으로.** 잊기 쉬운 규칙입니다.

### 7단계. 정렬 탭과 페이지 번호 — 링크로

```tsx
// frontend/components/query-links.tsx
import Link from "next/link";

import { buttonVariants } from "@/components/ui/button";
import { cn } from "@/lib/utils";
import type { SortKey } from "@/lib/api";

function withParams(
  current: Record<string, string | undefined>,
  changes: Record<string, string | undefined>
): string {
  const sp = new URLSearchParams();

  for (const [key, value] of Object.entries({ ...current, ...changes })) {
    if (value) sp.set(key, value);
  }

  const query = sp.toString();
  return query ? `/notes?${query}` : "/notes";
}

const SORTS: { key: SortKey; label: string }[] = [
  { key: "newest", label: "최신순" },
  { key: "oldest", label: "오래된순" },
  { key: "title", label: "제목순" },
];

export function SortTabs({ current, sort }: {
  current: Record<string, string | undefined>;
  sort: SortKey;
}) {
  return (
    <div className="flex gap-2">
      {SORTS.map((item) => (
        <Link
          key={item.key}
          href={withParams(current, {
            sort: item.key === "newest" ? undefined : item.key,
            page: undefined,
          })}
          className={buttonVariants({
            size: "sm",
            variant: sort === item.key ? "default" : "outline",
          })}
        >
          {item.label}
        </Link>
      ))}
    </div>
  );
}

export function Pagination({ current, page, pages }: {
  current: Record<string, string | undefined>;
  page: number;
  pages: number;
}) {
  if (pages <= 1) return null;

  const from = Math.max(1, page - 2);
  const to = Math.min(pages, page + 2);
  const numbers = [];
  for (let i = from; i <= to; i++) numbers.push(i);

  const linkClass = (active: boolean) =>
    cn(
      buttonVariants({ size: "sm", variant: active ? "default" : "outline" }),
      "tabular-nums"
    );

  return (
    <nav className="flex items-center justify-center gap-2" aria-label="페이지">
      {page > 1 && (
        <Link
          href={withParams(current, {
            page: page - 1 === 1 ? undefined : String(page - 1),
          })}
          className={buttonVariants({ size: "sm", variant: "outline" })}
        >
          이전
        </Link>
      )}

      {from > 1 && <span className="px-1 text-muted-foreground">…</span>}

      {numbers.map((n) => (
        <Link
          key={n}
          href={withParams(current, { page: n === 1 ? undefined : String(n) })}
          className={linkClass(n === page)}
          aria-current={n === page ? "page" : undefined}
        >
          {n}
        </Link>
      ))}

      {to < pages && <span className="px-1 text-muted-foreground">…</span>}

      {page < pages && (
        <Link
          href={withParams(current, { page: String(page + 1) })}
          className={buttonVariants({ size: "sm", variant: "outline" })}
        >
          다음
        </Link>
      )}
    </nav>
  );
}
```

**★ 왜 버튼이 아니라 링크인가?**

| | 버튼 + onClick | **링크** |
|---|---|---|
| 새 탭에서 열기 | ❌ | ✅ |
| 주소 복사 | ❌ | ✅ |
| `"use client"` | 필요 | **불필요** |
| 검색엔진 | 못 따라감 | 따라감 |

**"페이지를 이동하는 것"은 링크입니다.** 버튼이 아닙니다.
그래서 이 파일에는 `"use client"` 가 없습니다.

**`withParams`** 는 "지금 값들은 두고 일부만 바꾼 주소"를 만듭니다.
이게 없으면 정렬을 바꿀 때 검색어가 날아갑니다.

### 8단계. 페이지 조립

```tsx
// frontend/app/notes/page.tsx
type Props = {
  searchParams: Promise<{
    q?: string;
    sort?: string;
    page?: string;
    folder_id?: string;
  }>;
};

function parseSort(value: string | undefined): SortKey {
  return value === "oldest" || value === "title" ? value : "newest";
}

function parsePage(value: string | undefined): number {
  const n = Number(value);
  return Number.isInteger(n) && n >= 1 ? n : 1;
}

export default async function NotesPage({ searchParams }: Props) {
  const sp = await searchParams;

  const q = sp.q?.trim() ?? "";
  const sort = parseSort(sp.sort);
  const page = parsePage(sp.page);
  const folderId = sp.folder_id ? Number(sp.folder_id) : undefined;

  const data = await listNotes({ q, sort, page, folderId });

  const current = {
    q: q || undefined,
    sort: sort === "newest" ? undefined : sort,
    folder_id: sp.folder_id,
  };

  return (
    <main className="mx-auto max-w-3xl px-6 py-16">
      <PageHeader
        title="메모장"
        description={q ? `"${q}" 검색 결과 ${data.total}개` : `전체 ${data.total}개`}
      >
        <Link href="/notes/new" className={buttonVariants()}>새 메모</Link>
      </PageHeader>

      <div className="mt-8 flex flex-col gap-4 sm:flex-row sm:items-center sm:justify-between">
        <NoteSearch initialQuery={q} />
        <SortTabs current={current} sort={sort} />
      </div>

      {data.items.length === 0 ? (
        <p className="py-20 text-center text-sm text-muted-foreground">
          {q ? `"${q}" 에 맞는 메모가 없습니다.` : "아직 메모가 없습니다."}
        </p>
      ) : (
        <>
          <div className="mt-6 flex flex-col gap-3">
            {data.items.map((note) => (
              <NoteCard key={note.id} note={note} />
            ))}
          </div>

          <p className="mt-6 text-center text-xs text-muted-foreground tabular-nums">
            {data.page} / {data.pages} 쪽 · 전체 {data.total}개
          </p>

          <div className="mt-4">
            <Pagination current={current} page={data.page} pages={data.pages} />
          </div>
        </>
      )}
    </main>
  );
}
```

#### ★ 주소로 들어온 값은 믿지 않는다

```tsx
function parsePage(value: string | undefined): number {
  const n = Number(value);
  return Number.isInteger(n) && n >= 1 ? n : 1;
}
```

주소창에는 **누구나 아무거나** 칠 수 있습니다.

| 입력 | `Number()` 결과 | 우리 처리 |
|---|---|---|
| `?page=abc` | `NaN` | 1쪽 |
| `?page=-5` | `-5` | 1쪽 |
| `?page=1.5` | `1.5` | 1쪽 |
| `?page=` | `0` | 1쪽 |

**백엔드도 막고(`ge=1`), 프론트도 막습니다.** 둘 다 하는 게 맞습니다.
백엔드만 막으면 사용자에게 422 에러 화면이 보이니까요.

**이 페이지에 `useState` 가 하나도 없다**는 걸 다시 보세요.
상태는 전부 주소에 있습니다.

## 실행 & 확인

- [ ] 검색어를 치면 **300ms 뒤** 결과가 바뀐다 (글자마다가 아니라)
- [ ] 주소가 `/notes?q=회의` 로 바뀐다
- [ ] **새로고침해도 검색어가 유지된다** ← 08편에서 안 됐던 것
- [ ] 정렬 탭을 눌러도 **검색어가 유지된다**
- [ ] 3쪽에서 검색하면 **1쪽으로 간다**
- [ ] 페이지 번호를 **새 탭에서 열 수 있다** (가운데 클릭)
- [ ] `/notes?page=abc` → 1쪽이 나옴 (에러 아님)
- [ ] `/notes?sort=hack` → 최신순 (에러 아님)
- [ ] 메모를 열었다가 **뒤로 가면 검색 결과로 돌아온다**

## 흔한 에러

<details open>
<summary><b>1. 글자를 칠 때마다 요청이 나간다</b></summary>

디바운스의 **정리 함수**를 빠뜨렸습니다.

```tsx
return () => clearTimeout(timer);    // ← 이 줄
```
</details>

<details>
<summary><b>2. 뒤로가기를 누르면 글자 하나씩 지워진다</b></summary>

`router.push` 를 썼습니다. **`router.replace`** 로 바꾸세요.
</details>

<details>
<summary><b>3. 정렬을 바꾸면 검색어가 사라진다</b></summary>

링크를 만들 때 기존 값을 안 가져왔습니다. `withParams` 처럼
**지금 값들을 복사한 뒤 일부만** 바꾸세요.
</details>

<details>
<summary><b>4. 검색했더니 빈 화면인데 결과는 있다고 나온다</b></summary>

`page` 를 안 지웠습니다. 3쪽을 보다가 검색해서 3쪽을 요청한 것입니다.

```tsx
params.delete("page");
```
</details>

<details>
<summary><b>5. <code>total</code> 이 항상 10이다</b></summary>

**`.limit()` 을 건 뒤에** 개수를 셌습니다. 자르기 **전에** 세야 합니다.
</details>

<details>
<summary><b>6. 검색창에 글자가 안 써지거나 커서가 튄다</b></summary>

`value={q}` 처럼 **서버가 준 값을 그대로** 입력칸에 물렸을 가능성이 큽니다.
화면용 `useState` 를 따로 두고, 주소는 디바운스로 나중에 바꾸세요.
</details>

<details>
<summary><b>7. <code>useSearchParams</code> 관련 빌드 오류</b></summary>

```
useSearchParams() should be wrapped in a suspense boundary
```

`useSearchParams` 를 쓰는 컴포넌트는 `<Suspense>` 로 감싸야 할 때가 있습니다.
우리 구조(페이지가 이미 동적)에서는 안 나지만, 정적 페이지에서 쓰면 납니다.
</details>

<details>
<summary><b>8. 같은 메모가 1쪽과 2쪽에 다 나온다</b></summary>

**정렬 기준이 유일하지 않습니다.** 제목이 같은 항목들의 순서가 매번 달라진 것입니다.
`order_by(title, id)` 처럼 `id` 를 덧붙이세요.
</details>

## 조금 더: 성능

메모가 10만 개가 되면 검색이 느려집니다. 두 가지를 알아 두세요.

### 인덱스

12편에서 `index=True` 를 준 것이 여기서 일합니다.

```python
title: Mapped[str] = mapped_column(String(100), index=True)
```

**인덱스는 책의 색인**입니다. 없으면 처음부터 끝까지 다 읽어야 합니다.

다만 **`ilike("%회의%")` 는 인덱스를 못 씁니다.** 앞에 `%` 가 있으면
"어디든 포함"이라 색인이 무용지물이거든요.

제대로 하려면 PostgreSQL의 **전문 검색**(`to_tsvector`)이나
`pg_trgm` 확장이 필요합니다. 지금 규모에서는 신경 쓰지 마세요.

### OFFSET의 함정

`OFFSET 100000` 은 **앞의 10만 개를 실제로 읽고 버립니다.** 뒤쪽 페이지일수록 느려집니다.

무한 스크롤 같은 데서는 **커서 페이지네이션**을 씁니다.

```
GET /notes?after_id=1234&size=10     → WHERE id < 1234 LIMIT 10
```

건너뛰지 않고 **바로 그 지점부터** 읽으니 몇 쪽이든 같은 속도입니다.
대신 "5쪽으로 바로 가기"는 안 됩니다.

> **지금은 OFFSET으로 충분합니다.** 이런 게 있다는 것만 알아 두세요.

## 개념 먼저

### 파일은 JSON으로 못 보냅니다

JSON은 **글자**만 담을 수 있습니다. 사진은 **바이트 덩어리**죠.
억지로 넣으려면 base64로 바꿔야 하는데, **크기가 33% 늘어납니다.**

그래서 파일은 `multipart/form-data` 라는 다른 형식으로 보냅니다.

```
POST /notes/1/image
Content-Type: multipart/form-data; boundary=----abc123

------abc123
Content-Disposition: form-data; name="file"; filename="photo.png"
Content-Type: image/png

(여기에 파일의 바이트가 그대로)
------abc123--
```

**`boundary`** 는 "여기부터 다음 부분"을 나누는 구분선입니다.
직접 만들 일은 없습니다. `FormData` 를 쓰면 브라우저가 알아서 합니다.

### ★ 왜 파일을 DB에 안 넣나

넣을 수는 있습니다(`BLOB`). 그런데 거의 항상 나쁜 선택입니다.

| | DB에 저장 | **파일로 저장** |
|---|---|---|
| DB 백업 크기 | 수십 GB로 폭증 | 작게 유지 |
| 이미지 전송 | 매번 DB 조회 | **웹서버가 바로** |
| CDN 활용 | 어려움 | 쉬움 |
| 확장 | 어려움 | S3로 옮기면 끝 |

**"DB에는 파일 이름만, 파일은 디스크에."** 이게 표준입니다.

```python
image_name: Mapped[str | None] = mapped_column(String(64), nullable=True)
#            ↑ "a3f8b2c1....png" 같은 이름만
```

### ★★ 업로드에서 막아야 할 네 가지

**업로드는 "남이 내 서버에 파일을 쓰게 해 주는 것"입니다.** 위험할 수밖에 없죠.

| 위험 | 무슨 일이 | 막는 법 |
|---|---|---|
| **① 경로 조작** | `../../etc/passwd` 같은 이름으로 엉뚱한 곳에 덮어쓰기 | **이름을 새로 만든다** |
| **② 용량 폭탄** | 10GB 파일로 디스크·메모리 고갈 | 크기 제한 + **조금씩 읽기** |
| **③ 위장 파일** | 실행 파일에 `image/png` 라고 써 붙여 보냄 | **진짜 이미지인지 열어 본다** |
| **④ 덮어쓰기** | 같은 이름으로 남의 파일 교체 | 이름을 겹치지 않게 |

**①과 ③이 특히 중요합니다.** 하나씩 코드로 봅시다.

> **왜 전체 주소가 아니라 이름만 주나요?**

### 3단계. ★★ 저장 로직 — 이번 편의 핵심

`backend/storage.py` 를 새로 만듭니다.

```python
# backend/storage.py
import uuid
from pathlib import Path

from fastapi import HTTPException, UploadFile
from PIL import Image, UnidentifiedImageError

UPLOAD_DIR = Path(__file__).parent / "uploads"
UPLOAD_DIR.mkdir(exist_ok=True)

ALLOWED_TYPES = {
    "image/jpeg": ".jpg",
    "image/png": ".png",
    "image/webp": ".webp",
    "image/gif": ".gif",
}

MAX_BYTES = 5 * 1024 * 1024  # 5MB
THUMB_SIZE = (400, 400)


async def save_image(file: UploadFile) -> str:
    # ── 1) 형식 검사 ──
    if file.content_type not in ALLOWED_TYPES:
        raise HTTPException(
            status_code=400,
            detail="이미지만 올릴 수 있습니다. (jpg, png, webp, gif)",
        )

    # ── 2) 크기 검사 (조금씩 읽으면서) ──
    chunks: list[bytes] = []
    total = 0

    while chunk := await file.read(1024 * 1024):
        total += len(chunk)
        if total > MAX_BYTES:
            raise HTTPException(status_code=413, detail="파일이 너무 큽니다. (최대 5MB)")
        chunks.append(chunk)

    data = b"".join(chunks)

    if not data:
        raise HTTPException(status_code=400, detail="빈 파일입니다.")

    # ── 3) 이름을 새로 만들기 ──
    extension = ALLOWED_TYPES[file.content_type]
    name = f"{uuid.uuid4().hex}{extension}"
    path = UPLOAD_DIR / name

    path.write_bytes(data)

    # ── 4) 진짜 이미지인지 확인 + 썸네일 ──
    try:
        with Image.open(path) as img:
            img.verify()

        with Image.open(path) as img:
            img.thumbnail(THUMB_SIZE)
            img.save(path)
    except (UnidentifiedImageError, OSError):
        path.unlink(missing_ok=True)
        raise HTTPException(status_code=400, detail="이미지 파일이 아닙니다.")

    return name


def delete_image(name: str | None) -> None:
    if not name:
        return

    if "/" in name or "\\" in name or ".." in name:
        return

    (UPLOAD_DIR / name).unlink(missing_ok=True)
```

**네 개의 방어선을 하나씩 봅시다.**

#### ① 이름을 새로 만든다 — 가장 중요합니다

```python
name = f"{uuid.uuid4().hex}{extension}"
```

**사용자가 보낸 `file.filename` 을 절대 그대로 쓰지 마세요.**

```python
path = UPLOAD_DIR / file.filename       # 💀 절대 안 됩니다
```

공격자가 파일 이름을 이렇게 보낼 수 있습니다:

```
../../../../backend/main.py
```

그러면 **내 서버 코드가 덮어써집니다.** 이걸 **경로 조작(Path Traversal)** 이라고 합니다.

`uuid4()` 로 매번 새 이름을 만들면 이 문제도, **덮어쓰기 문제(④)** 도 함께 사라집니다.

#### ② 조금씩 읽는다

```python
while chunk := await file.read(1024 * 1024):    # 1MB 씩
    total += len(chunk)
    if total > MAX_BYTES:
        raise HTTPException(status_code=413, ...)
```

```python
data = await file.read()      # 💀 통째로 읽으면
```

10GB 파일을 보내면 **서버 메모리가 터집니다.**
조금씩 읽으면서 한도를 넘는 순간 멈춰야 합니다.

> **`:=` 는 뭔가요?** "대입하면서 동시에 값으로 쓰기"입니다 (왈러스 연산자).
> `chunk = await file.read(...)` 를 하고 그 값이 비었는지 검사하는 걸 한 줄로 쓴 것입니다.

> **413** 은 "보낸 게 너무 크다"는 뜻의 상태 코드입니다.

#### ③ 진짜 이미지인지 열어 본다

```python
with Image.open(path) as img:
    img.verify()
```

**`content_type` 은 클라이언트가 "그렇다고 말한 것"일 뿐입니다.**
실행 파일에 `image/png` 라고 써 붙여 보낼 수 있습니다.

Pillow로 실제로 **열어 봐야** 진짜인지 알 수 있습니다.

```python
except (UnidentifiedImageError, OSError):
    path.unlink(missing_ok=True)      # ★ 저장한 걸 지웁니다
    raise HTTPException(...)
```

**실패하면 반드시 지우세요.** 안 그러면 쓰레기 파일이 쌓입니다.

> `verify()` 후에는 파일이 닫히므로 **다시 열어야** 썸네일을 만들 수 있습니다.
> Pillow의 특이한 점입니다.

#### 썸네일

```python
img.thumbnail(THUMB_SIZE)     # (400, 400)
img.save(path)
```

`thumbnail()` 은 **비율을 유지하면서** 그 안에 들어가게 줄입니다.
1200×900 → 400×300 이 됩니다.

휴대폰 사진은 5MB가 넘습니다. 줄여서 저장하면 디스크와 전송량이 크게 줄어듭니다.

### 4단계. 업로드 엔드포인트

```python
# backend/routers/notes.py
from fastapi import File, UploadFile
import storage


@router.post("/{note_id}/image", response_model=schemas.NoteRead)
async def upload_image(
    note_id: int,
    file: UploadFile = File(...),
    db: Session = Depends(get_db),
):
    note = find_note(db, note_id)

    # 새 사진을 "먼저" 저장합니다.
    new_name = await storage.save_image(file)

    # 성공했으니 이제 옛날 사진을 지웁니다.
    old_name = note.image_name
    note.image_name = new_name

    db.commit()
    db.refresh(note)

    storage.delete_image(old_name)

    return note


@router.delete("/{note_id}/image", response_model=schemas.NoteRead)
def delete_image(note_id: int, db: Session = Depends(get_db)):
    note = find_note(db, note_id)

    if note.image_name is None:
        raise HTTPException(status_code=404, detail="사진이 없습니다.")

    old_name = note.image_name
    note.image_name = None

    db.commit()
    db.refresh(note)

    storage.delete_image(old_name)

    return note
```

**★ 순서가 중요합니다.**

```
  ✅ 새 것 저장 → DB 갱신 → 옛 것 삭제
  ❌ 옛 것 삭제 → 새 것 저장     ← 저장에 실패하면 사진이 사라집니다
```

**메모를 지울 때도** 사진을 지워야 합니다.

```python
@router.delete("/{note_id}", status_code=204)
def delete_note(note_id: int, db: Session = Depends(get_db)):
    note = find_note(db, note_id)
    storage.delete_image(note.image_name)      # ← 추가
    db.delete(note)
    db.commit()
```

안 그러면 **아무도 안 보는 파일**이 디스크에 영원히 쌓입니다.

> **`async def` 인 이유**: `await file.read(...)` 를 쓰기 때문입니다.
> 파일을 읽는 동안 서버가 다른 요청을 처리할 수 있습니다.

### 5단계. 파일 서빙

```python
# backend/main.py
from fastapi.staticfiles import StaticFiles
from storage import UPLOAD_DIR

# ... 라우터들 아래에

app.mount("/uploads", StaticFiles(directory=UPLOAD_DIR), name="uploads")
```

이제 `/uploads/a3f8....png` 로 파일을 받을 수 있습니다.

**`StaticFiles` 는 그 폴더 밖으로 나가는 요청을 알아서 막습니다.**
`/uploads/../main.py` 같은 건 통하지 않습니다.

> **실제 서비스에서는** 이렇게 안 합니다. nginx 같은 웹서버나 S3/CDN이
> 파일을 내보내는 게 훨씬 빠릅니다. 파이썬 서버가 파일을 나르느라
> 정작 API 처리를 못 하면 손해니까요. **개발용으로는 충분합니다.**

### 6단계. 프론트엔드 — `next/image` 허용 설정

```ts
// frontend/next.config.ts
import type { NextConfig } from "next";

const nextConfig: NextConfig = {
  images: {
    remotePatterns: [
      {
        protocol: "http",
        hostname: "127.0.0.1",
        port: "8000",
        pathname: "/uploads/**",
      },
      {
        protocol: "http",
        hostname: "localhost",
        port: "8000",
        pathname: "/uploads/**",
      },
    ],

    // ★★ Next.js 16 부터 이 줄이 필요합니다. 아래 설명을 꼭 읽으세요.
    dangerouslyAllowLocalIP: process.env.NODE_ENV === "development",
  },
};

export default nextConfig;
```

**`next/image` 는 아무 주소의 이미지나 처리해 주지 않습니다.**
허락한 곳만 씁니다. 안 그러면 내 서버가 **남의 이미지 변환 서버**가 되어 버리니까요.

#### ★★ `dangerouslyAllowLocalIP` — Next.js 16의 함정

**`remotePatterns` 를 제대로 넣었는데도** 이런 오류가 납니다:

```
GET /_next/image?url=http%3A%2F%2F127.0.0.1%3A8000%2F... 400
"url" parameter is not allowed
```

**Next.js 16부터** `127.0.0.1`, `localhost`, `192.168.x.x` 같은
**내부망 주소의 이미지는 기본적으로 막혀 있습니다.**

이유는 **SSRF** 라는 공격 때문입니다. 이미지 최적화 기능은 "이 주소의 이미지를 받아 와라"인데,
공격자가 내부망 주소를 넣으면 **서버가 대신 내부망을 훑어 주는 도구**가 되어 버립니다.
클라우드 환경에서는 이걸로 관리자 인증 정보까지 빼낼 수 있습니다.

그래서 Next.js가 아예 막았고, 이름부터 **`dangerously`(위험하게)** 인 설정으로만 풀 수 있습니다.

```ts
dangerouslyAllowLocalIP: process.env.NODE_ENV === "development",
```

**개발 중일 때만 켭니다.** 배포하면 백엔드가 공개 도메인이므로 필요 없습니다.

> 인터넷의 옛날 예제에는 이 줄이 없습니다. Next.js 15까지는 안 막았거든요.
> **remotePatterns가 맞는데 400이 난다면 이것입니다.**

> ⚠️ **이 파일을 고치면 개발 서버를 껐다 켜야 합니다.**

### 7단계. ★ 업로드 함수 — 여기만 fetch가 아닙니다

```ts
// frontend/lib/api.ts
export function imageUrl(name: string): string {
  return `${API_URL}/uploads/${name}`;
}

export function uploadImage(
  noteId: number,
  file: File,
  onProgress?: (percent: number) => void
): Promise<Note> {
  return new Promise((resolve, reject) => {
    const xhr = new XMLHttpRequest();

    xhr.open("POST", `${API_URL}/notes/${noteId}/image`);

    xhr.upload.addEventListener("progress", (event) => {
      if (event.lengthComputable && onProgress) {
        onProgress(Math.round((event.loaded / event.total) * 100));
      }
    });

    xhr.addEventListener("load", () => {
      if (xhr.status >= 200 && xhr.status < 300) {
        resolve(JSON.parse(xhr.responseText));
        return;
      }

      let message = `업로드 실패 (${xhr.status})`;
      try {
        const body = JSON.parse(xhr.responseText);
        if (typeof body?.detail === "string") message = body.detail;
      } catch {
        // JSON 이 아니면 기본 메시지
      }
      reject(new Error(message));
    });

    xhr.addEventListener("error", () =>
      reject(new Error("서버에 연결하지 못했습니다."))
    );

    const form = new FormData();
    form.append("file", file);

    xhr.send(form);
  });
}
```

**★ 왜 여기만 `XMLHttpRequest` 인가?**

**`fetch` 는 업로드 진행률을 알려 주지 못합니다.** (다운로드는 되는데 업로드는 안 됩니다.)
20년 된 `XMLHttpRequest` 가 이건 됩니다.

> 진행률이 필요 없다면 `fetch` 로 해도 됩니다. 훨씬 짧습니다.
> **진행률 하나 때문에** 이 코드를 쓰는 것입니다.

**★★ `Content-Type` 을 직접 넣지 마세요**

```ts
xhr.setRequestHeader("Content-Type", "multipart/form-data");   // 💀 하지 마세요
```

이러면 **`boundary` 가 빠져서** 서버가 본문을 못 읽습니다.
`FormData` 를 그냥 보내면 브라우저가 boundary까지 붙여 줍니다.

**가장 흔한 업로드 실패 원인입니다.**

### 8단계. 업로드 컴포넌트

```tsx
// frontend/components/image-upload.tsx
"use client";

import Image from "next/image";
import { useRouter } from "next/navigation";
import { useRef, useState } from "react";

import { Button } from "@/components/ui/button";
import { deleteImage, imageUrl, uploadImage, type Note } from "@/lib/api";

type Props = {
  note: Note;
};

export function ImageUpload({ note }: Props) {
  const router = useRouter();
  const inputRef = useRef<HTMLInputElement>(null);

  const [progress, setProgress] = useState<number | null>(null);
  const [error, setError] = useState<string | null>(null);
  const [busy, setBusy] = useState(false);

  async function handleFile(file: File) {
    setError(null);
    setProgress(0);
    setBusy(true);

    try {
      await uploadImage(note.id, file, setProgress);
      router.refresh();
    } catch (err) {
      setError(err instanceof Error ? err.message : "업로드하지 못했습니다.");
    } finally {
      setBusy(false);
      setProgress(null);
      if (inputRef.current) inputRef.current.value = "";
    }
  }

  async function handleDelete() {
    if (!confirm("사진을 지울까요?")) return;

    setError(null);
    setBusy(true);
    try {
      await deleteImage(note.id);
      router.refresh();
    } catch (err) {
      setError(err instanceof Error ? err.message : "삭제하지 못했습니다.");
    } finally {
      setBusy(false);
    }
  }

  return (
    <div className="flex flex-col gap-3">
      {note.image_name && (
        <div className="overflow-hidden rounded-lg border">
          <Image
            src={imageUrl(note.image_name)}
            alt={note.title}
            width={400}
            height={400}
            className="h-auto w-full object-cover"
          />
        </div>
      )}

      <input
        ref={inputRef}
        type="file"
        accept="image/*"
        className="hidden"
        onChange={(e) => {
          const file = e.target.files?.[0];
          if (file) handleFile(file);
        }}
      />

      {progress !== null && (
        <div className="flex items-center gap-3">
          <div className="h-2 flex-1 overflow-hidden rounded-full bg-muted">
            <div
              className="h-full bg-primary transition-all"
              style={{ width: `${progress}%` }}
            />
          </div>
          <span className="text-xs tabular-nums text-muted-foreground">
            {progress}%
          </span>
        </div>
      )}

      {error && <p className="text-sm text-destructive">{error}</p>}

      <div className="flex gap-2">
        <Button
          type="button"
          variant="outline"
          size="sm"
          disabled={busy}
          onClick={() => inputRef.current?.click()}
        >
          {note.image_name ? "사진 바꾸기" : "사진 추가"}
        </Button>

        {note.image_name && (
          <Button
            type="button"
            variant="destructive"
            size="sm"
            disabled={busy}
            onClick={handleDelete}
          >
            사진 삭제
          </Button>
        )}
      </div>
    </div>
  );
}
```

**세 가지 요령을 짚습니다.**

#### ① `useRef` — 숨긴 input 누르기

기본 파일 선택 버튼(`<input type="file">`)은 **스타일을 입히기 어렵습니다.**
그래서 숨기고, 예쁜 버튼으로 대신 누릅니다.

```tsx
const inputRef = useRef<HTMLInputElement>(null);

<input ref={inputRef} type="file" className="hidden" />
<Button onClick={() => inputRef.current?.click()}>사진 추가</Button>
```

**`useRef` 는 "DOM 요소를 직접 잡는 손잡이"** 입니다.
`useState` 와 달리 값이 바뀌어도 **화면을 다시 그리지 않습니다.**

#### ② ★ 끝나면 input을 비운다

```tsx
if (inputRef.current) inputRef.current.value = "";
```

**이걸 안 하면 "같은 파일을 다시 고르기"가 동작하지 않습니다.**
값이 안 바뀌면 `onChange` 가 안 일어나니까요.

업로드가 실패해서 같은 사진을 다시 시도할 때 **아무 반응이 없어 당황하게 됩니다.**

#### ③ `next/image` 의 `width`/`height`

```tsx
<Image src={...} alt={...} width={400} height={400} />
```

이 숫자는 "이 크기로 그려라"가 아니라 **"비율을 알려 주는 것"** 입니다.
Next.js가 **자리를 미리 잡아 둬서** 이미지가 늦게 떠도 화면이 안 튑니다.

실제 크기는 `className` 이 정합니다.

> **`alt` 를 꼭 쓰세요.** 화면을 못 보는 사람이 쓰는 프로그램이 읽어 주는 글입니다.
> 이미지가 안 뜰 때도 대신 보입니다.

## 흔한 에러

<details open>
<summary><b>1. <code>422 Unprocessable Entity</code> — 업로드할 때</b></summary>

거의 항상 셋 중 하나입니다.

- **`Content-Type` 을 직접 지정했습니다.** 빼세요. `FormData` 만 보내면 됩니다
- `FormData` 의 이름이 백엔드와 다릅니다 → 둘 다 `"file"` 이어야 합니다
- `python-multipart` 가 없습니다 → `pip install "fastapi[standard]"`
</details>

<details open>
<summary><b>2. <code>"url" parameter is not allowed</code> (400) — remotePatterns는 맞는데</b></summary>

**Next.js 16의 새 보안 기능입니다.** 내부망 주소(`127.0.0.1`, `localhost`)를 막습니다.

```ts
// next.config.ts
images: {
  remotePatterns: [...],
  dangerouslyAllowLocalIP: process.env.NODE_ENV === "development",   // ← 추가
}
```

고친 뒤 **개발 서버를 껐다 켜세요.** 자세한 이유는 위 6단계 참고.
</details>

<details>
<summary><b>3. <code>Invalid src prop ... hostname not configured</code></b></summary>

`next.config.ts` 의 `remotePatterns` 에 그 주소를 안 넣었습니다.
**넣은 뒤 개발 서버를 껐다 켜세요.**

`localhost` 와 `127.0.0.1` 은 **다른 것으로 취급**됩니다. 둘 다 넣어 두세요.
</details>

<details>
<summary><b>3. 이미지가 안 뜨고 404</b></summary>

- `app.mount("/uploads", ...)` 를 했나요?
- 브라우저에서 `http://127.0.0.1:8000/uploads/파일이름` 을 직접 열어 보세요
- `.env.local` 의 주소와 `next.config.ts` 의 hostname이 **같은지** 확인
  (`localhost` 와 `127.0.0.1` 은 다른 것으로 취급됩니다)
</details>

<details>
<summary><b>4. 같은 파일을 다시 고르면 아무 일이 없다</b></summary>

업로드 후 input을 안 비웠습니다.

```tsx
if (inputRef.current) inputRef.current.value = "";
```
</details>

<details>
<summary><b>5. 진행률이 0에서 100으로 점프한다</b></summary>

**정상입니다.** 파일이 작고 서버가 같은 컴퓨터에 있으면 순식간에 끝납니다.
큰 파일로 시험해 보세요.
</details>

<details>
<summary><b>6. <code>cannot identify image file</code></b></summary>

Pillow가 "이건 이미지가 아니다"라고 판단한 것입니다. **막으려던 게 막힌 것이니 정상**입니다.
진짜 이미지인데 이러면, 파일이 깨졌거나 Pillow가 모르는 형식입니다.
</details>

<details>
<summary><b>7. 업로드는 됐는데 화면이 안 바뀐다</b></summary>

`router.refresh()` 를 안 불렀습니다.
</details>

<details>
<summary><b>8. <code>ModuleNotFoundError: No module named 'PIL'</code></b></summary>

`pip install pillow` — 패키지 이름은 `pillow` 인데 import는 `PIL` 입니다. 헷갈립니다.
</details>

## 스스로 해보기

### ★ 문제 1 — 목록에 썸네일

메모 카드에도 사진을 작게 보여 주세요.

> 힌트: `note.image_name` 이 있을 때만. `width={80} height={80}` 정도.
> 없는 메모와 있는 메모가 섞여도 **줄이 안 흔들리게** 만들어 보세요.

### ★★ 문제 2 — 끌어다 놓기

파일을 드래그해서 놓아도 업로드되게 하세요.

> 힌트: `onDragOver` (기본 동작을 `preventDefault` 로 막아야 합니다),
> `onDrop` 에서 `e.dataTransfer.files[0]`.
>
> 드래그 중일 때 테두리 색을 바꾸면 훨씬 나아 보입니다.

### ★★★ 문제 3 — 올리기 전에 미리 보기

파일을 고르는 즉시 **업로드 전에** 화면에 보여 주세요.

> 힌트: `URL.createObjectURL(file)` 이 브라우저 안의 임시 주소를 만들어 줍니다.
>
> **주의**: 다 쓰면 `URL.revokeObjectURL()` 로 풀어 줘야 메모리가 샙니다.
> `useEffect` 의 정리 함수에서 하면 됩니다 (15편 디바운스와 같은 자리).
>
> 그리고 **올리기 전에 브라우저에서 크기를 줄이는 것**도 해 볼 만합니다.
> `<canvas>` 를 쓰면 됩니다. 휴대폰 사진이 5MB를 넘어 거절당하는 문제가 사라집니다.

## 개념 먼저

### ★ 비밀번호를 그냥 저장하면 안 되는 이유

```python
password: Mapped[str] = mapped_column(String(255))   # 💀 절대 안 됩니다
```

DB가 한 번 유출되면 **모든 사용자의 비밀번호가 그대로** 털립니다.
그리고 사람들은 **같은 비밀번호를 여러 곳에 씁니다.** 내 서비스의 유출이
그 사람의 이메일과 은행 계정까지 뚫는 열쇠가 됩니다.

**"우리는 안 털릴 거야"는 계획이 아닙니다.**

### 해시 — 되돌릴 수 없는 변환

```
  "password123"  ──해시──▶  "$2b$12$KIXQ...vGGe"
                              │
                  ◀── 되돌리기 불가능 ──┘
```

그럼 로그인은 어떻게 확인할까요? **다시 해시해서 비교**합니다.

```
  입력한 비밀번호 → 해시 → 저장된 해시와 같은가?
```

**서버조차 원래 비밀번호를 모릅니다.** 이게 정상입니다.
"비밀번호를 잊으셨나요?"에 **원래 비밀번호를 알려 주는 서비스**가 있다면
그건 그냥 저장하고 있다는 뜻입니다. 도망치세요.

### 소금(salt) — 같은 비밀번호도 다르게

사람들은 `password123` 을 많이 씁니다. 해시가 늘 같다면?
공격자는 **미리 계산해 둔 표**(레인보우 테이블)로 한 번에 뚫습니다.

**소금**은 해시할 때 섞는 무작위 값입니다.

```python
hash_password("password123")   # → "$2b$12$AAA...111"
hash_password("password123")   # → "$2b$12$BBB...222"   같은데 다릅니다!
```

bcrypt는 **소금을 해시 문자열 안에 같이 저장**합니다. 그래서 따로 관리할 필요가 없습니다.

### 왜 bcrypt인가 (SHA-256이 아니라)

| | SHA-256 | **bcrypt** |
|---|---|---|
| 속도 | **엄청 빠름** | **일부러 느림** |
| 용도 | 파일 무결성 검사 | **비밀번호** |

**비밀번호 해시는 느려야 합니다.** 빠르면 공격자가 초당 수십억 개를 시도할 수 있으니까요.
bcrypt는 일부러 느리게 설계됐고, 컴퓨터가 빨라지면 **더 느리게 조절**할 수 있습니다.

> 요즘은 **argon2** 를 더 권하기도 합니다. bcrypt도 여전히 안전하고, 자료가 훨씬 많습니다.

### JWT — 출입증

로그인에 성공하면 **출입증**을 줍니다. 그 뒤로는 이걸 보여 주면 됩니다.

```
  eyJhbGciOiJIUzI1NiJ9  .  eyJzdWIiOiIxIiwiZXhwIjoxNzY...  .  4pcPyMD0...
  └────── 헤더 ──────┘     └─────────── 내용 ───────────┘    └── 서명 ──┘
     무슨 방식으로            누구인지, 언제까지            위조 방지
```

**★★ 가장 중요한 사실: 내용은 암호화되어 있지 않습니다.**

가운데 부분은 그냥 base64입니다. [jwt.io](https://jwt.io) 에 붙여넣으면 **누구나 읽을 수 있습니다.**

```
  서명이 막는 것: 내용을 "고치는" 것
  서명이 못 막는 것: 내용을 "읽는" 것
```

**그러니 토큰에 비밀을 담지 마세요.** 사용자 id 정도면 충분합니다.

### JWT의 진짜 단점

| | 세션(서버 저장) | **JWT** |
|---|---|---|
| 서버 저장소 | 필요 | **불필요** |
| 서버 여러 대 | 공유 저장소 필요 | 그냥 됨 |
| **강제 로그아웃** | 즉시 가능 | **거의 불가능** ← |

**한 번 발급한 JWT는 만료될 때까지 유효합니다.** 취소할 방법이 없습니다.
계정을 정지시켜도 토큰이 남아 있으면 계속 들어옵니다.

그래서 실무에서는:
- 유효 시간을 **짧게** (15분~1시간)
- **refresh token** 을 따로 둬서 갱신
- 급하면 `secret_key` 를 바꿔 **전원 로그아웃**

> 이 교재는 하루짜리 토큰 하나로 갑니다. 학습용으로는 충분합니다.

### 3단계. ★ 보안 함수들

`backend/security.py`:

```python
# backend/security.py
from datetime import datetime, timedelta, timezone

import bcrypt
import jwt

from config import settings

ALGORITHM = "HS256"


def hash_password(password: str) -> str:
    raw = password.encode("utf-8")[:72]
    return bcrypt.hashpw(raw, bcrypt.gensalt()).decode("utf-8")


def verify_password(password: str, hashed: str) -> bool:
    raw = password.encode("utf-8")[:72]
    try:
        return bcrypt.checkpw(raw, hashed.encode("utf-8"))
    except ValueError:
        return False


def create_access_token(user_id: int) -> str:
    now = datetime.now(timezone.utc)

    payload = {
        "sub": str(user_id),
        "exp": now + timedelta(minutes=settings.access_token_minutes),
        "iat": now,
    }

    return jwt.encode(payload, settings.secret_key, algorithm=ALGORITHM)


def decode_access_token(token: str) -> int | None:
    try:
        payload = jwt.decode(token, settings.secret_key, algorithms=[ALGORITHM])
    except jwt.ExpiredSignatureError:
        return None
    except jwt.InvalidTokenError:
        return None

    sub = payload.get("sub")
    if sub is None:
        return None

    try:
        return int(sub)
    except (TypeError, ValueError):
        return None
```

**네 가지를 짚습니다.**

#### ① `[:72]` — bcrypt의 72바이트 한계

**bcrypt는 72바이트까지만 봅니다. 그 뒤는 조용히 무시됩니다.**

한글은 한 글자가 3바이트라 **24글자가 넘으면 잘립니다.**
미리 잘라 두면 최소한 동작이 일정해집니다.

> bcrypt 5.x부터는 72바이트를 넘기면 아예 오류를 냅니다.
> 미리 자르는 게 안전합니다.

#### ② `sub` 는 문자열이어야 합니다

```python
"sub": str(user_id),      # 1 이 아니라 "1"
```

JWT 표준이 그렇게 정해 놨습니다. 숫자로 넣으면 라이브러리에 따라 거부합니다.

#### ③ `exp` 는 자동으로 검사됩니다

`exp` 를 넣어 두면 `jwt.decode()` 가 **알아서 만료를 확인**합니다.
우리가 시간을 비교하는 코드를 쓸 필요가 없습니다.

#### ④ 실패하면 이유를 안 알려 준다

```python
except jwt.ExpiredSignatureError:
    return None
except jwt.InvalidTokenError:
    return None
```

"만료됨"과 "서명 위조"를 구분해 알려 주면 공격자에게 힌트가 됩니다.
**둘 다 그냥 `None`** 입니다.

### 5단계. ★★ 까다로운 마이그레이션

**여기가 이번 편에서 기술적으로 가장 어려운 부분입니다.**

`owner_id` 는 `NOT NULL` 인데, **이미 있는 메모들에는 주인이 없습니다.**
그냥 추가하면 실패합니다 (13편에서 본 그 문제).

**세 단계로 나눕니다.**

```python
def upgrade() -> None:
    # 1) users 테이블
    op.create_table(
        "users",
        sa.Column("id", sa.Integer(), nullable=False),
        sa.Column("email", sa.String(length=255), nullable=False),
        sa.Column("password_hash", sa.String(length=255), nullable=False),
        sa.Column("created_at", sa.DateTime(),
                  server_default=sa.text("CURRENT_TIMESTAMP"), nullable=False),
        sa.PrimaryKeyConstraint("id"),
    )
    op.create_index(op.f("ix_users_email"), "users", ["email"], unique=True)

    # 2) 일단 NULL 허용으로 추가
    with op.batch_alter_table("notes") as batch:
        batch.add_column(sa.Column("owner_id", sa.Integer(), nullable=True))

    # 3) 기존 메모에 임시 주인을 만들어 넘겨줍니다
    conn = op.get_bind()

    orphan_count = conn.execute(
        sa.text("SELECT count(*) FROM notes WHERE owner_id IS NULL")
    ).scalar_one()

    if orphan_count:
        conn.execute(
            sa.text(
                "INSERT INTO users (email, password_hash, created_at) "
                "VALUES (:email, :pw, CURRENT_TIMESTAMP)"
            ),
            {"email": "legacy@example.com", "pw": "!" * 60},
        )

        legacy_id = conn.execute(
            sa.text("SELECT id FROM users WHERE email = :email"),
            {"email": "legacy@example.com"},
        ).scalar_one()

        conn.execute(
            sa.text("UPDATE notes SET owner_id = :uid WHERE owner_id IS NULL"),
            {"uid": legacy_id},
        )

    # 4) 이제 NOT NULL 로 조입니다
    with op.batch_alter_table("notes") as batch:
        batch.alter_column("owner_id", existing_type=sa.Integer(), nullable=False)
        batch.create_foreign_key(
            "fk_notes_owner_id", "users", ["owner_id"], ["id"], ondelete="CASCADE"
        )

    op.create_index(op.f("ix_notes_owner_id"), "notes", ["owner_id"])
```

**이 패턴을 기억해 두세요.** 실무에서 계속 씁니다.

```
  NULL 허용으로 추가  →  값을 채움  →  NOT NULL 로 조임
```

`op.get_bind()` 는 **마이그레이션 안에서 SQL을 직접 실행**할 때 씁니다.
여기서 ORM(`models.User`)을 쓰면 안 됩니다. **모델은 앞으로 계속 바뀌지만,
마이그레이션은 과거의 특정 시점을 재현해야 하기 때문**입니다.

> **임시 계정의 비밀번호는 `"!" * 60`** 입니다. bcrypt 해시가 아니라서
> **아무도 로그인할 수 없습니다.** 데이터를 버리지 않으려는 장치일 뿐입니다.
>
> 실무에서는 "그냥 기존 데이터를 지운다"가 답일 때도 많습니다. **상황에 따라 정하세요.**

```powershell
alembic upgrade head
```

### 7단계. ★ 인증 의존성

`backend/deps.py`:

```python
# backend/deps.py
from fastapi import Depends, HTTPException, status
from fastapi.security import OAuth2PasswordBearer
from sqlalchemy.orm import Session

import models
from database import get_db
from security import decode_access_token

oauth2_scheme = OAuth2PasswordBearer(tokenUrl="auth/login")


def get_current_user(
    token: str = Depends(oauth2_scheme),
    db: Session = Depends(get_db),
) -> models.User:
    credentials_error = HTTPException(
        status_code=status.HTTP_401_UNAUTHORIZED,
        detail="로그인이 필요합니다.",
        headers={"WWW-Authenticate": "Bearer"},
    )

    user_id = decode_access_token(token)
    if user_id is None:
        raise credentials_error

    user = db.get(models.User, user_id)
    if user is None:
        raise credentials_error

    return user
```

**12편의 `get_db` 와 똑같은 구조입니다.** 의존성이 의존성을 부르고 있죠:

```
  get_current_user
    ├─ oauth2_scheme  → Authorization 헤더에서 토큰을 꺼냄
    └─ get_db         → DB 세션
```

이제 어떤 라우트든 이 한 줄이면 보호됩니다.

```python
def my_route(user: models.User = Depends(get_current_user)):
```

**`OAuth2PasswordBearer`** 는 `Authorization: Bearer xxx` 헤더에서 토큰을 꺼내 줍니다.
`tokenUrl` 은 `/docs` 의 **Authorize 버튼**이 쓰는 안내입니다.

### 8단계. 인증 라우터

```python
# backend/routers/auth.py
@router.post("/signup", response_model=schemas.UserRead, status_code=201)
def signup(payload: schemas.UserCreate, db: Session = Depends(get_db)):
    user = models.User(
        email=payload.email.lower(),
        password_hash=hash_password(payload.password),
    )
    db.add(user)

    try:
        db.commit()
    except IntegrityError:
        db.rollback()
        raise HTTPException(status_code=409, detail="이미 가입된 이메일입니다.")

    db.refresh(user)
    return user


@router.post("/login", response_model=schemas.Token)
def login(
    form: OAuth2PasswordRequestForm = Depends(),
    db: Session = Depends(get_db),
):
    stmt = select(models.User).where(models.User.email == form.username.lower())
    user = db.scalars(stmt).first()

    if user is None or not verify_password(form.password, user.password_hash):
        raise HTTPException(
            status_code=status.HTTP_401_UNAUTHORIZED,
            detail="이메일 또는 비밀번호가 올바르지 않습니다.",
            headers={"WWW-Authenticate": "Bearer"},
        )

    return schemas.Token(access_token=create_access_token(user.id))


@router.get("/me", response_model=schemas.UserRead)
def me(user: models.User = Depends(get_current_user)):
    return user
```

#### ★ 로그인 실패 메시지를 하나로

```python
if user is None or not verify_password(...):
    raise HTTPException(401, detail="이메일 또는 비밀번호가 올바르지 않습니다.")
```

**"없는 계정입니다" / "비밀번호가 틀렸습니다" 로 나누면 안 됩니다.**

나누면 공격자가 이메일 목록을 넣어 보며 **"이 사람은 가입돼 있구나"** 를 알아냅니다.
그것만으로도 피싱 메일의 정확도가 올라갑니다.

**친절함보다 안전이 우선인 드문 경우**입니다.

#### `OAuth2PasswordRequestForm` — 왜 `username` 인가

```python
form: OAuth2PasswordRequestForm = Depends()
```

이건 JSON이 아니라 **폼 데이터**를 받고, 칸 이름이 **`username` 으로 고정**입니다.
우리는 이메일을 쓰는데도요.

**OAuth2 표준이 그렇게 정해져 있습니다.** 이 규칙을 따르면 `/docs` 의
**Authorize 버튼**이 그냥 동작합니다. 그 편의를 위해 이름을 양보하는 것입니다.

#### 이메일 소문자 통일

```python
email=payload.email.lower()
```

안 하면 `Kim@a.com` 과 `kim@a.com` 으로 **두 번 가입**됩니다.
저장할 때도, 찾을 때도 `.lower()` 를 해야 합니다.

### 9단계. ★ 메모를 사용자별로 격리

이제 메모 라우터를 고칩니다. **모든 엔드포인트**에 로그인을 요구합니다.

```python
def find_note(db: Session, note_id: int, user: models.User) -> models.Note:
    note = db.get(models.Note, note_id)

    if note is None or note.owner_id != user.id:
        raise HTTPException(status_code=404, detail=f"{note_id}번 메모가 없습니다.")

    return note
```

**★★ 남의 메모일 때 403이 아니라 404를 냅니다.**

```
  403 "권한이 없습니다"  →  "그런 메모가 있긴 하구나" 라는 정보를 줌
  404 "없습니다"        →  아무것도 안 알려 줌
```

`/notes/1`, `/notes/2`, ... 를 훑으면서 403이 나오는 번호를 찾으면
**남의 메모가 몇 개 있는지 알 수 있습니다.** 404로 통일하면 그게 막힙니다.

목록도 고칩니다.

```python
def list_notes(
    # ...
    user: models.User = Depends(get_current_user),
):
    # ★ 첫 번째 조건이 항상 "내 것만"
    stmt = select(models.Note).where(models.Note.owner_id == user.id)
```

**이 한 줄을 빠뜨리면 남의 메모가 전부 보입니다.**
목록 API에서 가장 흔하고 가장 치명적인 실수입니다.

만들 때는 주인을 **서버가** 정합니다.

```python
note = models.Note(
    title=payload.title,
    content=payload.content,
    folder_id=payload.folder_id,
    owner_id=user.id,        # ★ 클라이언트가 보낸 값을 쓰지 않습니다
)
```

`NoteCreate` 스키마에 `owner_id` 가 **없다는 점**이 중요합니다.
있으면 `{"title": "x", "owner_id": 1}` 로 **남의 이름으로 글을 쓸 수 있습니다.**

## 실행 & 확인

`/docs` 에서 확인합니다.

1. **`POST /auth/signup`** → `{"email": "a@example.com", "password": "password123"}`
   - [ ] 201, 그리고 **응답에 `password_hash` 가 없다**
2. 같은 이메일로 또 → **409**
3. **`POST /auth/login`** → `username` 에 이메일, `password` 에 비밀번호
   - [ ] `access_token` 을 받는다
4. 비밀번호를 틀리게 → **401**
5. **없는 이메일**로 → 401, **메시지가 4번과 똑같다**
6. **`GET /notes`** (토큰 없이) → **401**
7. `/docs` 우측 상단 **Authorize** 버튼 → 로그인 → 다시 `GET /notes` → **200**
8. 메모를 하나 만든다

**★ 격리 확인** — 두 번째 계정으로:

- [ ] `b@example.com` 으로 가입 → 로그인
- [ ] `GET /notes` → **비어 있다** (A의 메모가 안 보임)
- [ ] `GET /notes/1` (A의 메모) → **404**
- [ ] `DELETE /notes/1` → **404**

**★ 토큰 들여다보기**: 받은 토큰을 [jwt.io](https://jwt.io) 에 붙여넣어 보세요.
`{"sub": "1", "exp": ...}` 가 **그냥 보입니다.** 암호화가 아니라는 걸 눈으로 확인하세요.

전체 코드: [`reference/17-login/`](../reference/17-login/)

## 흔한 에러

<details open>
<summary><b>1. <code>Not authenticated</code> (401) — 로그인했는데도</b></summary>

- `/docs` 에서는 **Authorize 버튼**을 눌러야 합니다. 로그인만으로는 안 됩니다
- 직접 호출한다면 헤더 형식을 확인하세요: `Authorization: Bearer 토큰`
  (`Bearer` 와 토큰 **사이에 공백 하나**)
</details>

<details>
<summary><b>2. <code>ValueError: password cannot be longer than 72 bytes</code></b></summary>

bcrypt 5.x의 동작입니다. `password.encode("utf-8")[:72]` 로 미리 자르세요.
</details>

<details>
<summary><b>3. <code>Subject must be a string</code></b></summary>

`"sub": user.id` 로 숫자를 넣었습니다. **`str(user.id)`** 로 바꾸세요.
</details>

<details>
<summary><b>4. 마이그레이션이 <code>NOT NULL constraint failed</code></b></summary>

기존 메모에 `owner_id` 가 없는데 바로 `NOT NULL` 로 만들었습니다.
**NULL 허용 → 값 채움 → NOT NULL** 3단계로 하세요 (5단계 참고).

급하면 개발 DB를 지우고 다시 시작해도 됩니다.
</details>

<details>
<summary><b>5. <code>ImportError: email-validator is not installed</code></b></summary>

```powershell
pip install "fastapi[standard]"
```

또는 `pip install email-validator`.
</details>

<details>
<summary><b>6. 로그인은 되는데 <code>/auth/me</code> 가 401</b></summary>

- `secret_key` 를 발급 후에 바꾸지 않았나요? 바꾸면 **기존 토큰이 전부 무효**가 됩니다
- 서버를 재시작했는데 `.env` 가 안 읽혔을 수 있습니다
</details>

<details>
<summary><b>7. 다른 사용자의 메모가 보인다</b></summary>

`list_notes` 에 **`.where(Note.owner_id == user.id)`** 를 빠뜨렸습니다.
**가장 위험한 버그입니다.** 목록 API를 만들 때마다 확인하는 습관을 들이세요.

지금 **폴더는 아직 공유 상태**입니다. B가 A의 폴더를 볼 수 있습니다.

지금은 하루 뒤 토큰이 만료되면 **다시 로그인**해야 합니다.

- access token: 15분
- refresh token: 2주, **DB에 저장**
- `POST /auth/refresh` 로 새 access token 발급

> 이게 실무의 표준 구조입니다. refresh token을 DB에 두면
> **JWT의 "취소 불가" 문제가 해결**됩니다.

> 생각해 볼 것: refresh token을 어디에 저장해야 안전할까요?

## 개념 먼저

### ★★ 토큰을 어디에 둘 것인가

인터넷 예제의 절반은 이렇게 합니다.

```ts
localStorage.setItem("token", data.access_token);   // 💀 하지 마세요
```

**왜 안 되나요?** `localStorage` 는 **자바스크립트로 읽을 수 있기 때문**입니다.

```
  XSS 공격이 한 번만 성공하면 (남의 스크립트가 내 페이지에서 실행되면)
        ↓
  localStorage.getItem("token")  →  토큰 탈취
        ↓
  공격자가 그 사람 행세를 함
```

XSS는 생각보다 쉽게 생깁니다. 광고 스크립트, 오래된 라이브러리,
`dangerouslySetInnerHTML` 한 줄... 그리고 **한 번만 뚫리면 끝**입니다.

**httpOnly 쿠키**는 자바스크립트가 **아예 읽을 수 없습니다.**

```
  document.cookie   →  access_token 이 안 보입니다
```

브라우저가 요청에 자동으로 붙여 주기만 합니다. XSS가 나도 **토큰 자체는 못 가져갑니다.**

| | localStorage | **httpOnly 쿠키** |
|---|---|---|
| JS로 읽기 | 가능 💀 | **불가능** |
| XSS에 털림 | **네** | 아니오 |
| 자동 전송 | 직접 붙여야 | **브라우저가** |
| CSRF | 안전 | 대비 필요 (`SameSite`) |

> **완벽한 방법은 없습니다.** 쿠키는 CSRF라는 다른 위험이 있어서
> `SameSite=Lax` 로 막습니다. 그래도 **localStorage보다는 낫습니다.**

### 그런데 문제가 하나 생깁니다

httpOnly 쿠키는 **자바스크립트가 못 읽습니다.** 그럼 브라우저 코드에서
`Authorization: Bearer ...` 헤더를 어떻게 붙일까요?

**못 붙입니다.** 그래서 구조를 바꿉니다.

```
     [기존]                         [이번 편]
  브라우저 ──토큰헤더──▶ FastAPI    브라우저 ──쿠키──▶ Next 서버 ──토큰헤더──▶ FastAPI
     ↑                                                    ↑
  토큰을 JS가 들고 있어야 함                      여기서 쿠키를 꺼내 헤더로 바꿈
```

Next.js 서버가 **중간에서 통역**합니다. 이걸 **프록시**라고 합니다.

**덤으로 CORS 문제도 사라집니다.** 브라우저가 보기엔 같은 주소니까요.

### 세 종류의 서버 코드

이번 편에서 Next.js 쪽에 세 가지가 생깁니다. 헷갈리기 쉬우니 정리합니다.

| | 파일 | 하는 일 |
|---|---|---|
| **서버 컴포넌트** | `app/notes/page.tsx` | 화면을 그림. 쿠키를 읽을 수 있음 |
| **Route Handler** | `app/api/.../route.ts` | 작은 API. **쿠키를 심을 수 있음** |
| **미들웨어** | `middleware.ts` | 모든 요청 앞에서 검사 |

**쿠키를 심는 것은 Route Handler만 할 수 있습니다.** 그래서 로그인 처리를 여기서 합니다.

## 따라 만들기

### 1단계. 준비

```powershell

Copy-Item 17-login 18-protected-routes -Recurse

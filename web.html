```

`frontend/.env.local` 에 한 줄 추가합니다.

```
API_URL=http://127.0.0.1:8000
NEXT_PUBLIC_API_URL=http://127.0.0.1:8000
```

> **왜 두 개인가요?**
> `API_URL` 은 **서버에서만** 쓰는 값이라 브라우저에 안 보냅니다.
> `NEXT_PUBLIC_API_URL` 은 이미지 주소를 만들 때 브라우저에서도 필요합니다.
>
> **비밀이 아닌데 왜 나눴나요?** 습관을 들이려는 것입니다.
> 나중에 API 키 같은 진짜 비밀이 생기면 이 구분이 생명줄이 됩니다.

### 2단계. 쿠키 규칙

`frontend/lib/auth.ts`:

```ts
// frontend/lib/auth.ts
export const TOKEN_COOKIE = "access_token";

export const COOKIE_OPTIONS = {
  httpOnly: true,
  sameSite: "lax" as const,
  secure: process.env.NODE_ENV === "production",
  path: "/",
  maxAge: 60 * 60 * 24,
};
```

| 옵션 | 뜻 |
|---|---|
| `httpOnly: true` | **자바스크립트가 못 읽음** ← 핵심 |
| `sameSite: "lax"` | 다른 사이트에서 온 요청엔 안 붙음 (CSRF 완화) |
| `secure` | https 에서만 전송. **개발은 http라서 끕니다** |
| `maxAge` | 하루. 백엔드 토큰 수명과 맞춥니다 |

> `secure: true` 를 개발에서 켜면 **쿠키가 아예 저장되지 않아** 로그인이 안 됩니다.
> 그런데 오류 메시지는 안 나와서 원인을 찾기 매우 어렵습니다.

### 3단계. ★ 로그인 Route Handler

`frontend/app/api/auth/login/route.ts`:

```ts
// frontend/app/api/auth/login/route.ts
import { cookies } from "next/headers";
import { NextResponse } from "next/server";

import { COOKIE_OPTIONS, TOKEN_COOKIE } from "@/lib/auth";

const API_URL = process.env.API_URL ?? "http://127.0.0.1:8000";

export async function POST(request: Request) {
  const { email, password } = await request.json();

  const form = new URLSearchParams();
  form.set("username", email ?? "");
  form.set("password", password ?? "");

  const res = await fetch(`${API_URL}/auth/login`, {
    method: "POST",
    headers: { "Content-Type": "application/x-www-form-urlencoded" },
    body: form,
    cache: "no-store",
  });

  if (!res.ok) {
    const body = await res.json().catch(() => null);
    return NextResponse.json(
      { detail: body?.detail ?? "로그인에 실패했습니다." },
      { status: res.status }
    );
  }

  const data = await res.json();

  const jar = await cookies();
  jar.set(TOKEN_COOKIE, data.access_token, COOKIE_OPTIONS);

  return NextResponse.json({ ok: true });
}
```

**세 가지를 짚습니다.**

#### ① 폼 데이터로 변환

백엔드의 `/auth/login` 은 **JSON이 아니라 폼**을 받고, 칸 이름이 **`username`** 입니다
(17편에서 본 OAuth2 규칙). 브라우저는 편하게 JSON을 보내고,
**여기서 변환**해 줍니다. 통역의 역할이죠.

#### ② `cookies().set()` — 여기서만 가능

```ts
const jar = await cookies();
jar.set(TOKEN_COOKIE, data.access_token, COOKIE_OPTIONS);
```

**Next.js 15+ 에서 `cookies()` 는 `await` 해야 합니다.** (`params` 와 같습니다.)

#### ③ ★ 토큰을 응답에 넣지 않는다

```ts
return NextResponse.json({ ok: true });      // 토큰 없음!
```

여기서 토큰을 돌려주면 **브라우저 자바스크립트가 다시 만지게 되어**
httpOnly로 감춘 의미가 사라집니다.

### 4단계. ★★ 프록시 — 이번 편의 핵심 장치

`frontend/app/api/backend/[...path]/route.ts`:

```ts
// frontend/app/api/backend/[...path]/route.ts
import { cookies } from "next/headers";
import { NextRequest, NextResponse } from "next/server";

import { TOKEN_COOKIE } from "@/lib/auth";

const API_URL = process.env.API_URL ?? "http://127.0.0.1:8000";

async function proxy(request: NextRequest, path: string[]) {
  const jar = await cookies();
  const token = jar.get(TOKEN_COOKIE)?.value;

  const url = `${API_URL}/${path.join("/")}${request.nextUrl.search}`;

  const headers = new Headers();

  const contentType = request.headers.get("content-type");
  if (contentType) headers.set("content-type", contentType);

  if (token) headers.set("authorization", `Bearer ${token}`);

  const hasBody = !["GET", "HEAD"].includes(request.method);

  const res = await fetch(url, {
    method: request.method,
    headers,
    body: hasBody ? await request.arrayBuffer() : undefined,
    cache: "no-store",
  });

  if (res.status === 204) {
    return new NextResponse(null, { status: 204 });
  }

  const body = await res.arrayBuffer();

  return new NextResponse(body, {
    status: res.status,
    headers: {
      "content-type": res.headers.get("content-type") ?? "application/json",
    },
  });
}

type Context = {
  params: Promise<{ path: string[] }>;
};

export async function GET(request: NextRequest, { params }: Context) {
  const { path } = await params;
  return proxy(request, path);
}

export async function POST(request: NextRequest, { params }: Context) {
  const { path } = await params;
  return proxy(request, path);
}

// PATCH, PUT, DELETE 도 같은 모양으로 반복합니다
```

**`[...path]` — 몇 단계든 다 받는다**

```
  /api/backend/notes          →  path = ["notes"]
  /api/backend/notes/1/image  →  path = ["notes", "1", "image"]
```

대괄호 안에 점 세 개를 넣으면 **"여기 뒤로 전부"** 를 받습니다.
06편의 `[id]` 는 한 칸만 받았죠.

**`arrayBuffer()` 로 본문을 흘려보내는 이유**

```ts
body: hasBody ? await request.arrayBuffer() : undefined,
```

JSON으로 파싱했다가 다시 만들면 **파일 업로드가 깨집니다.**
multipart의 boundary와 바이트가 그대로 유지돼야 하니까요.
**내용을 보지 않고 그대로 전달**하는 것이 프록시의 기본입니다.

**204를 따로 처리하는 이유**

204(No Content)에 본문을 넣으면 오류가 납니다. 삭제 응답이 여기 해당합니다.

### 5단계. API 함수 나누기

이제 요청이 두 갈래가 됩니다.

```
  서버 컴포넌트  →  쿠키를 직접 읽어  →  FastAPI 직접 호출
  클라이언트     →  /api/backend/...  →  프록시가 대신
```

`frontend/lib/server-api.ts`:

```ts
// frontend/lib/server-api.ts
import "server-only";

import { cookies } from "next/headers";

import { /* 타입들 */ } from "@/lib/api";
import { TOKEN_COOKIE } from "@/lib/auth";

const API_URL = process.env.API_URL ?? "http://127.0.0.1:8000";

async function authFetch(path: string, init: RequestInit = {}) {
  const jar = await cookies();
  const token = jar.get(TOKEN_COOKIE)?.value;

  const headers = new Headers(init.headers);
  if (token) headers.set("Authorization", `Bearer ${token}`);

  return fetch(`${API_URL}${path}`, { ...init, headers, cache: "no-store" });
}

export async function getMe(): Promise<User | null> {
  const res = await authFetch("/auth/me");

  if (res.status === 401) return null;      // 오류가 아니라 "상태"입니다
  if (!res.ok) throw new Error(await readError(res));

  return res.json();
}

export async function listNotes(params: ListParams = {}): Promise<NotePage> {
  const query = buildNotesQuery(params);
  const res = await authFetch(`/notes${query ? `?${query}` : ""}`);

  if (res.status === 401) throw new UnauthorizedError("로그인이 필요합니다.");
  if (!res.ok) throw new Error(await readError(res));

  return res.json();
}
```

#### ★ `import "server-only"` — 안전장치

이 한 줄이 있으면, **실수로 클라이언트 컴포넌트에서 이 파일을 import하면 빌드가 실패**합니다.

쿠키와 토큰을 다루는 코드가 브라우저 번들에 섞여 들어가는 걸 막아 줍니다.
**보안 관련 파일에는 꼭 넣으세요.**

`frontend/lib/client-api.ts` 는 프록시를 부릅니다.

```ts
// frontend/lib/client-api.ts
const PROXY = "/api/backend";

export async function createNote(input: {...}): Promise<Note> {
  const res = await fetch(`${PROXY}/notes`, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify(input),
  });
  if (!res.ok) throw new Error(await readError(res));
  return res.json();
}
```

**주소가 상대경로(`/api/backend/...`)** 인 것에 주목하세요.
같은 출처라서 **쿠키가 자동으로 따라가고, CORS도 없습니다.**

이제 각 컴포넌트의 import를 고칩니다.

| 파일 | 가져올 곳 |
|---|---|
| `app/notes/page.tsx` 등 서버 컴포넌트 | `@/lib/server-api` |
| `create-form`, `delete-button`, `image-upload` 등 | `@/lib/client-api` |
| 타입, `formatDate`, `imageUrl` | `@/lib/api` (공용) |

### 6단계. ★ 미들웨어 — 문 앞의 검사

`frontend/middleware.ts` — **`app/` 안이 아니라 프로젝트 최상위**(`package.json` 옆)입니다.

```ts
// frontend/middleware.ts
import { NextRequest, NextResponse } from "next/server";

import { TOKEN_COOKIE } from "@/lib/auth";

export function middleware(request: NextRequest) {
  const token = request.cookies.get(TOKEN_COOKIE)?.value;
  const { pathname } = request.nextUrl;

  const isAuthPage = pathname === "/login" || pathname === "/signup";

  // 로그인 안 했는데 보호된 곳으로 → 로그인 화면
  if (!token && !isAuthPage) {
    const url = request.nextUrl.clone();
    url.pathname = "/login";
    url.searchParams.set("next", pathname);
    return NextResponse.redirect(url);
  }

  // 이미 로그인했는데 로그인 화면으로 → 목록으로
  if (token && isAuthPage) {
    const url = request.nextUrl.clone();
    url.pathname = "/notes";
    url.search = "";
    return NextResponse.redirect(url);
  }

  return NextResponse.next();
}

export const config = {
  matcher: ["/((?!api|_next/static|_next/image|favicon.ico|.*\\.).*)"],
};
```

#### ★★ 미들웨어는 진짜 방어선이 아닙니다

```ts
const token = request.cookies.get(TOKEN_COOKIE)?.value;
```

**쿠키가 "있는지"만 봅니다. 토큰이 진짜인지는 검사하지 않습니다.**

브라우저 개발자 도구로 `access_token=aaaa` 라는 가짜 쿠키를 넣으면
**이 검사는 통과합니다.** 하지만 백엔드가 401을 냅니다.

```
  미들웨어  = 편의 기능 (로그인 화면으로 안내)
  백엔드    = 진짜 방어선
```

**왜 검증을 안 하나요?** 미들웨어는 모든 요청마다 도는 곳이라 가벼워야 하고,
실행 환경이 제한적이라 무거운 라이브러리를 쓰기 어렵습니다.
그리고 **어차피 백엔드가 다시 검사**하니까요.

> **절대 미들웨어만 믿고 백엔드 검사를 생략하지 마세요.**
> 공격자는 브라우저를 거치지 않고 백엔드를 직접 부를 수 있습니다.

#### `matcher` — `api` 를 반드시 제외

```ts
matcher: ["/((?!api|_next/static|_next/image|favicon.ico|.*\\.).*)"]
```

`api` 를 빼지 않으면 **로그인 요청 자체가 로그인 화면으로 리다이렉트**되어
영원히 로그인할 수 없게 됩니다.

#### `next` 파라미터

```ts
url.searchParams.set("next", pathname);
```

`/notes/5` 를 보려다 로그인 화면으로 왔다면, 로그인 후 **거기로 돌려보내야** 합니다.
`/login?next=/notes/5` 로 기억해 두는 것입니다.

### 7단계. 로그인 화면

`frontend/lib/schemas.ts` 에 규칙을 추가합니다.

```ts
export const credentialsSchema = z.object({
  // zod 4 부터는 z.email() 이 권장 방식입니다.
  email: z.email("이메일 형식이 아닙니다."),
  password: z
    .string()
    .min(8, "비밀번호는 8자 이상이어야 합니다.")
    .max(72, "비밀번호가 너무 깁니다."),
});

export type Credentials = z.infer<typeof credentialsSchema>;
```

`frontend/components/auth-form.tsx` (10편의 폼과 같은 구조입니다):

```tsx
"use client";

export function AuthForm({ mode }: { mode: "login" | "signup" }) {
  const router = useRouter();
  const searchParams = useSearchParams();

  const {
    register, handleSubmit, setError,
    formState: { errors, isSubmitting },
  } = useForm<Credentials>({
    resolver: zodResolver(credentialsSchema),
    defaultValues: { email: "", password: "" },
    mode: "onBlur",
  });

  async function submit(values: Credentials) {
    try {
      if (mode === "login") await login(values.email, values.password);
      else await signup(values.email, values.password);

      const next = searchParams.get("next") ?? "/notes";
      router.push(next);
      router.refresh();        // ★
    } catch (err) {
      setError("root", {
        message: err instanceof Error ? err.message : "요청에 실패했습니다.",
      });
    }
  }

  // ... 입력칸 두 개와 버튼 (10편과 같은 모양)
}
```

**★ `router.refresh()` 를 빠뜨리면 안 됩니다.**

`push` 만 하면 Next.js가 **로그인 전에 캐시해 둔 화면**을 보여 줄 수 있습니다.
로그인했는데 여전히 "로그인하세요"가 보이는 이상한 상황이 됩니다.

**`autoComplete` 도 챙기세요.**

```tsx
<Input type="password" autoComplete={mode === "login" ? "current-password" : "new-password"} />
```

브라우저 비밀번호 관리자에게 힌트를 줍니다. 사소해 보이지만
**사용자가 체감하는 완성도**가 확 달라집니다.

### 8단계. 상단 바에 로그인 정보

`layout.tsx` 는 **서버 컴포넌트라 쿠키를 읽을 수 있습니다.**

```tsx
// frontend/app/layout.tsx
import { getMe } from "@/lib/server-api";

export default async function RootLayout({ children }: ...) {
  const user = await getMe();

  return (
    // ...
        <SiteNav email={user?.email ?? null} />
    // ...
  );
}
```

`SiteNav` 는 클라이언트 컴포넌트라 쿠키를 못 읽습니다.
**서버가 알아내서 props로 내려 줍니다.** 03편부터 계속 쓰던 그 패턴입니다.

로그아웃 버튼(`components/user-menu.tsx`)도 같은 방식입니다.

```tsx
async function handleLogout() {
  await logout();          // /api/auth/logout → 쿠키 삭제
  router.push("/login");
  router.refresh();        // ★ 캐시된 로그인 상태 화면을 버림
}
```

## 실행 & 확인

**터미널 2개**로 백엔드·프론트를 띄우고:

- [ ] 로그인 안 한 상태로 `/notes` → **`/login` 으로 튕긴다**
- [ ] 주소가 `/login?next=/notes` 로 되어 있다
- [ ] 가입 → **바로 로그인되어** 목록으로 이동
- [ ] 상단 바에 **내 이메일**이 보인다
- [ ] 메모를 만들고 지울 수 있다 (프록시를 통과합니다)
- [ ] 로그아웃 → `/login` 으로 이동
- [ ] 로그아웃 후 **뒤로가기** → 목록이 안 보이고 로그인 화면
- [ ] 로그인한 채로 `/login` 에 가면 → **목록으로 튕긴다**

**★ 보안 확인 — 직접 해 보세요**

1. 로그인한 뒤 **F12 → Console** 에서:

   ```js
   document.cookie
   ```

   **`access_token` 이 안 보입니다.** httpOnly가 일하는 것입니다.

2. **F12 → Application → Cookies** 에서는 보입니다. `HttpOnly` 칸에 체크가 있죠.
   자바스크립트만 못 읽는 것입니다.

3. 다른 계정으로 가입해서 **메모가 서로 안 보이는지** 확인하세요.

4. 쿠키 값을 아무렇게나 고쳐 보세요 (개발자 도구에서 편집).
   → 화면은 들어가지지만 **데이터가 401로 실패**합니다.
   **미들웨어는 통과하고 백엔드가 막는 것**을 눈으로 확인하세요.

## 흔한 에러

<details open>
<summary><b>1. 로그인은 되는데 계속 로그인 화면으로 돌아간다</b></summary>

**쿠키가 저장되지 않은 것입니다.** 개발자 도구 → Application → Cookies 확인.

- `secure: true` 를 개발(http)에서 켰나요? → `process.env.NODE_ENV === "production"` 으로
- Route Handler에서 `cookies()` 에 `await` 를 했나요?
</details>

<details>
<summary><b>2. 로그인 요청 자체가 리다이렉트된다 (무한 반복)</b></summary>

미들웨어 `matcher` 에서 **`api` 를 제외하지 않았습니다.**
</details>

<details>
<summary><b>3. <code>You're importing a component that needs "server-only"</code></b></summary>

클라이언트 컴포넌트에서 `lib/server-api.ts` 를 import했습니다.
**안전장치가 제대로 일한 것입니다.** `client-api.ts` 에서 가져오세요.
</details>

<details>
<summary><b>4. 로그인했는데 상단 바에 이메일이 안 보인다</b></summary>

`router.refresh()` 를 빠뜨렸습니다. 캐시된 화면이 보이는 것입니다.
</details>

<details>
<summary><b>5. 프록시로 보낸 파일 업로드가 422</b></summary>

본문을 `request.json()` 이나 `request.text()` 로 읽고 다시 만들었습니다.
**`request.arrayBuffer()`** 로 그대로 흘려보내야 합니다.
</details>

<details>
<summary><b>6. <code>useSearchParams() should be wrapped in a suspense boundary</code></b></summary>

`AuthForm` 이 `useSearchParams` 를 씁니다. 페이지에서 `<Suspense>` 로 감싸세요.

```tsx
<Suspense fallback={null}>
  <AuthForm mode="login" />
</Suspense>
```
</details>

<details>
<summary><b>7. 삭제할 때 <code>Unexpected end of JSON input</code></b></summary>

프록시가 **204에 본문을 넣으려** 했습니다. 204는 따로 처리하세요.
</details>

<details>
<summary><b>8. <code>cookies() expects to have requestAsyncStorage</code></b></summary>

서버 컴포넌트나 Route Handler가 아닌 곳에서 `cookies()` 를 불렀습니다.
`lib/server-api.ts` 를 클라이언트에서 부르고 있진 않은지 확인하세요.
</details>

## 아직 남은 구멍

정직하게 적어 둡니다. **이 앱에는 아직 취약점이 있습니다.**

| 문제 | 어디서 다루나 |
|---|---|
| **폴더가 아직 공유 상태** — 남의 폴더가 보입니다 | 아래 문제 1 |
| 로그아웃해도 **토큰은 만료까지 유효** | 17편 문제 3 (refresh token) |
| CSRF 방어가 `SameSite=Lax` 뿐 | 아래 문제 3 |
| 로그인 시도 횟수 제한 없음 | 아래 문제 2 |

**"동작한다"와 "안전하다"는 다릅니다.** 이 목록을 스스로 만들 수 있게 되는 것이
보안을 배우는 첫걸음입니다.

## 스스로 해보기

### ★ 문제 1 — 폴더도 내 것만 (실제 취약점입니다)

`Folder` 에 `owner_id` 를 추가하고, 목록·생성·삭제를 전부 사용자별로 막으세요.

> 힌트: 17편의 `find_note` 와 똑같은 패턴입니다. 남의 폴더도 **404**.
> 마이그레이션은 17편의 3단계 방식(NULL 허용 → 채움 → NOT NULL)을 쓰세요.
>
> **지금 상태에서 다른 계정으로 `GET /folders` 를 해 보세요.**
> 남의 폴더 이름이 그대로 보입니다. 그걸 확인하고 시작하면 동기가 생깁니다.

### ★★ 문제 2 — 로그인 시도 제한

같은 이메일로 5번 실패하면 1분간 막으세요.

> 힌트: 간단하게는 파이썬 딕셔너리에 `{email: [실패시각들]}` 을 두면 됩니다.
> (서버를 재시작하면 사라지고, 서버가 여러 대면 안 통합니다.
> 제대로 하려면 Redis 같은 게 필요합니다.)
>
> **생각해 볼 것**: 이메일 기준으로 막으면, 공격자가 남의 이메일로 일부러
> 5번 틀려서 **그 사람을 못 들어오게** 만들 수 있습니다. IP 기준은 어떨까요?
> 그것도 완벽하지 않습니다. **정답이 없는 문제**입니다.

### ★★★ 문제 3 — CSRF 이해하고 막기

`SameSite=Lax` 는 대부분의 CSRF를 막지만 완벽하지 않습니다.

1. CSRF가 무엇인지 찾아보고, **쿠키 방식에서만 문제가 되는 이유**를 이해하세요
2. `SameSite=Lax` 가 막는 것과 못 막는 것을 정리하세요
3. **Double Submit Cookie** 패턴을 프록시에 적용해 보세요

> 힌트: 핵심 질문은 **"이 요청이 정말 우리 화면에서 시작됐는가?"** 입니다.
> `Origin` 헤더를 검사하는 것만으로도 상당히 막힙니다. 프록시에 넣기 좋은 위치죠.

# 19. 실시간·백그라운드 맛보기

> **난이도** ★★★★★ · **소요 시간** 2.5~3시간
> 지금까지는 전부 **"물으면 답한다"** 였습니다.
> 이번 편에서는 **서버가 먼저 말을 겁니다.**

---

## 이번에 만드는 것

세 가지를 한 편에 담습니다. **각각의 쓰임새를 구분하는 것**이 목표입니다.

```
  ① WebSocket — 양방향, 계속 열려 있음        → 채팅
     브라우저 ⇄⇄⇄⇄⇄ 서버

  ② SSE — 서버 → 브라우저 한 방향             → 알림
     브라우저 ⇦⇦⇦⇦⇦ 서버

  ③ BackgroundTasks — 응답 먼저, 일은 나중에   → 메일 발송
     요청 → [응답] → (그 뒤에 조용히 작업)
```

---

## 학습 목표

- [ ] WebSocket으로 채팅을 만들 수 있다
- [ ] **끊긴 연결을 정리**하고 자동 재연결할 수 있다
- [ ] SSE로 알림을 보낼 수 있다
- [ ] **셋 중 무엇을 쓸지** 판단할 수 있다
- [ ] `BackgroundTasks` 로 느린 일을 뒤로 미룰 수 있다

## 개념 먼저

### 셋 중 무엇을 쓸까

| | 방향 | 연결 | 쓸 곳 |
|---|---|---|---|
| **폴링** (그냥 반복 요청) | 요청/응답 | 매번 새로 | 간단한 것, 몇 초 늦어도 되는 것 |
| **SSE** | 서버 → 브라우저 | 계속 열림 | 알림, 진행률, **AI 답변 스트리밍** |
| **WebSocket** | 양방향 | 계속 열림 | 채팅, 게임, 협업 편집 |

**★ 먼저 물어보세요: "정말 실시간이어야 하나?"**

10초마다 새로고침해도 되는 기능이라면 **폴링이 압도적으로 간단합니다.**
실시간 연결은 서버 자원을 계속 붙잡고, 배포·확장을 훨씬 어렵게 만듭니다.

그리고 **한 방향이면 SSE**를 쓰세요. WebSocket보다 단순하고,
그냥 HTTP라서 **브라우저가 재연결까지 알아서** 해 줍니다.

> ChatGPT 같은 서비스가 글자를 한 자씩 뿌리는 것도 **SSE**입니다. WebSocket이 아닙니다.

### ★★ WebSocket에 인증 붙이기가 어려운 이유

```js
new WebSocket("ws://...", { headers: { Authorization: "..." } })   // ❌ 불가능
```

**브라우저의 WebSocket은 헤더를 붙일 수 없습니다.** `EventSource`(SSE)도 마찬가지입니다.

그럼 토큰을 어디에 담을까요? **주소밖에 없습니다.**

```
ws://127.0.0.1:8000/ws/chat/lobby?ticket=eyJ...
```

그런데 **주소는 서버 로그와 브라우저 기록에 남습니다.** 수명이 긴 토큰을
여기 넣으면 18편에서 httpOnly로 애써 감춘 의미가 사라집니다.

**해법: 1회성 표(ticket)**

```
  1) 브라우저 → /api/backend/auth/ws-ticket   (쿠키로 인증)
  2) 서버가 60초짜리 임시 표를 발급
  3) 그 표를 주소에 담아 WebSocket 접속
  4) 60초 뒤 표는 쓸모없어짐
```

새어 나가도 **1분이면 만료**됩니다. 실무에서 쓰는 표준 방식입니다.

### 2단계. 1회성 표 만들기

`backend/security.py` 에 추가합니다.

```python
def create_ws_ticket(user_id: int) -> str:
    now = datetime.now(timezone.utc)

    payload = {
        "sub": str(user_id),
        "exp": now + timedelta(seconds=60),
        "iat": now,
        "typ": "ws",          # ★ 종류 표시
    }

    return jwt.encode(payload, settings.secret_key, algorithm=ALGORITHM)


def decode_ws_ticket(ticket: str) -> int | None:
    try:
        payload = jwt.decode(ticket, settings.secret_key, algorithms=[ALGORITHM])
    except jwt.InvalidTokenError:
        return None

    if payload.get("typ") != "ws":     # ★ 반드시 확인
        return None

    try:
        return int(payload.get("sub"))
    except (TypeError, ValueError):
        return None
```

**★ `typ` 검사를 빠뜨리면 안 됩니다.**

이게 없으면 **수명이 하루인 일반 토큰을 그냥 주소에 넣어** 쓸 수 있습니다.
1회성 표를 만든 의미가 사라지죠.

> **일반적인 교훈**: 토큰을 여러 용도로 만들 땐 **반드시 종류를 넣고 검사**하세요.
> 안 그러면 한 용도의 토큰을 다른 데 갖다 쓰는 공격이 가능해집니다.

### 3단계. ★ 연결 관리

`backend/realtime.py`:

```python
# backend/realtime.py
import asyncio
from collections import defaultdict

from fastapi import WebSocket


class ChatRooms:
    def __init__(self) -> None:
        self.rooms: dict[str, list[WebSocket]] = defaultdict(list)

    async def join(self, room: str, ws: WebSocket) -> None:
        await ws.accept()
        self.rooms[room].append(ws)

    def leave(self, room: str, ws: WebSocket) -> None:
        if ws in self.rooms[room]:
            self.rooms[room].remove(ws)

        if not self.rooms[room]:
            del self.rooms[room]

    async def broadcast(self, room: str, message: dict) -> None:
        dead: list[WebSocket] = []

        for ws in list(self.rooms.get(room, [])):
            try:
                await ws.send_json(message)
            except Exception:
                dead.append(ws)

        for ws in dead:
            self.leave(room, ws)

    def count(self, room: str) -> int:
        return len(self.rooms.get(room, []))
```

**두 가지 함정을 미리 막았습니다.**

#### ① 목록을 복사해서 돈다

```python
for ws in list(self.rooms.get(room, [])):
```

`list(...)` 로 **복사**합니다. 보내는 도중에 누가 나가면 목록이 바뀌어
`RuntimeError: list changed size during iteration` 이 납니다.

#### ② 죽은 연결을 치운다

```python
except Exception:
    dead.append(ws)
```

이미 끊긴 연결에 보내면 예외가 납니다. **표시해 뒀다가 나중에 제거**합니다.
안 치우면 유령 연결이 계속 쌓여서 메모리가 샙니다.

### 4단계. WebSocket 엔드포인트

```python
# backend/routers/live.py (핵심 부분)
@router.websocket("/ws/chat/{room}")
async def chat(websocket: WebSocket, room: str, ticket: str | None = None):
    db = SessionLocal()
    try:
        user = user_from_ticket(ticket, db)
    finally:
        db.close()

    if user is None:
        await websocket.close(code=1008)     # ★ accept 하지 않고 닫습니다
        return

    email = user.email

    await chat_rooms.join(room, websocket)
    await chat_rooms.broadcast(room, {
        "type": "system",
        "text": f"{email} 님이 들어왔습니다.",
        "count": chat_rooms.count(room),
        "at": datetime.now(timezone.utc).isoformat(),
    })

    try:
        while True:
            raw = await websocket.receive_text()

            text = raw.strip()[:500]
            if not text:
                continue

            await chat_rooms.broadcast(room, {
                "type": "message",
                "sender": email,
                "text": text,
                "at": datetime.now(timezone.utc).isoformat(),
            })
    except WebSocketDisconnect:
        pass
    finally:
        chat_rooms.leave(room, websocket)
        await chat_rooms.broadcast(room, {...나갔습니다...})
```

**네 가지를 짚습니다.**

#### ① 거절은 `accept()` 전에

```python
if user is None:
    await websocket.close(code=1008)
    return
```

`accept()` 를 하면 연결이 **열립니다.** 거절할 거면 열지 말고 바로 닫습니다.
`1008` 은 "정책 위반"이라는 표준 코드입니다.

#### ② `while True` 가 정상입니다

```python
while True:
    raw = await websocket.receive_text()
```

무한 루프처럼 보이지만, `await` 에서 **잠들어 있습니다.** CPU를 쓰지 않습니다.
메시지가 오면 깨어나 처리하고 다시 잠듭니다.

#### ③ `WebSocketDisconnect` 는 오류가 아닙니다

브라우저를 닫거나 새로고침하면 이 예외가 옵니다. **정상적인 종료**입니다.
`pass` 로 조용히 넘어갑니다.

#### ④ `finally` 에서 반드시 정리

**어떻게 끝나든 목록에서 빼야 합니다.** 이게 실시간 서버의 생명입니다.

#### `Depends(get_db)` 를 왜 안 쓰나

WebSocket에서는 의존성의 수명 관리가 까다롭습니다.
**연결이 몇 시간씩 유지되는데 DB 세션을 그동안 붙잡고 있으면 안 되니까요.**
그래서 처음에 잠깐 열어 사용자만 확인하고 **바로 닫습니다.**

### 5단계. SSE 알림

```python
@router.get("/events")
async def events(ticket: str | None = None, db: Session = Depends(get_db)):
    user = user_from_ticket(ticket, db)

    if user is None:
        return StreamingResponse(
            iter(["event: error\ndata: unauthorized\n\n"]),
            media_type="text/event-stream",
            status_code=401,
        )

    user_id = user.id
    queue = notifier.subscribe(user_id)

    async def stream():
        try:
            yield "event: ready\ndata: {}\n\n"

            while True:
                try:
                    message = await asyncio.wait_for(queue.get(), timeout=15)
                except asyncio.TimeoutError:
                    yield ": keep-alive\n\n"
                    continue

                yield f"event: note\ndata: {json.dumps(message, ensure_ascii=False)}\n\n"
        finally:
            notifier.unsubscribe(user_id, queue)

    return StreamingResponse(
        stream(),
        media_type="text/event-stream",
        headers={
            "Cache-Control": "no-cache",
            "Connection": "keep-alive",
            "X-Accel-Buffering": "no",
        },
    )
```

#### ★ SSE 형식은 정확해야 합니다

```
event: note\n
data: {"id":1,"title":"..."}\n
\n                              ← 빈 줄이 "메시지 끝" 표시
```

**끝의 빈 줄(`\n\n`)이 없으면 브라우저가 영원히 기다립니다.**
가장 흔한 SSE 실수입니다.

`:` 로 시작하는 줄은 **주석**이라 무시됩니다. 살아 있다는 신호로만 씁니다.

#### ★ keep-alive가 필요한 이유

```python
message = await asyncio.wait_for(queue.get(), timeout=15)
```

중간의 프록시(nginx, 클라우드 로드밸런서)는 **조용한 연결을 끊습니다.**
15초마다 주석 한 줄을 보내 "살아 있다"고 알립니다.

`X-Accel-Buffering: no` 는 nginx에게 **"모아 뒀다 보내지 말라"** 고 알리는 것입니다.
이게 없으면 실시간인데 몰아서 도착합니다.

```
  일반 처리:      요청 → [저장] → [메일 2초] → 응답     사용자가 2초 기다림
  BackgroundTasks: 요청 → [저장] → 응답 → [메일 2초]    사용자는 즉시 응답 받음
```

**★ BackgroundTasks의 한계를 알아야 합니다.**

| | BackgroundTasks | Celery / RQ 같은 큐 |
|---|---|---|
| 설치 | 필요 없음 | 별도 서버(Redis 등) |
| 서버가 죽으면 | **작업이 사라짐** | 다시 시도 |
| 재시도 | 없음 | 있음 |
| 진행 상황 확인 | 없음 | 있음 |

**"실패해도 괜찮은 일"에만 쓰세요.** 로그 남기기, 알림 메일 정도입니다.
**결제 처리나 중요한 데이터 변경은 절대 안 됩니다.**

### 7단계. 프론트엔드 — 채팅

`components/chat-room.tsx` 의 핵심만 봅니다.

```tsx
useEffect(() => {
  let closedByUs = false;
  let retryTimer: ReturnType<typeof setTimeout> | undefined;

  async function connect() {
    const ticket = await getWsTicket();

    const wsBase = API_URL.replace(/^http/, "ws");
    const socket = new WebSocket(
      `${wsBase}/ws/chat/${room}?ticket=${encodeURIComponent(ticket)}`
    );
    socketRef.current = socket;

    socket.onopen = () => setStatus("연결됨");

    socket.onmessage = (event) => {
      const data: ChatMessage = JSON.parse(event.data);
      setMessages((prev) => [...prev, data].slice(-200));
    };

    socket.onclose = () => {
      if (closedByUs) return;
      setStatus("끊김");
      retryTimer = setTimeout(connect, 2000);      // ★ 자동 재연결
    };

    socket.onerror = () => socket.close();
  }

  connect();

  return () => {                                    // ★ 정리
    closedByUs = true;
    if (retryTimer) clearTimeout(retryTimer);
    socketRef.current?.close();
  };
}, [room]);
```

**네 가지를 짚습니다.**

#### ① `useRef` 에 소켓을 둔다

```tsx
const socketRef = useRef<WebSocket | null>(null);
```

소켓은 **화면에 그릴 값이 아닙니다.** `useState` 에 넣으면 불필요하게 다시 그려집니다.
16편에서 `<input>` 을 잡을 때 쓴 것과 같은 도구입니다.

#### ② ★ 정리 함수가 필수입니다

```tsx
return () => {
  closedByUs = true;
  socketRef.current?.close();
};
```

**이게 없으면 화면을 떠나도 연결이 남습니다.** 페이지를 몇 번 오가면
연결이 수십 개 쌓이고, 메시지가 중복으로 보입니다.

**개발 중에는 더 심합니다.** React Strict Mode가 effect를 일부러 두 번 실행해서
연결이 두 개 열리거든요. 정리 함수가 그걸 막아 줍니다.

#### ③ `closedByUs` 로 재연결을 막는다

내가 일부러 닫은 건데 `onclose` 가 불려서 **또 연결하면** 무한 반복이 됩니다.

#### ④ `http` → `ws` 변환

```tsx
const wsBase = API_URL.replace(/^http/, "ws");
```

`http://` → `ws://`, `https://` → `wss://` 로 한 번에 바뀝니다.
**배포하면 `wss` 여야 합니다.** `ws` 로 두면 브라우저가 막습니다.

### 8단계. 프론트엔드 — SSE 알림

```tsx
source = new EventSource(
  `${API_URL}/events?ticket=${encodeURIComponent(ticket)}`
);

source.addEventListener("note", (event) => {
  const data = JSON.parse((event as MessageEvent).data);
  setToast(`새 메모: ${data.title}`);
});

source.onerror = () => {
  source?.close();
  if (!cancelled) setTimeout(connect, 3000);
};
```

**WebSocket보다 훨씬 짧습니다.** 이게 SSE를 쓰는 이유입니다.

`addEventListener("note", ...)` 는 백엔드의 `event: note` 와 짝입니다.
`event:` 를 안 쓰면 `onmessage` 로 받습니다.

> **재연결을 직접 하는 이유**: `EventSource` 는 원래 자동 재연결을 합니다.
> 그런데 **표가 만료되면** 같은 주소로 재연결해도 계속 실패합니다.
> 그래서 직접 닫고 **새 표를 받아** 다시 붙습니다.

<summary><b>1. 메시지가 두 번씩 보인다</b></summary>

개발 모드의 Strict Mode가 effect를 두 번 실행하므로, 정리가 없으면 반드시 생깁니다.

<summary><b>2. <code>WebSocket is closed before the connection is established</code></b></summary>

연결이 열리기 전에 `send()` 를 불렀습니다.

```tsx
if (socketRef.current?.readyState === WebSocket.OPEN) {
  socketRef.current.send(text);
}
```
</details>

<details>
<summary><b>3. 연결하자마자 끊긴다 (코드 1008)</b></summary>

표가 없거나 만료됐습니다.

- `getWsTicket()` 이 성공하나요? (Network 탭 확인)
- 표는 **60초**짜리입니다. 받고 바로 접속해야 합니다
- `typ` 검사에 걸렸을 수 있습니다 (일반 토큰을 쓴 경우)
</details>

<details>
<summary><b>4. SSE 알림이 안 온다</b></summary>

- **형식**을 확인하세요. `data: ...` 뒤에 **빈 줄 두 개**(`\n\n`)
- `addEventListener("note")` 와 백엔드의 `event: note` 이름이 같나요?
- Network 탭에서 `/events` 가 **계속 열린 상태(pending)** 인지 확인하세요
</details>

<details>
<summary><b>5. <code>RuntimeError: list changed size during iteration</code></b></summary>

브로드캐스트 중에 누가 나갔습니다. `list(...)` 로 복사해서 도세요.
</details>

<summary><b>6. 배포했더니 WebSocket이 안 된다</b></summary>

- `wss://` 인가요? https 페이지에서 `ws://` 는 브라우저가 막습니다
- 배포 서비스가 WebSocket을 지원하나요? **일부 서버리스는 안 됩니다**
- 프록시가 Upgrade 헤더를 넘겨주게 설정돼 있나요?
</details>

## 조금 더: 서버가 두 대가 되면

**이 편의 코드에는 큰 한계가 있습니다.**

```python
self.rooms: dict[str, list[WebSocket]] = defaultdict(list)
```

이건 **이 서버 프로세스의 메모리**에만 있습니다.

```
   서버 A                 서버 B
  ┌────────┐            ┌────────┐
  │ 철수    │            │ 영희    │
  └────────┘            └────────┘
      └── 철수가 보낸 메시지가 영희에게 안 갑니다 ──✗
```

배포해서 서버를 두 대로 늘리는 순간 **채팅이 반쪽만 동작합니다.**

**해결책**: Redis Pub/Sub 같은 "서버끼리 소식을 나누는 통로"를 둡니다.

```
  서버 A ──▶ Redis ──▶ 서버 B
                └──▶ 서버 C
```

지금은 서버가 한 대라 문제없습니다. **하지만 "이 코드는 서버 한 대 전제"라는 것을
알고 쓰는 것과 모르고 쓰는 것은 다릅니다.**

```python
@router.get("/notes/{note_id}/summary")
async def summary(note_id: int, ...):
    async def stream():
        text = f"{note.title} 에 대한 요약입니다..."

프론트에서 받아 한 자씩 화면에 붙이면 **ChatGPT처럼 보입니다.**

## ★★ 배포하면 깨지는 것들

먼저 이것부터 봅시다. **절차보다 이게 중요합니다.**

### ① CORS — 주소가 바뀐다

```python
origins = ["http://localhost:3000"]     # 배포하면 아무도 못 들어옵니다
```

배포된 프론트는 `https://my-notes.vercel.app` 입니다. 목록에 없으니 전부 차단됩니다.

### ② 쿠키 — 도메인이 달라진다

로컬에서는 둘 다 `localhost` 라 사실상 같은 집이었습니다.
배포하면 **`vercel.app` 과 `onrender.com` 으로 완전히 남남**이 됩니다.

우리는 18편에서 **프록시**를 만들어 뒀기 때문에 이 문제가 **대부분 사라집니다.**
브라우저는 언제나 Vercel 주소만 부르고, 쿠키도 거기에만 저장되니까요.

```
  브라우저 ──쿠키──▶ Vercel(Next) ──토큰헤더──▶ Render(FastAPI)
              같은 도메인                    서버끼리 (쿠키 무관)
```

> **프록시를 안 만들었다면** `SameSite=None; Secure` 와 `domain` 설정으로
> 며칠을 헤맸을 것입니다. 18편의 구조가 여기서 값을 합니다.

### ③ https — 섞으면 막힌다

배포된 페이지는 `https` 입니다. 거기서 `http://` 를 부르면
브라우저가 **혼합 콘텐츠**라며 차단합니다.

- `NEXT_PUBLIC_API_URL` 이 `https` 인가?
- WebSocket이 `wss://` 인가? (19편의 `replace(/^http/, "ws")` 가 알아서 해 줍니다)

### ④ 마이그레이션 — 아무도 안 돌려 준다

로컬에서는 `alembic upgrade head` 를 손으로 쳤습니다.
**배포 서버에서는 아무도 안 칩니다.** 시작 명령에 넣어야 합니다.

```
alembic upgrade head && uvicorn main:app --host 0.0.0.0 --port $PORT
```

이걸 빼먹으면 **`no such table` 로 죽습니다.** 배포 첫날 가장 흔한 사고입니다.

### ⑤ 그 밖에

| 문제 | 증상 |
|---|---|
| **업로드 파일이 사라짐** | 재배포하면 `uploads/` 가 초기화 (아래 참고) |
| **콜드 스타트** | 무료 요금제는 15분 놀면 잠듦 → 첫 요청 30초 |
| `PORT` 고정 | `8000` 으로 두면 접속 불가. `$PORT` 를 써야 함 |
| **비밀키 그대로** | 예제 값으로 배포 → 누구나 토큰 위조 가능 |

> **★ 업로드 파일 문제는 심각합니다.** 대부분의 배포 서비스는 디스크가
> **재배포할 때마다 초기화**됩니다. 16편에서 만든 사진 업로드는
> **배포하면 사진이 사라집니다.**
>
> 제대로 하려면 **S3 같은 외부 저장소**가 필요합니다.
> 16편에서 `storage.py` 를 따로 뺀 이유가 이것입니다. 그 파일만 고치면 됩니다.

## 따라 만들기

### 1단계. ★ 잘못된 설정으로 못 뜨게 막기

**이번 편에서 가장 값진 코드입니다.**

배포 설정을 깜빡한 걸 **배포 후에** 알면 이미 늦습니다.
**서버가 아예 안 뜨는 편이 낫습니다.**

```python
# backend/config.py
from pydantic import field_validator, model_validator
from pydantic_settings import BaseSettings, SettingsConfigDict

DEFAULT_SECRET = "CHANGE-ME-dev-only-replace-before-deploy"


class Settings(BaseSettings):
    model_config = SettingsConfigDict(env_file=".env", extra="ignore")

    environment: str = "development"
    database_url: str = "sqlite:///./notes.db"
    cors_origins: str = "http://localhost:3000,http://127.0.0.1:3000"
    secret_key: str = DEFAULT_SECRET
    access_token_minutes: int = 60 * 24

    @property
    def cors_origin_list(self) -> list[str]:
        return [o.strip() for o in self.cors_origins.split(",") if o.strip()]

    @property
    def is_production(self) -> bool:
        return self.environment.lower() == "production"

    @field_validator("secret_key")
    @classmethod
    def secret_must_be_long(cls, value: str) -> str:
        if len(value) < 16:
            raise ValueError("SECRET_KEY 가 너무 짧습니다. 32자 이상을 권합니다.")
        return value

    @model_validator(mode="after")
    def check_production_safety(self):
        if not self.is_production:
            return self

        if self.secret_key == DEFAULT_SECRET:
            raise ValueError("SECRET_KEY 가 기본값입니다. 배포 환경에서는 반드시 바꿔야 합니다.")

        if self.database_url.startswith("sqlite"):
            raise ValueError("배포 환경에서 SQLite 를 쓰고 있습니다. 데이터가 사라집니다.")

        for origin in self.cors_origin_list:
            if "localhost" in origin or "127.0.0.1" in origin:
                raise ValueError(f"배포 환경의 CORS_ORIGINS 에 로컬 주소가 있습니다: {origin}")

        return self


settings = Settings()
```

**이 코드가 막아 주는 것:**

| 실수 | 결과 |
|---|---|
| 비밀키를 예제 값 그대로 | **시작 거부** |
| 배포인데 SQLite | **시작 거부** |
| CORS에 localhost가 남음 | **시작 거부** |
| 비밀키가 너무 짧음 | **시작 거부** |

> **"조용히 위험하게 도는 것보다, 시끄럽게 안 도는 게 낫다."**
> 이건 배포 설정만이 아니라 프로그래밍 전반의 원칙입니다.

**CORS를 문자열로 받는 이유**: 환경변수는 **문자열만** 담을 수 있습니다.
배포 서비스의 설정 화면에 리스트를 넣을 방법이 없으니, 쉼표로 구분해 받고
코드에서 쪼갭니다.

`main.py` 에서 `settings.cors_origin_list` 로 바꾸는 것을 잊지 마세요.

### 3단계. 백엔드 배포 (Render)

`backend/render.yaml`:

```yaml
services:
  - type: web
    name: notes-api
    runtime: python
    plan: free
    rootDir: backend

    buildCommand: pip install -r requirements.txt
    startCommand: alembic upgrade head && uvicorn main:app --host 0.0.0.0 --port $PORT

    healthCheckPath: /health

    envVars:
      - key: ENVIRONMENT
        value: production
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: notes-db
          property: connectionString
      - key: CORS_ORIGINS
        sync: false

databases:
  - name: notes-db
    plan: free
    databaseName: notesdb
    user: notes
```

**네 가지를 짚습니다.**

#### ① `--host 0.0.0.0`

`127.0.0.1` 은 **"내 컴퓨터 안에서만"** 이라는 뜻입니다.
컨테이너 안에서 그러면 **바깥에서 아무도 못 들어옵니다.**
`0.0.0.0` 은 "어느 쪽에서 오든 받는다"입니다.

#### ② `--port $PORT`

배포 서비스가 포트를 **정해 줍니다.** 8000으로 고정하면 접속이 안 됩니다.

#### ③ `alembic upgrade head &&`

시작할 때마다 마이그레이션을 돌립니다. 이미 적용된 것은 건너뛰므로 안전합니다.
`&&` 이므로 **마이그레이션이 실패하면 서버가 안 뜹니다.** 그게 맞습니다.

#### ④ `generateValue: true`

Render가 무작위 비밀키를 만들어 넣습니다.
**사람이 값을 보지도, 실수로 커밋하지도 않습니다.** 가장 안전한 방식입니다.

**배포 순서** (2026년 7월 기준 — 화면은 바뀔 수 있습니다):

1. [render.com](https://render.com) 가입 → GitHub 연결
2. **New → Blueprint** → 저장소 선택 → `render.yaml` 을 자동으로 읽습니다
3. `CORS_ORIGINS` 는 아직 모르니 **일단 아무 값**이나 넣습니다
4. 배포가 끝나면 주소를 받습니다: `https://notes-api.onrender.com`
5. **`https://notes-api.onrender.com/health`** 를 열어 `{"status":"ok"}` 확인
6. `/docs` 도 열어 봅니다

> **첫 배포는 5~10분 걸립니다.** 로그를 보면서 기다리세요.
> `alembic upgrade head` 가 도는 것이 보여야 정상입니다.

### 4단계. 프론트엔드 배포 (Vercel)

`next.config.ts` 를 환경변수 기반으로 바꿉니다.

```ts
const apiUrl = process.env.NEXT_PUBLIC_API_URL ?? "http://127.0.0.1:8000";
const api = new URL(apiUrl);

const nextConfig: NextConfig = {
  images: {
    remotePatterns: [
      {
        protocol: api.protocol.replace(":", "") as "http" | "https",
        hostname: api.hostname,
        port: api.port,          // 없으면 빈 문자열
        pathname: "/uploads/**",
      },
    ],
    dangerouslyAllowLocalIP: process.env.NODE_ENV === "development",
  },
  productionBrowserSourceMaps: false,
};
```

**주소를 코드에 박지 않습니다.** 환경변수만 바꾸면 어디든 배포됩니다.

**배포 순서:**

1. [vercel.com](https://vercel.com) 가입 → GitHub 연결
2. **New Project** → 저장소 선택
3. **Root Directory 를 `frontend` 로** 지정 ← 빼먹기 쉽습니다
4. 환경변수 두 개:
   ```
   API_URL=https://notes-api.onrender.com
   NEXT_PUBLIC_API_URL=https://notes-api.onrender.com
   ```
5. Deploy → 주소를 받습니다: `https://my-notes.vercel.app`

### 5단계. ★ 마지막 연결 — CORS

이제 프론트 주소를 알았으니 **Render로 돌아가** 설정합니다.

```
CORS_ORIGINS=https://my-notes.vercel.app
```

Render가 자동으로 재시작합니다.

> **왜 순서가 이런가요?** 서로의 주소를 알아야 하는데,
> 배포하기 전에는 주소를 모르기 때문입니다. **닭과 달걀** 문제라
> 백엔드 → 프론트 → 백엔드 설정 순으로 두 번 갑니다.
>
> **끝에 슬래시를 붙이면 안 됩니다.** `https://my-notes.vercel.app/` (X)

## 배포 전 점검 목록

```
□ .env 가 깃에 안 올라갔다 (git status 로 확인)
□ SECRET_KEY 가 예제 값이 아니다
□ ENVIRONMENT=production 이다
□ DATABASE_URL 이 PostgreSQL 이다
□ CORS_ORIGINS 가 실제 프론트 주소다 (끝에 / 없음)
□ 시작 명령에 alembic upgrade head 가 있다
□ --host 0.0.0.0 --port $PORT 다
□ NEXT_PUBLIC_API_URL 이 https 다
□ Vercel 의 Root Directory 가 frontend 다
□ 업로드 파일이 사라져도 되는지 판단했다
```

## 배포 후 확인

- [ ] `https://.../health` → `{"status":"ok"}`
- [ ] 프론트에서 **가입 → 로그인**이 된다
- [ ] 메모를 만들고 지울 수 있다
- [ ] **새로고침해도 로그인이 유지**된다 (쿠키)
- [ ] 브라우저 콘솔에 **CORS 오류가 없다**
- [ ] 사진 업로드가 된다 (**재배포하면 사라지는 것은 정상**)
- [ ] 다른 계정으로 가입해 **메모가 격리**되는지 확인
- [ ] 휴대폰으로 접속해 본다

전체 코드: [`reference/20-deploy/`](../reference/20-deploy/)

## 흔한 에러

<details open>
<summary><b>1. <code>blocked by CORS policy</code></b></summary>

- `CORS_ORIGINS` 가 **정확한** 프론트 주소인가요? (https, 끝 슬래시 없음)
- Vercel은 배포마다 미리보기 주소를 만듭니다.
  그 주소로 접속하면 목록에 없어서 막힙니다. **정식 주소로** 테스트하세요
- 환경변수를 바꾼 뒤 **재시작**됐나요?
</details>

<details>
<summary><b>2. <code>no such table</code> / <code>relation does not exist</code></b></summary>

마이그레이션이 안 돌았습니다. 시작 명령을 확인하세요.

```
alembic upgrade head && uvicorn main:app --host 0.0.0.0 --port $PORT
```
</details>

<details>
<summary><b>3. 서버가 시작하자마자 죽는다</b></summary>

**로그를 보세요.** 우리 안전장치가 막았을 가능성이 큽니다.

```
ValueError: SECRET_KEY 가 기본값입니다...
ValueError: 배포 환경에서 SQLite 를 쓰고 있습니다...
```

**이건 버그가 아니라 의도된 동작입니다.** 설정을 고치세요.
</details>

<details>
<summary><b>4. 첫 요청이 30초 걸린다</b></summary>

무료 요금제의 **콜드 스타트**입니다. 15분 놀면 잠들고, 깨우는 데 시간이 걸립니다.
정상이며, 유료로 올리면 사라집니다.
</details>

<details>
<summary><b>5. 재배포하니 사진이 전부 사라졌다</b></summary>

**정상입니다.** 디스크가 초기화되기 때문입니다.
S3 같은 외부 저장소로 옮겨야 합니다 (아래 문제 2).
</details>

<details>
<summary><b>6. <code>Mixed Content</code> 오류</b></summary>

https 페이지에서 http를 불렀습니다. `NEXT_PUBLIC_API_URL` 을 https로 바꾸세요.
</details>

<details>
<summary><b>7. Vercel 빌드가 <code>Module not found</code> 로 실패</b></summary>

**Root Directory 를 `frontend` 로 지정**했는지 확인하세요.
저장소 최상위에서 빌드하려 한 것입니다.
</details>

<details>
<summary><b>8. 로그인은 되는데 새로고침하면 풀린다</b></summary>

쿠키가 저장되지 않았습니다. `secure: process.env.NODE_ENV === "production"` 이
배포에서 **true** 여야 하고, 그러려면 페이지가 **https** 여야 합니다.
</details>

## 마무리: 20편을 마치며

**해냈습니다.** 되짚어 보면:

| 부 | 무엇을 배웠나 |
|---|---|
| **1부** (01~07) | API와 화면을 만들고, 연결하고, 정리하기 |
| **2부** (08~11) | 상태 관리, 로딩·에러, 폼 검증, 다크모드 |
| **3부** (12~16) | 데이터베이스, 마이그레이션, 관계, 검색, 업로드 |
| **4부** (17~20) | 인증, 권한, 실시간, 배포 |

**이제 할 수 있는 것:**

- 아이디어를 API로 설계하고 만들 수 있습니다
- 화면을 만들고 붙일 수 있습니다
- 데이터를 안전하게 저장하고 찾을 수 있습니다
- 사용자별로 격리하고 보호할 수 있습니다
- 인터넷에 올릴 수 있습니다

**이건 웹 서비스의 뼈대 전부입니다.** 여기서 더 필요한 것은
대부분 **이 위에 얹는 것**입니다.

### 아직 안 배운 것 (정직하게)

| 주제 | 언제 필요해지나 |
|---|---|
| **테스트** | 코드가 커져 손으로 확인하기 버거울 때 |
| 캐싱 (Redis) | 같은 조회가 반복될 때 |
| 작업 큐 (Celery) | BackgroundTasks로 부족할 때 |
| 로그·모니터링 | "언제부터 느려졌지?"가 궁금할 때 |
| CI/CD | 배포가 잦아질 때 |
| 소셜 로그인 | 사용자가 가입을 귀찮아할 때 |
| 관리자 화면 | 데이터를 직접 고쳐야 할 때 |

**전부 지금 배울 필요는 없습니다.** 필요해질 때 배우면 훨씬 잘 들어옵니다.

### 다음에 할 일

**남이 만든 튜토리얼 말고, 내 것을 만드세요.**

이 교재의 메모장을 이렇게 바꿔 보세요:

- 가계부 (금액, 분류, 월별 합계)
- 독서 기록 (책, 별점, 인용구)
- 운동 일지 (종목, 무게, 그래프)

**구조는 거의 같습니다.** 목록·상세·작성·수정·삭제·검색·로그인.
이름만 바꾸면 됩니다. 그러면서 **"이건 이 교재에 없던데?"** 하는 것이 나옵니다.
그때 검색하고 문서를 읽는 것 — **그게 진짜 개발자가 일하는 방식입니다.**

</script>

<script>
(function () {
  "use strict";

  /* ── markdown → html ─────────────────────────────── */

  function esc(s) {
    return s.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
  }

  function inline(text) {
    var codes = [];
    var out = esc(text);

    // protect inline code so bold/link rules never touch its contents.
    // double backticks come first — they wrap text that itself contains a backtick,
    // e.g. ``Ctrl + ` `` . CommonMark strips one padding space on each side.
    out = out.replace(/``([\s\S]+?)``/g, function (_, c) {
      codes.push(c.replace(/^ /, "").replace(/ $/, ""));
      return "§" + (codes.length - 1) + "§";
    });

    out = out.replace(/`([^`]+)`/g, function (_, c) {
      codes.push(c);
      return "§" + (codes.length - 1) + "§";
    });

    out = out.replace(/\*\*(.+?)\*\*/g, "<strong>$1</strong>");

    out = out.replace(/\[([^\]]+)\]\(([^)]+)\)/g, function (_, label, href) {
      // links between chapters become in-page navigation
      var md = href.match(/^([\w.-]+)\.md(#.*)?$/);
      if (md) return '<a href="#' + slugOf(md[1]) + '">' + label + "</a>";
      // local folders (reference/) do not exist here — show as literal text
      if (!/^https?:/.test(href)) return "<code>" + label + "</code>";
      return '<a href="' + href + '" target="_blank" rel="noopener">' + label + "</a>";
    });

    out = out.replace(/§(\d+)§/g, function (_, i) {
      return "<code>" + codes[+i] + "</code>";
    });

    return out;
  }

  function slugOf(name) {
    return "ch-" + name.toLowerCase().replace(/[^a-z0-9]+/g, "-");
  }

  function render(md, headings, idPrefix) {
    var lines = md.replace(/\r\n/g, "\n").split("\n");
    var html = [];
    var i = 0;

    function isFence(l) { return /^\s*```/.test(l); }
    function isTableRow(l) { return /^\s*\|/.test(l); }
    function isItem(l) { return /^(\s*)([-*]|\d+\.)\s+/.test(l); }

    while (i < lines.length) {
      var line = lines[i];

      // fenced code
      if (isFence(line)) {
        var indent = line.match(/^\s*/)[0].length;
        var lang = line.trim().replace(/^```/, "").trim();
        var buf = [];
        i++;
        while (i < lines.length && !isFence(lines[i])) {
          buf.push(lines[i].slice(indent));
          i++;
        }
        i++;
        html.push(
          '<div class="codeblock">' +
          (lang ? '<div class="lang">' + esc(lang) + "</div>" : "") +
          "<pre><code>" + esc(buf.join("\n")) + "</code></pre></div>"
        );
        continue;
      }

      // raw html passthrough (details / summary)
      if (/^\s*<(\/?details|summary)/.test(line)) {
        html.push(line.trim());
        i++;
        continue;
      }

      // heading
      var h = line.match(/^(#{1,6})\s+(.*)$/);
      if (h) {
        var level = h[1].length;
        var text = h[2].trim();
        if (level === 1) {
          html.push("<h1>" + inline(text) + "</h1>");
        } else {
          var id = idPrefix + "-h" + headings.length;
          if (level === 2) headings.push({ id: id, text: text.replace(/[`*]/g, "") });
          html.push("<h" + level + ' id="' + id + '">' + inline(text) + "</h" + level + ">");
        }
        i++;
        continue;
      }

      // horizontal rule
      if (/^\s*(-{3,}|\*{3,})\s*$/.test(line)) {
        html.push("<hr />");
        i++;
        continue;
      }

      // table
      if (isTableRow(line) && i + 1 < lines.length && /^\s*\|[\s:|-]+\|\s*$/.test(lines[i + 1])) {
        var cells = function (l) {
          return l.trim().replace(/^\|/, "").replace(/\|$/, "").split("|").map(function (c) {
            return c.trim();
          });
        };
        var head = cells(line);
        i += 2;
        var rows = [];
        while (i < lines.length && isTableRow(lines[i])) {
          rows.push(cells(lines[i]));
          i++;
        }
        var t = ['<div class="tablewrap"><table><thead><tr>'];
        head.forEach(function (c) { t.push("<th>" + inline(c) + "</th>"); });
        t.push("</tr></thead><tbody>");
        rows.forEach(function (r) {
          t.push("<tr>");
          r.forEach(function (c) { t.push("<td>" + inline(c) + "</td>"); });
          t.push("</tr>");
        });
        t.push("</tbody></table></div>");
        html.push(t.join(""));
        continue;
      }

      // blockquote
      if (/^\s*>\s?/.test(line)) {
        var q = [];
        while (i < lines.length && /^\s*>\s?/.test(lines[i])) {
          q.push(lines[i].replace(/^\s*>\s?/, ""));
          i++;
        }
        html.push("<blockquote>" + render(q.join("\n"), [], idPrefix) + "</blockquote>");
        continue;
      }

      // list
      if (isItem(line)) {
        var items = [];
        var baseIndent = line.match(/^\s*/)[0].length;
        var ordered = /^\s*\d+\./.test(line);
        while (i < lines.length && lines[i].trim() !== "") {
          var m = lines[i].match(/^(\s*)([-*]|\d+\.)\s+(.*)$/);
          if (m) {
            items.push({ indent: m[1].length, text: m[3], ordered: /^\d+\./.test(m[2]) });
          } else if (items.length && /^\s+\S/.test(lines[i])) {
            items[items.length - 1].text += "\n" + lines[i].trim();
          } else {
            break;
          }
          i++;
        }
        html.push(buildList(items, baseIndent, ordered));
        continue;
      }

      // blank
      if (line.trim() === "") { i++; continue; }

      // paragraph
      var p = [];
      while (
        i < lines.length &&
        lines[i].trim() !== "" &&
        !isFence(lines[i]) &&
        !isItem(lines[i]) &&
        !isTableRow(lines[i]) &&
        !/^\s*>/.test(lines[i]) &&
        !/^#{1,6}\s/.test(lines[i]) &&
        !/^\s*<(\/?details|summary)/.test(lines[i]) &&
        !/^\s*(-{3,})\s*$/.test(lines[i])
      ) {
        p.push(lines[i].trim());
        i++;
      }
      if (p.length) html.push("<p>" + inline(p.join(" ")) + "</p>");
    }

    return html.join("\n");
  }

  function buildList(items, baseIndent, ordered) {
    var isTaskList = items.length > 0 && items.every(function (it) {
      return /^\[[ xX]\]\s/.test(it.text);
    });
    var tag = ordered ? "ol" : "ul";
    var out = ["<" + tag + (isTaskList ? ' class="tasks"' : "") + ">"];
    var n = 0;

    while (n < items.length) {
      var it = items[n];
      var body;
      if (isTaskList) {
        var done = /^\[[xX]\]/.test(it.text);
        body =
          '<span class="box" aria-hidden="true">' + (done ? "✓" : "") + "</span>" +
          "<span>" + inline(it.text.replace(/^\[[ xX]\]\s*/, "")) + "</span>";
      } else {
        body = inline(it.text);
      }

      // collect deeper-indented items as a nested list
      var kids = [];
      var k = n + 1;
      while (k < items.length && items[k].indent > it.indent) { kids.push(items[k]); k++; }

      out.push("<li>" + body);
      if (kids.length) {
        out.push(buildList(kids, kids[0].indent, kids[0].ordered));
      }
      out.push("</li>");
      n = k;
    }

    out.push("</" + tag + ">");
    return out.join("");
  }

  /* ── chapters ────────────────────────────────────── */

  var chapters = [].slice
    .call(document.querySelectorAll('script[type="text/markdown"]'))
    .map(function (el) {
      return {
        slug: slugOf(el.dataset.file),
        num: el.dataset.num,
        label: el.dataset.label,
        md: el.textContent,
      };
    });

  var tocEl = document.getElementById("toc");
  var docEl = document.getElementById("doc");

  function buildToc(activeIndex, headings) {
    tocEl.innerHTML = "";
    chapters.forEach(function (ch, idx) {
      var li = document.createElement("li");
      li.className = "toc-item";

      var a = document.createElement("a");
      a.className = "toc-link";
      a.href = "#" + ch.slug;
      if (idx === activeIndex) a.setAttribute("aria-current", "true");
      a.innerHTML =
        '<span class="toc-num">' + ch.num + "</span><span>" + ch.label + "</span>";
      li.appendChild(a);

      if (idx === activeIndex && headings.length) {
        var sub = document.createElement("ul");
        sub.className = "subtoc";
        headings.forEach(function (h) {
          var sli = document.createElement("li");
          var sa = document.createElement("a");
          sa.href = "#" + h.id;
          sa.textContent = h.text;
          sli.appendChild(sa);
          sub.appendChild(sli);
        });
        li.appendChild(sub);
      }

      tocEl.appendChild(li);
    });
  }

  function pager(idx) {
    var prev = chapters[idx - 1];
    var next = chapters[idx + 1];
    if (!prev && !next) return "";
    var h = ['<nav class="pager">'];
    if (prev) {
      h.push('<a href="#' + prev.slug + '"><span class="dir">← 이전</span>' +
             '<span class="ttl">' + prev.label + "</span></a>");
    }
    if (next) {
      h.push('<a class="next" href="#' + next.slug + '"><span class="dir">다음 →</span>' +
             '<span class="ttl">' + next.label + "</span></a>");
    }
    h.push("</nav>");
    return h.join("");
  }

  function show(slug, keepScroll) {
    var idx = chapters.findIndex(function (c) { return c.slug === slug; });
    if (idx < 0) idx = 0;
    var ch = chapters[idx];
    var headings = [];
    var body = render(ch.md, headings, ch.slug);

    docEl.innerHTML =
      '<div class="eyebrow">' + ch.num + " · " + ch.label + "</div>" + body + pager(idx);

    buildToc(idx, headings);
    document.title = ch.label + " — FastAPI + Next.js 실습 교재";
    if (!keepScroll) window.scrollTo(0, 0);
    document.body.classList.remove("rail-open");
    toggle.setAttribute("aria-expanded", "false");
  }

  function fromHash() {
    var raw = location.hash.replace(/^#/, "");
    var known = chapters.some(function (c) { return c.slug === raw; });
    if (known) { show(raw); return; }
    // a section anchor inside the current chapter
    var target = raw && document.getElementById(raw);
    if (target) { target.scrollIntoView(); return; }
    show(chapters[0].slug);
  }

  var toggle = document.getElementById("railtoggle");

    toggle.setAttribute("aria-expanded", String(open));
  });
  document.getElementById("scrim").addEventListener("click", function () {
    document.body.classList.remove("rail-open");
    toggle.setAttribute("aria-expanded", "false");
  });

  window.addEventListener("hashchange", fromHash);
  fromHash();
})();
</script>

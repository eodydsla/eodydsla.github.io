**`app/notes/page.tsx`** 를 만들고, 기존 `app/page.tsx` 내용을 가져와 고칩니다.

```tsx
// frontend/app/notes/page.tsx
import Link from "next/link";

import { NoteForm } from "@/components/note-form";
import { formatDate, listNotes, type Note } from "@/lib/api";
import { Card, CardContent } from "@/components/ui/card";

export default async function NotesPage() {
  let notes: Note[] = [];
  let error: string | null = null;

  try {
    notes = await listNotes();
  } catch {
    error = "백엔드 서버에 연결할 수 없습니다.";
  }

  return (
    <main className="mx-auto max-w-2xl px-6 py-16">
      <h1 className="text-3xl font-bold tracking-tight">
        메모장{notes.length > 0 && ` (${notes.length})`}
      </h1>
      <p className="mt-2 text-sm text-muted-foreground">
        메모를 눌러 자세히 보세요.
      </p>

      <div className="mt-8">
        <NoteForm />
      </div>

      {error ? (
        <p className="mt-8 rounded-md bg-destructive/10 px-4 py-3 text-sm text-destructive">
          {error}
        </p>
      ) : notes.length === 0 ? (
        <p className="mt-8 text-center text-sm text-muted-foreground">
          아직 메모가 없습니다. 위에서 하나 적어 보세요.
        </p>
      ) : (
        <div className="mt-8 flex flex-col gap-3">
          {notes.map((note) => (
            <Link key={note.id} href={`/notes/${note.id}`} className="block">
              <Card className="transition-colors hover:border-ring">
                <CardContent className="pt-6">
                  <h2 className="font-semibold">{note.title}</h2>

                  {note.content && (
                    <p className="mt-1 line-clamp-2 text-sm text-muted-foreground">
                      {note.content}
                    </p>
                  )}

                  <p className="mt-2 text-xs text-muted-foreground tabular-nums">
                    {formatDate(note.created_at)}
                  </p>
                </CardContent>
              </Card>
            </Link>
          ))}
        </div>
      )}
    </main>
  );
}
```

**바뀐 점:**

- 각 메모를 `<Link href={`/notes/${note.id}`}>` 로 감쌌습니다
- 수정/삭제 버튼이 사라졌습니다 → **상세 페이지로 옮겨 갑니다**
- `line-clamp-2` : 내용을 **두 줄까지만** 보여 주고 나머지는 `...` 처리합니다

> **`{notes.length > 0 && ` (${notes.length})`}`**
> 메모가 있을 때만 개수를 붙입니다. 0개일 때 "메모장 (0)"은 좀 그렇죠.

### 3단계. `/` 를 `/notes` 로 보내기

`app/page.tsx` 의 내용을 **전부 지우고**:

```tsx
// frontend/app/page.tsx
import { redirect } from "next/navigation";

export default function Home() {
  redirect("/notes");
}
```

`redirect()` 는 서버 컴포넌트에서 **"다른 주소로 보내"** 라고 하는 함수입니다.
이 줄에서 실행이 끝나므로 `return` 이 필요 없습니다.

### 4단계. API에 `getNote` 추가

상세 페이지는 메모 하나만 가져오면 됩니다. `lib/api.ts` 에 추가하세요.

```ts
// lib/api.ts 에 추가

export class NotFoundError extends Error {}

export async function getNote(id: number): Promise<Note> {
  const res = await fetch(`${API_URL}/notes/${id}`, { cache: "no-store" });

  if (res.status === 404) {
    throw new NotFoundError(await readError(res));
  }
  if (!res.ok) throw new Error(await readError(res));

  return res.json();
}
```

**`NotFoundError` 를 왜 따로 만드나요?**

"없는 메모"와 "서버가 죽음"은 **화면에서 다르게 처리해야 합니다.**

| 상황 | 보여 줄 것 |
|---|---|
| 404 — 없는 메모 | "그런 메모가 없습니다" 안내 |
| 그 외 — 서버 장애 | "잠시 후 다시 시도해 주세요" |

`Error` 를 상속한 클래스를 하나 만들어 두면, `catch` 에서
`err instanceof NotFoundError` 로 구분할 수 있습니다.

```ts
export class NotFoundError extends Error {}
```

**중괄호 안이 비어 있어도 됩니다.** "이름표만 다른 Error"를 만든 것입니다.

### 5단계. ★ 상세 페이지 — 동적 경로

```powershell
cd frontend\app\notes

```

> PowerShell에서 대괄호는 특별한 문자라 **따옴표로 감싸세요.**
> VS Code 탐색기에서 만드는 게 더 편합니다.

**`app/notes/[id]/page.tsx`**:

```tsx
// frontend/app/notes/[id]/page.tsx
import Link from "next/link";
import { notFound } from "next/navigation";

import { DeleteButton } from "@/components/delete-button";
import { buttonVariants } from "@/components/ui/button";
import { Card, CardContent } from "@/components/ui/card";
import { formatDate, getNote, NotFoundError } from "@/lib/api";

type Props = {
  params: Promise<{ id: string }>;
};

export default async function NoteDetailPage({ params }: Props) {
  const { id } = await params;

  let note;
  try {
    note = await getNote(Number(id));
  } catch (err) {
    if (err instanceof NotFoundError) notFound();
    throw err;
  }

  return (
    <main className="mx-auto max-w-2xl px-6 py-16">
      <Link
        href="/notes"
        className="text-sm text-muted-foreground hover:text-foreground"
      >
        ← 목록으로
      </Link>

      <Card className="mt-6">
        <CardContent className="pt-6">
          <h1 className="text-2xl font-bold tracking-tight">{note.title}</h1>

          <p className="mt-1 text-xs text-muted-foreground tabular-nums">
            {formatDate(note.created_at)}
          </p>

          {note.content ? (
            <p className="mt-6 whitespace-pre-wrap leading-relaxed">
              {note.content}
            </p>
          ) : (
            <p className="mt-6 text-sm text-muted-foreground">내용이 없습니다.</p>
          )}
        </CardContent>
      </Card>

      <div className="mt-6 flex gap-2">
        <Link
          href={`/notes/${note.id}/edit`}
          className={buttonVariants({ variant: "outline" })}
        >
          수정
        </Link>

        <DeleteButton id={note.id} title={note.title} />
      </div>
    </main>
  );

```

**★ 여기가 이번 편에서 제일 중요한 두 줄입니다.**

```tsx
type Props = {
  params: Promise<{ id: string }>;
};

const { id } = await params;
```

**`params` 는 Promise 입니다. `await` 를 해야 값이 나옵니다.**

Next.js 15부터 바뀐 부분입니다. 인터넷의 옛날 예제에는 이렇게 나옵니다:

```tsx
export default function Page({ params }: { params: { id: string } }) {
  const id = params.id;      // ❌ Next.js 14 이하 방식
```

지금은 안 됩니다. **`await params`** 를 기억하세요.

**`notFound()`**

```tsx
if (err instanceof NotFoundError) notFound();
```

이걸 부르면 Next.js가 **그 자리에서 실행을 멈추고** `not-found.tsx` 를 그립니다.
HTTP 상태 코드도 404로 나갑니다(검색엔진이 알아야 하니까요).

**링크를 버튼처럼 보이게 하기**

```tsx
<Link href={...} className={buttonVariants({ variant: "outline" })}>수정</Link>
```

`<Button>` 안에 `<Link>` 를 넣으면 **버튼 안에 링크**가 되어 이상해집니다.
`buttonVariants()` 는 **버튼의 CSS 클래스 문자열만** 돌려주는 함수입니다.
이걸 `<Link>` 에 입히면 "생김새는 버튼, 동작은 링크"가 됩니다.

### 7단계. 삭제 버튼 — `router.push`

**`components/delete-button.tsx`**:

```tsx
// frontend/components/delete-button.tsx
"use client";

import { useRouter } from "next/navigation";
import { useState } from "react";

import { Button } from "@/components/ui/button";
import { deleteNote } from "@/lib/api";

type Props = {
  id: number;
  title: string;
};

export function DeleteButton({ id, title }: Props) {
  const router = useRouter();
  const [busy, setBusy] = useState(false);
  const [error, setError] = useState<string | null>(null);

  async function handleDelete() {
    if (!confirm(`"${title}" 메모를 지울까요?`)) return;

    setError(null);
    setBusy(true);
    try {
      await deleteNote(id);
      router.push("/notes");
      router.refresh();
    } catch (err) {
      setError(err instanceof Error ? err.message : "삭제하지 못했습니다.");
      setBusy(false);
    }
  }

  return (
    <div>
      <Button variant="destructive" onClick={handleDelete} disabled={busy}>
        {busy ? "삭제 중..." : "삭제"}
      </Button>
      {error && <p className="mt-2 text-sm text-destructive">{error}</p>}
    </div>
  );
}
```

**세 가지 이동 함수를 구분합시다.**

| 함수 | 하는 일 | 쓸 때 |
|---|---|---|
| `router.push("/notes")` | 그 주소로 **이동** (뒤로가기 기록 남음) | 저장/삭제 후 |
| `router.refresh()` | 지금 페이지의 **데이터만** 새로 받기 | 목록 갱신 |
| `router.back()` | 브라우저 **뒤로가기** | "취소" 버튼 |

삭제 후에 **둘 다** 부른 이유:

```tsx
router.push("/notes");    // 목록으로 가고
router.refresh();         // 그 목록을 새로 받아옴
```

`push` 만 하면 Next.js가 **캐시해 둔 예전 목록**을 보여 줄 수 있습니다.
방금 지운 메모가 그대로 보이는 거죠. `refresh()` 가 그걸 막아 줍니다.

**`app/notes/[id]/edit/page.tsx`**:

**`components/edit-form.tsx`**:

```tsx
// frontend/components/edit-form.tsx
"use client";

import { useRouter } from "next/navigation";
import { useState } from "react";

import { Button } from "@/components/ui/button";
import { Card, CardContent } from "@/components/ui/card";
import { Input } from "@/components/ui/input";
import { Label } from "@/components/ui/label";
import { Textarea } from "@/components/ui/textarea";
import { updateNote, type Note } from "@/lib/api";

type Props = {
  note: Note;
};

export function EditForm({ note }: Props) {
  const router = useRouter();

  const [title, setTitle] = useState(note.title);
  const [content, setContent] = useState(note.content);
  const [saving, setSaving] = useState(false);
  const [error, setError] = useState<string | null>(null);

  async function handleSubmit(event: React.FormEvent) {
    event.preventDefault();
    setError(null);
    setSaving(true);

    try {
      await updateNote(note.id, { title, content });
      router.push(`/notes/${note.id}`);
      router.refresh();
    } catch (err) {
      setError(err instanceof Error ? err.message : "수정하지 못했습니다.");
      setSaving(false);
    }
  }

  return (
    <Card>
      <CardContent className="pt-6">
        <form onSubmit={handleSubmit} className="flex flex-col gap-4">
          <div className="flex flex-col gap-2">
            <Label htmlFor="title">제목</Label>
            <Input
              id="title"
              value={title}
              onChange={(e) => setTitle(e.target.value)}
            />
          </div>

          <div className="flex flex-col gap-2">
            <Label htmlFor="content">내용</Label>
            <Textarea
              id="content"
              value={content}
              onChange={(e) => setContent(e.target.value)}
              rows={8}
            />
          </div>

          {error && <p className="text-sm text-destructive">{error}</p>}

          <div className="flex gap-2">
            <Button type="submit" disabled={title.trim() === "" || saving}>
              {saving ? "저장 중..." : "저장"}
            </Button>

            <Button
              type="button"
              variant="outline"
              onClick={() => router.back()}
              disabled={saving}
            >
              취소
            </Button>
          </div>
        </form>
      </CardContent>
    </Card>
  );
}
```

**서버 컴포넌트가 데이터를 가져와서, 클라이언트 컴포넌트에 `props` 로 넘깁니다.**

```
edit/page.tsx (서버)  →  getNote()  →  <EditForm note={note} />  (클라)
```

이 패턴이 App Router의 기본형입니다. 7편에서 더 자세히 다룹니다.

### 9단계. 상단 바 — `layout.tsx`

주소를 옮겨 다녀도 **항상 있어야 하는 것**은 `layout.tsx` 에 둡니다.

```tsx
// frontend/app/layout.tsx  (일부)
import Link from "next/link";

export default function RootLayout({ children }: ...) {
  return (
    <html lang="ko" className={...}>
      <body className="min-h-full flex flex-col">
        <header className="border-b">
          <nav className="mx-auto flex max-w-2xl items-center gap-4 px-6 py-4">
            <Link href="/notes" className="font-semibold">
              메모장
            </Link>
          </nav>
        </header>

        {children}
      </body>
    </html>
  );
}
```

**`{children}` 자리에 각 페이지가 들어옵니다.**
`/notes` 든 `/notes/1` 이든, 위쪽 바는 **다시 그려지지 않습니다.**

## 흔한 에러

<details open>
<summary><b>1. <code>params.id</code> 가 undefined 다</b></summary>

`await` 를 안 했습니다. Next.js 15+ 에서 `params` 는 Promise입니다.

```tsx
const { id } = await params;                    // ✅
type Props = { params: Promise<{ id: string }> };
```
</details>

<details>
<summary><b>2. <code>404 | This page could not be found</code> (내가 만든 화면이 아님)</b></summary>

**폴더/파일 이름을 확인하세요.**

- 파일 이름이 정확히 **`page.tsx`** 인가요? (`Page.tsx`, `index.tsx` 아님)
- `[id]` 대괄호가 제대로 들어갔나요?
- 개발 서버를 껐다 켜 보세요. 폴더를 새로 만들면 못 잡을 때가 있습니다.
</details>

<details>
<summary><b>3. <code>not-found.tsx</code> 가 안 나오고 에러 화면이 뜬다</b></summary>

- `notFound()` 를 **`try` 블록 안에서** 부르면 안 됩니다.
  `notFound()` 는 내부적으로 예외를 던지는데, 그걸 내 `catch` 가 잡아 버립니다.
  교재 코드처럼 **`catch` 안에서** 부르세요.
- `not-found.tsx` 의 위치를 확인하세요. `app/notes/[id]/` 안에 있어야
  그 주소에서 적용됩니다.
</details>

<details>
<summary><b>4. 삭제했는데 목록에 그대로 있다</b></summary>

`router.push()` 만 하고 `router.refresh()` 를 안 했습니다.
Next.js가 캐시해 둔 예전 목록을 보여 준 것입니다.
</details>

<details>
<summary><b>5. 페이지 이동할 때 화면이 하얗게 깜빡인다</b></summary>

`<Link>` 대신 `<a>` 를 썼습니다. 내부 이동은 항상 `<Link>` 입니다.
</details>

<details>
<summary><b>6. PowerShell에서 <code>mkdir [id]</code> 가 이상하게 동작한다</b></summary>

대괄호는 PowerShell에서 특별한 문자입니다.

```powershell
mkdir "[id]"       # 따옴표로 감싸기
```

VS Code 탐색기에서 폴더를 만드는 게 더 안전합니다.
</details>

<details>
<summary><b>7. <code>Button</code> 안에 <code>Link</code> 를 넣었더니 이상하다</b></summary>

버튼 안에 링크가 중첩되어 HTML이 깨집니다.
`buttonVariants()` 로 **링크에 버튼 스타일을 입히세요.**

```tsx
<Link href="/notes" className={buttonVariants({ variant: "outline" })}>
```
</details>

## 스스로 해보기

### ★ 문제 1 — 목록에서 바로 삭제

목록 카드에도 삭제 버튼을 넣으세요.

> 힌트: `<DeleteButton>` 을 재사용할 수 있습니다. 단, 삭제 후 `/notes` 로
> 이동할 필요가 없으니 `router.refresh()` 만 하도록 옵션을 하나 받게 고쳐 보세요.
>
> **주의**: 카드 전체가 `<Link>` 로 감싸여 있어서, 안에 있는 버튼을 누르면
> 링크도 같이 눌립니다. `event.stopPropagation()` 과 `event.preventDefault()` 를
> 찾아보세요. (구조를 바꿔서 링크와 버튼을 나란히 두는 방법도 있습니다.)

### ★★ 문제 2 — 이전 / 다음 메모

상세 페이지 아래에 "← 이전 메모 / 다음 메모 →" 링크를 넣으세요.

> 힌트: 목록을 받아서 지금 메모의 위치(`findIndex`)를 찾으면 됩니다.
> 첫 메모면 "이전"이 없어야 하고, 마지막이면 "다음"이 없어야 합니다.

### ★★★ 문제 3 — 지금 페이지 표시하기

상단 바에 링크를 두 개(`목록`, `새 메모`) 두고,
**지금 보고 있는 페이지의 링크만** 진하게 표시하세요.

> 힌트: `usePathname()` 훅이 지금 주소를 알려 줍니다.
>
> ```tsx
> "use client";
> import { usePathname } from "next/navigation";
>
> const pathname = usePathname();   // "/notes" 또는 "/notes/1"
> ```
>
> **주의**: 훅이므로 클라이언트 컴포넌트여야 합니다.
> `layout.tsx` 전체를 클라이언트로 만들지 말고, **상단 바만** 따로 컴포넌트로
> 빼서 그것만 `"use client"` 로 만드세요. 이게 다음 편의 주제입니다.

## 개념 먼저

### props — 컴포넌트에 값 넘기기

컴포넌트는 **함수**입니다. 함수에 인자를 넘기듯 값을 넘길 수 있고, 그걸 props라고 합니다.

```tsx
// 받는 쪽
type Props = {
  name: string;
};

function Hello({ name }: Props) {
  return <p>안녕, {name}님</p>;
}

// 넘기는 쪽
<Hello name="철수" />
```

HTML 속성처럼 생겼지만 **문자열만 넘길 수 있는 게 아닙니다.**

```tsx
<Hello name="철수" />                    {/* 문자열 */}
<Hello age={20} />                       {/* 숫자는 중괄호 */}
<Hello tags={["a", "b"]} />              {/* 배열 */}
<Hello note={someNote} />                {/* 객체 */}
<Hello onSave={handleSave} />            {/* ★ 함수도 됩니다 */}
```

> **문자열 말고는 전부 중괄호 `{ }`** 안에 넣습니다.

### ★ 함수를 props로 — 이번 편의 핵심

"저장 버튼을 누르면 **무슨 일**을 할지"를 밖에서 정해 주는 방식입니다.

```tsx
// 안쪽: 무슨 일인지는 모른 채, 그냥 부르기만 합니다
function Editor({ onSubmit }: { onSubmit: (v: string) => void }) {
  return <button onClick={() => onSubmit("내용")}>저장</button>;
}

// 바깥: 할 일을 정해서 넘깁니다
<Editor onSubmit={(v) => createNote(v)} />   // 만들기 화면
<Editor onSubmit={(v) => updateNote(v)} />   // 수정 화면
```

**같은 화면, 다른 동작.** 이게 재사용의 정체입니다.

> 사실 이미 쓰고 있었습니다. `<Button onClick={...}>` 의 `onClick` 이
> 바로 "함수를 props로 넘긴 것"입니다.

### children — 태그 사이에 끼워 넣기

```tsx
<PageHeader title="메모장">
  <Link href="/notes/new">새 메모</Link>     ← 이게 children
</PageHeader>
```

`children` 은 **"여는 태그와 닫는 태그 사이에 들어온 것"** 을 받는 특별한 props입니다.

```tsx
type Props = {
  title: string;
  children?: React.ReactNode;   // "화면에 그릴 수 있는 아무것"
};

function PageHeader({ title, children }: Props) {
  return (
    <div>
      <h1>{title}</h1>
      {children}                {/* 여기에 끼워 넣습니다 */}
    </div>
  );
}
```

**props로 넘기는 것과 뭐가 다른가요?**

| | 쓸 때 |
|---|---|
| `title="메모장"` | **값**을 넘길 때 (글자, 숫자, 데이터) |
| `children` | **화면 조각**을 넘길 때 (버튼, 링크, 아무 JSX) |

### 언제 컴포넌트로 잘라내나?

| 신호 | 예 |
|---|---|
| **같은 코드가 두 번** 나온다 | note-form / edit-form |
| 한 파일이 **150줄** 을 넘는다 | page.tsx 가 계속 길어짐 |
| **이름을 붙일 수 있다** | "이건 메모 카드야" |
| 그 조각만 **`"use client"`** 가 필요하다 | 상단 바의 현재 위치 표시 |

> **거꾸로: 한 번만 쓰는 5줄짜리를 굳이 자르지 마세요.**
> 파일만 늘고 읽기 어려워집니다.

### 2단계. ★ 공통 편집기 만들기

`frontend/components/note-editor.tsx` 를 새로 만듭니다.

```tsx
// frontend/components/note-editor.tsx
"use client";

import { useState } from "react";

import { Button } from "@/components/ui/button";
import { Card, CardContent } from "@/components/ui/card";
import { Input } from "@/components/ui/input";
import { Label } from "@/components/ui/label";
import { Textarea } from "@/components/ui/textarea";

export type NoteValues = {
  title: string;
  content: string;
};

type Props = {
  defaultValues?: NoteValues;
  submitLabel?: string;
  resetAfterSubmit?: boolean;
  onSubmit: (values: NoteValues) => Promise<void>;
  onCancel?: () => void;
};

export function NoteEditor({
  defaultValues = { title: "", content: "" },
  submitLabel = "저장",
  resetAfterSubmit = false,
  onSubmit,
  onCancel,
}: Props) {
  const [title, setTitle] = useState(defaultValues.title);
  const [content, setContent] = useState(defaultValues.content);
  const [saving, setSaving] = useState(false);
  const [error, setError] = useState<string | null>(null);

  async function handleSubmit(event: React.FormEvent) {
    event.preventDefault();
    setError(null);
    setSaving(true);

    try {
      await onSubmit({ title, content });

      if (resetAfterSubmit) {
        setTitle("");
        setContent("");
      }
    } catch (err) {
      setError(err instanceof Error ? err.message : "저장하지 못했습니다.");
    } finally {
      setSaving(false);
    }
  }

  return (
    <Card>
      <CardContent className="pt-6">
        <form onSubmit={handleSubmit} className="flex flex-col gap-4">
          <div className="flex flex-col gap-2">
            <Label htmlFor="title">제목</Label>
            <Input
              id="title"
              value={title}
              onChange={(e) => setTitle(e.target.value)}
              placeholder="오늘 할 일"
            />
          </div>

          <div className="flex flex-col gap-2">
            <Label htmlFor="content">내용</Label>
            <Textarea
              id="content"
              value={content}
              onChange={(e) => setContent(e.target.value)}
              placeholder="자세한 내용 (비워도 됩니다)"
              rows={6}
            />
          </div>

          {error && <p className="text-sm text-destructive">{error}</p>}

          <div className="flex gap-2">
            <Button type="submit" disabled={title.trim() === "" || saving}>
              {saving ? "저장 중..." : submitLabel}
            </Button>

            {onCancel && (
              <Button
                type="button"
                variant="outline"
                onClick={onCancel}
                disabled={saving}
              >
                취소
              </Button>
            )}
          </div>
        </form>
      </CardContent>
    </Card>
  );
}
```

**세 가지를 짚습니다.**

#### ① 선택 props와 기본값

```tsx
type Props = {
  defaultValues?: NoteValues;   // ? = 안 넘겨도 됨
  submitLabel?: string;
  onSubmit: (values: NoteValues) => Promise<void>;   // ? 없음 = 필수
};

export function NoteEditor({
  defaultValues = { title: "", content: "" },   // 안 넘어오면 이 값
  submitLabel = "저장",
  ...
}: Props) {
```

**`?` 는 타입 쪽, `=` 는 값 쪽입니다.** 둘을 같이 씁니다.

#### ② 함수 타입 읽는 법

```tsx
onSubmit: (values: NoteValues) => Promise<void>;
```

> "`NoteValues` 를 받아서, 기다리면 아무것도 안 돌려주는 함수"

`Promise<void>` 인 이유는 저장이 **비동기**라서입니다.
`await onSubmit(...)` 으로 **끝날 때까지 기다렸다가** 로딩을 끕니다.

#### ③ 에러 처리를 안쪽으로 몰았다

```tsx
try {
  await onSubmit({ title, content });
} catch (err) {
  setError(...);
}
```

**바깥쪽(create/edit)은 `try/catch` 를 안 써도 됩니다.**
그냥 실패하면 예외를 던지기만 하면, NoteEditor가 잡아서 화면에 띄웁니다.

> 이렇게 "귀찮은 일을 안쪽에 숨기는 것"이 좋은 컴포넌트의 조건입니다.

### 3단계. 두 화면을 얇게 만들기

**`components/create-form.tsx`** (새로 만들고, `note-form.tsx` 는 지웁니다):

```tsx
// frontend/components/create-form.tsx
"use client";

import { useRouter } from "next/navigation";

import { NoteEditor, type NoteValues } from "@/components/note-editor";
import { createNote } from "@/lib/api";

export function CreateForm() {
  const router = useRouter();

  async function handleCreate(values: NoteValues) {
    const note = await createNote(values);

    router.push(`/notes/${note.id}`);
    router.refresh();
  }

  return (
    <NoteEditor
      submitLabel="메모 추가"
      onSubmit={handleCreate}
      onCancel={() => router.push("/notes")}
    />
  );
}
```

**`components/edit-form.tsx`** (전부 지우고 다시):

```tsx
// frontend/components/edit-form.tsx
"use client";

import { useRouter } from "next/navigation";

import { NoteEditor, type NoteValues } from "@/components/note-editor";
import { updateNote, type Note } from "@/lib/api";

type Props = {
  note: Note;
};

export function EditForm({ note }: Props) {
  const router = useRouter();

  async function handleUpdate(values: NoteValues) {
    await updateNote(note.id, values);

    router.push(`/notes/${note.id}`);
    router.refresh();
  }

  return (
    <NoteEditor
      defaultValues={{ title: note.title, content: note.content }}
      submitLabel="저장"
      onSubmit={handleUpdate}
      onCancel={() => router.back()}
    />
  );
}
```

**80줄짜리 두 개가 20줄짜리 두 개 + 공통 100줄이 됐습니다.**

줄 수는 비슷한데 뭐가 좋아졌을까요?

- 입력칸을 하나 추가하려면 **한 군데만** 고치면 됩니다
- 두 화면이 **절대 어긋나지 않습니다**
- `create-form.tsx` 를 열면 **"만들 때 뭘 하는지"만** 보입니다

### 4단계. `/notes/new` 페이지

목록 페이지 위에 있던 작성 폼을 **자기 주소**로 옮깁니다.

`app/notes/new/page.tsx`:

```tsx

import { CreateForm } from "@/components/create-form";
import { PageHeader } from "@/components/page-header";

export default function NewNotePage() {
  return (
    <main className="mx-auto max-w-2xl px-6 py-16">
      <PageHeader title="새 메모" description="제목은 반드시 있어야 합니다." />

      <div className="mt-8">
        <CreateForm />
      </div>
    </main>
  );
}
```

> **`/notes/new` 와 `/notes/[id]` 가 충돌하지 않나요?**
> `new` 도 `[id]` 자리에 들어갈 수 있어 보이죠. Next.js는 **구체적인 것을 먼저** 봅니다.
> `new` 라는 폴더가 실제로 있으므로 그쪽이 이깁니다.

### 5단계. `children` 을 쓰는 컴포넌트

`components/page-header.tsx`:

```tsx
// frontend/components/page-header.tsx
type Props = {
  title: string;
  description?: string;
  children?: React.ReactNode;
};

export function PageHeader({ title, description, children }: Props) {
  return (
    <div className="flex items-start justify-between gap-4">
      <div>
        <h1 className="text-3xl font-bold tracking-tight">{title}</h1>

        {description && (
          <p className="mt-2 text-sm text-muted-foreground">{description}</p>
        )}
      </div>

      {children && <div className="flex flex-none gap-2">{children}</div>}
    </div>
  );
}
```

> **`"use client"` 가 없습니다.** 움직이는 게 없으니 서버 컴포넌트로 둡니다.
> 클라이언트로 만들 이유가 없으면 만들지 마세요.

### 6단계. 카드도 잘라내기

`components/note-card.tsx`:

```tsx
// frontend/components/note-card.tsx
import Link from "next/link";

import { Card, CardContent } from "@/components/ui/card";
import { formatDate, type Note } from "@/lib/api";

type Props = {
  note: Note;
};

export function NoteCard({ note }: Props) {
  return (
    <Link href={`/notes/${note.id}`} className="block">
      <Card className="transition-colors hover:border-ring">
        <CardContent className="pt-6">
          <h2 className="font-semibold">{note.title}</h2>

          {note.content && (
            <p className="mt-1 line-clamp-2 text-sm text-muted-foreground">
              {note.content}
            </p>
          )}

          <p className="mt-2 text-xs text-muted-foreground tabular-nums">
            {formatDate(note.created_at)}
          </p>
        </CardContent>
      </Card>
    </Link>

### 7단계. 목록 페이지가 짧아진다

`app/notes/page.tsx`:

```tsx
// frontend/app/notes/page.tsx
import Link from "next/link";

import { NoteCard } from "@/components/note-card";
import { PageHeader } from "@/components/page-header";
import { buttonVariants } from "@/components/ui/button";
import { listNotes, type Note } from "@/lib/api";

export default async function NotesPage() {
  let notes: Note[] = [];
  let error: string | null = null;

  try {
    notes = await listNotes();
  } catch {
    error = "백엔드 서버에 연결할 수 없습니다.";
  }

  return (
    <main className="mx-auto max-w-2xl px-6 py-16">
      <PageHeader
        title={`메모장${notes.length > 0 ? ` (${notes.length})` : ""}`}
        description="메모를 눌러 자세히 보세요."
      >
        <Link href="/notes/new" className={buttonVariants()}>
          새 메모
        </Link>
      </PageHeader>

      {error ? (
        <p className="mt-8 rounded-md bg-destructive/10 px-4 py-3 text-sm text-destructive">
          {error}
        </p>
      ) : notes.length === 0 ? (
        <p className="mt-16 text-center text-sm text-muted-foreground">
          아직 메모가 없습니다. 오른쪽 위 &ldquo;새 메모&rdquo;를 눌러 보세요.
        </p>
      ) : (
        <div className="mt-8 flex flex-col gap-3">
          {notes.map((note) => (
            <NoteCard key={note.id} note={note} />
          ))}
        </div>
      )}
    </main>
  );
}
```

**`<PageHeader>` 안에 `<Link>` 를 넣은 게 `children` 입니다.**

### 8단계. ★ 클라이언트 경계 나누기

06편 과제였던 "지금 페이지 진하게"를 해결합니다.

`usePathname()` 은 훅이라 클라이언트 컴포넌트가 필요합니다.
**그렇다고 `layout.tsx` 에 `"use client"` 를 붙이면 안 됩니다.**
그러면 그 아래 전부가 클라이언트가 되어 버립니다.

**상단 바만 잘라냅니다.** `components/site-nav.tsx`:

```tsx
// frontend/components/site-nav.tsx
"use client";

import Link from "next/link";
import { usePathname } from "next/navigation";

const LINKS = [
  { href: "/notes", label: "목록" },
  { href: "/notes/new", label: "새 메모" },
];

export function SiteNav() {
  const pathname = usePathname();

  return (
    <header className="border-b">
      <nav className="mx-auto flex max-w-2xl items-center gap-6 px-6 py-4">
        <Link href="/notes" className="font-semibold">
          메모장
        </Link>

        <div className="flex gap-4 text-sm">
          {LINKS.map((link) => {
            const active = pathname === link.href;

            return (
              <Link
                key={link.href}
                href={link.href}
                className={
                  active
                    ? "font-medium text-foreground"
                    : "text-muted-foreground hover:text-foreground"
                }
              >
                {link.label}
              </Link>
            );
          })}
        </div>
      </nav>
    </header>
  );
}
```

`app/layout.tsx` 에서 갖다 씁니다:

```tsx
import { SiteNav } from "@/components/site-nav";

// ...
      <body className="min-h-full flex flex-col">
        <SiteNav />
        {children}
      </body>
```

**이 그림을 기억하세요.**

```
layout.tsx        (서버)  ← 여기에 "use client" 를 붙이면
 ├─ SiteNav       (클라)     아래 전부가 클라이언트가 됩니다
 └─ {children}
     └─ page.tsx  (서버)  ← 서버 컴포넌트로 남아야 하는 곳
```

**"use client"는 전염됩니다.** 그 컴포넌트가 import하는 것들도 전부 클라이언트가 됩니다.
그래서 **가능한 한 잎사귀(끝단)에 붙이는 것**이 원칙입니다.

### 9단계. shadcn 컴포넌트 직접 고치기

02편에서 "shadcn은 내 코드다"라고 했죠. 확인해 봅시다.

`components/ui/button.tsx` 를 열어 `variants` 안의 `variant` 목록을 찾으세요.

```tsx
variant: {
  default: "bg-primary text-primary-foreground hover:bg-primary/80",
  outline: "...",
  ...
}
```

여기에 한 줄 추가합니다:

```tsx
variant: {
  default: "...",
  soft: "bg-accent-wash text-primary hover:bg-muted",   // ← 추가
  outline: "...",
}
```

이제 **바로 쓸 수 있습니다:**

```tsx
<Button variant="soft">부드러운 버튼</Button>
```

TypeScript도 알아서 알아봅니다. `variant="sof"` 라고 오타를 내면 빨간 줄이 뜹니다.

> **일반 UI 라이브러리였다면** 이건 불가능하거나, CSS를 덮어쓰는 편법이 필요했습니다.
> 소스가 내 폴더에 있으니 그냥 고치면 됩니다.

## 흔한 에러

<details open>
<summary><b>1. <code>onSubmit is not a function</code></b></summary>

필수 props를 안 넘겼습니다.

```tsx
<NoteEditor />                          // ❌ onSubmit 없음
<NoteEditor onSubmit={handleCreate} />  // ✅
```

TypeScript를 쓰면 **넘기기 전에** 빨간 줄로 알려 줍니다. 편집기를 믿으세요.
</details>

<details>
<summary><b>2. <code>You're importing a component that needs useState</code> — layout에서</b></summary>

서버 컴포넌트(`layout.tsx`)가 훅을 쓰는 컴포넌트를 **직접** 그리려 했습니다.

`SiteNav` 파일 맨 위에 `"use client"` 가 있는지 확인하세요.
`layout.tsx` 에 붙이면 안 됩니다.
</details>

<details>
<summary><b>3. 수정 화면에 원래 내용이 안 채워진다</b></summary>

`defaultValues` 를 안 넘겼습니다.

```tsx
<NoteEditor defaultValues={{ title: note.title, content: note.content }} ... />
```
</details>

<details>
<summary><b>4. 다른 메모를 수정해도 이전 내용이 남아 있다</b></summary>

`useState(defaultValues.title)` 은 **처음 한 번만** 씁니다.
props가 바뀌어도 상태는 안 바뀝니다.

이 교재 구조에서는 페이지가 통째로 새로 그려져서 문제가 없지만,
같은 자리에서 대상만 바꾸는 경우엔 `key` 를 줘서 **새 컴포넌트로 취급**하게 합니다.

```tsx
<NoteEditor key={note.id} defaultValues={...} ... />
```

`key` 가 바뀌면 React는 완전히 새로 만듭니다. 알아 두면 언젠가 살려 줍니다.
</details>

<details>
<summary><b>5. <code>Objects are not valid as a React child</code></b></summary>

객체를 그대로 그리려 했습니다.

```tsx
<p>{note}</p>              // ❌ 객체
<p>{note.title}</p>        // ✅ 문자열
```
</details>

<details>
<summary><b>6. children 이 안 보인다</b></summary>

받아 놓고 **안 그렸습니다.** 컴포넌트 안에 `{children}` 을 넣었는지 확인하세요.
</details>

# 08. 상태 끌어올리기

> **난이도** ★★☆☆☆ · **소요 시간** 1~1.5시간
> **React에서 가장 자주 막히는 지점**입니다.
> "이 값을 어디에 둬야 하지?" 이 질문에 답하는 편입니다.

## 개념 먼저

### 문제 상황

검색창과 목록이 있습니다. 검색창에 글자를 치면 목록이 걸러져야 합니다.

```
  <NoteFilters />     ← 검색어를 입력받음
  <NoteList />        ← 검색어에 따라 달라져야 함
```

검색어를 `NoteFilters` 안에 `useState` 로 두면?

```tsx
function NoteFilters() {
  const [query, setQuery] = useState("");   // ❌ 여기 있으면
  ...
}

function NoteList() {
  // query 를 볼 수가 없습니다
}
```

**React의 데이터는 위에서 아래로만 흐릅니다.** 옆으로는 못 갑니다.

```
        부모
       ↙    ↘        ← 이 방향은 됩니다 (props)
   자식A    자식B
       ↛              ← 이 방향은 안 됩니다
```

### 해법: 공통 부모로 올린다

```
     NoteBrowser         ← query 를 여기 둔다
     ↙          ↘
NoteFilters   목록
 (query,       (query 로
  setQuery)     걸러서 그림)
```

**두 컴포넌트가 같이 필요한 값은, 둘의 가장 가까운 공통 부모에 둔다.**
이게 **상태 끌어올리기(lifting state up)** 입니다.

### 어디에 둘지 정하는 3단계

1. 이 값을 **읽는** 컴포넌트를 전부 찾는다
2. 이 값을 **바꾸는** 컴포넌트를 전부 찾는다
3. 그 전부를 포함하는 **가장 가까운 부모**에 둔다

> **너무 위로 올리지 마세요.** 최상위에 다 몰아넣으면, 관계없는 화면까지
> 전부 다시 그려지고 코드도 읽기 어려워집니다. **필요한 만큼만** 올립니다.

### ★ 계산할 수 있는 것은 상태로 두지 않는다

초보가 가장 많이 하는 실수입니다.

```tsx
const [notes, setNotes] = useState(allNotes);
const [query, setQuery] = useState("");
const [filtered, setFiltered] = useState(allNotes);   // ❌ 이러지 마세요
```

`filtered` 는 `notes` 와 `query` 만 있으면 **언제든 다시 만들 수 있습니다.**
상태로 두면 "검색어는 바뀌었는데 목록은 안 바뀌는" 어긋남이 반드시 생깁니다.

```tsx
const [notes, setNotes] = useState(allNotes);
const [query, setQuery] = useState("");
const filtered = notes.filter(...);        // ✅ 그냥 계산합니다
```

**컴포넌트는 다시 그려질 때마다 통째로 다시 실행됩니다.**
그러니 이 줄도 매번 다시 계산됩니다. 그게 정상이고, 그게 안전합니다.

| 상태로 둘 것 | 계산할 것 |
|---|---|
| 사용자가 입력한 검색어 | 검색 결과 |
| 고른 정렬 방식 | 정렬된 목록 |
| 열림/닫힘 | 목록 개수, 합계, "비었는지" |

### 2단계. 검색·정렬 UI — 상태가 없는 컴포넌트

`frontend/components/note-filters.tsx`:

```tsx
// frontend/components/note-filters.tsx
"use client";

import { Button } from "@/components/ui/button";
import { Input } from "@/components/ui/input";

export type SortKey = "newest" | "oldest" | "title";

const SORTS: { key: SortKey; label: string }[] = [
  { key: "newest", label: "최신순" },
  { key: "oldest", label: "오래된순" },
  { key: "title", label: "제목순" },
];

type Props = {
  query: string;
  sort: SortKey;
  onQueryChange: (value: string) => void;
  onSortChange: (value: SortKey) => void;
};

export function NoteFilters({
  query,
  sort,
  onQueryChange,
  onSortChange,
}: Props) {
  return (
    <div className="flex flex-col gap-3 sm:flex-row sm:items-center">
      <Input
        value={query}
        onChange={(e) => onQueryChange(e.target.value)}
        placeholder="제목·내용 검색"
        className="sm:max-w-xs"
      />

      <div className="flex gap-2">
        {SORTS.map((item) => (
          <Button
            key={item.key}
            type="button"
            size="sm"
            variant={sort === item.key ? "default" : "outline"}
            onClick={() => onSortChange(item.key)}
          >
            {item.label}
          </Button>
        ))}
      </div>
    </div>
  );
}
```

**★ 이 파일에 `useState` 가 하나도 없습니다.**

```tsx
query={query}                  // 값은 밖에서 받고
onChange={(e) => onQueryChange(e.target.value)}   // 바뀌면 밖에 알린다
```

04편에서 `<Input value onChange>` 로 했던 걸 **컴포넌트 단위로** 한 것입니다.
이런 컴포넌트를 **제어 컴포넌트**라고 부릅니다.

> **왜 이렇게 하나요?** 이 컴포넌트는 "어떻게 보일지"만 압니다.
> 검색어를 어디에 저장하는지, 그걸로 뭘 하는지는 **몰라도 됩니다.**
> 그래서 다른 화면에서도 그대로 쓸 수 있습니다.

#### 유니온 타입 — 오타를 막는 장치

```tsx
export type SortKey = "newest" | "oldest" | "title";
```

"이 셋 중 하나"라는 뜻입니다. `"newst"` 라고 오타를 내는 순간 편집기가 잡아 줍니다.
문자열을 그냥 `string` 으로 두면 오타가 그대로 지나갑니다.

### 3단계. ★ 상태를 가진 부모

`frontend/components/note-browser.tsx`:

```tsx
// frontend/components/note-browser.tsx
"use client";

import { useState } from "react";

import { NoteCard } from "@/components/note-card";
import { NoteFilters, type SortKey } from "@/components/note-filters";
import { type Note } from "@/lib/api";

type Props = {
  notes: Note[];
};

export function NoteBrowser({ notes }: Props) {
  const [query, setQuery] = useState("");
  const [sort, setSort] = useState<SortKey>("newest");

  const keyword = query.trim().toLowerCase();

  const visible = notes
    .filter((note) => {
      if (keyword === "") return true;
      return (
        note.title.toLowerCase().includes(keyword) ||
        note.content.toLowerCase().includes(keyword)
      );
    })
    .sort((a, b) => {
      if (sort === "title") return a.title.localeCompare(b.title);
      if (sort === "oldest") return a.created_at.localeCompare(b.created_at);
      return b.created_at.localeCompare(a.created_at); // newest
    });

  return (
    <div className="flex flex-col gap-6">
      <NoteFilters
        query={query}
        sort={sort}
        onQueryChange={setQuery}
        onSortChange={setSort}
      />

      {notes.length === 0 ? (
        <p className="py-12 text-center text-sm text-muted-foreground">
          아직 메모가 없습니다. 오른쪽 위 &ldquo;새 메모&rdquo;를 눌러 보세요.
        </p>
      ) : visible.length === 0 ? (
        <p className="py-12 text-center text-sm text-muted-foreground">
          &ldquo;{query}&rdquo; 에 맞는 메모가 없습니다.
        </p>
      ) : (
        <>
          <p className="text-xs text-muted-foreground tabular-nums">
            {visible.length}개 / 전체 {notes.length}개
          </p>

          <div className="flex flex-col gap-3">
            {visible.map((note) => (
              <NoteCard key={note.id} note={note} />
            ))}
          </div>
        </>
      )}
    </div>
  );
}
```

**하나씩 봅시다.**

#### `onQueryChange={setQuery}` — 이게 되나요?

됩니다. `setQuery` 자체가 **"문자열을 받는 함수"** 니까요.

```tsx
onQueryChange={(v) => setQuery(v)}   // 이렇게 써도 되지만
onQueryChange={setQuery}             // 똑같습니다. 더 짧죠.
```

#### `.filter()` 다음에 `.sort()` 를 이어 쓰는 이유

```tsx
notes.filter(...).sort(...)
```

**★ `.sort()` 는 원본 배열을 바꿔 버립니다.** (`.filter()` 나 `.map()` 과 다릅니다.)

```tsx
notes.sort(...)              // ❌ props 로 받은 배열을 망가뜨립니다
notes.filter(...).sort(...)  // ✅ filter 가 새 배열을 만들어 줌
```

`filter` 가 이미 **새 배열**을 만들었으니 그걸 정렬하는 건 안전합니다.
검색어가 없어도 `filter` 는 새 배열을 만들기 때문에(전부 `true` 를 돌려주므로) 문제없습니다.

#### 날짜 비교를 문자열로?

```tsx
a.created_at.localeCompare(b.created_at)
```

`created_at` 은 `"2026-07-18T14:03:22"` 같은 문자열입니다.
이 형식은 **글자 순서대로 비교해도 날짜 순서와 같습니다.**
(년-월-일 순이고 자릿수가 고정이라서요.) 그래서 `new Date()` 로 바꿀 필요가 없습니다.

#### 빈 상태를 **두 가지**로 나눈 이유

```tsx
{notes.length === 0 ? (
  "아직 메모가 없습니다"          // 진짜 아무것도 없음
) : visible.length === 0 ? (
  "'회의' 에 맞는 메모가 없습니다"  // 있는데 검색에 안 걸림
) : ( ... )}
```

이 둘을 같은 문구로 처리하면 사용자가 헷갈립니다.
**"내 메모가 다 날아갔나?"** 하고 놀라죠. 상황에 맞는 안내가 필요합니다.

#### `<>` 는 뭔가요?

```tsx
<>
  <p>...</p>
  <div>...</div>
</>
```

**Fragment** 입니다. JSX는 하나의 태그만 돌려줄 수 있는데,
불필요한 `<div>` 를 만들기 싫을 때 이 빈 태그로 감쌉니다.

### 4단계. 페이지 연결

`app/notes/page.tsx`:

```tsx
// frontend/app/notes/page.tsx
import Link from "next/link";

import { NoteBrowser } from "@/components/note-browser";
import { PageHeader } from "@/components/page-header";
import { buttonVariants } from "@/components/ui/button";
import { listNotes, type Note } from "@/lib/api";

export default async function NotesPage() {
  let notes: Note[] = [];
  let error: string | null = null;

  try {
    notes = await listNotes();
  } catch {
    error = "백엔드 서버에 연결할 수 없습니다.";
  }

  return (
    <main className="mx-auto max-w-2xl px-6 py-16">
      <PageHeader
        title={`메모장${notes.length > 0 ? ` (${notes.length})` : ""}`}
        description="검색하고 정렬할 수 있습니다."
      >
        <Link href="/notes/new" className={buttonVariants()}>
          새 메모
        </Link>
      </PageHeader>

      {error ? (
        <p className="mt-8 rounded-md bg-destructive/10 px-4 py-3 text-sm text-destructive">
          {error}
        </p>
      ) : (
        <div className="mt-8">
          <NoteBrowser notes={notes} />
        </div>
      )}
    </main>
  );
}
```

**서버 → 클라이언트로 데이터가 넘어가는 지점입니다.**

```
page.tsx (서버)  ──notes──▶  NoteBrowser (클라)  ──▶  NoteFilters
   fetch                      useState              NoteCard
```

> **넘길 수 있는 것과 없는 것**
> 서버 컴포넌트에서 클라이언트 컴포넌트로는 **JSON으로 표현되는 것만** 넘길 수 있습니다.
> 문자열·숫자·배열·객체는 되고, **함수·클래스 인스턴스는 안 됩니다.**
> (`Date` 객체는 되지만, 우리는 이미 문자열로 받고 있죠.)

## 흔한 에러

<details open>
<summary><b>1. 검색창에 글자가 안 써진다</b></summary>

`onQueryChange` 를 부모에서 안 넘겼거나, `NoteFilters` 안에서 안 부르고 있습니다.

```tsx
<NoteFilters query={query} onQueryChange={setQuery} ... />   // 부모
<Input value={query} onChange={(e) => onQueryChange(e.target.value)} />  // 자식
```
</details>

<details>
<summary><b>2. 정렬했더니 다른 화면의 목록 순서도 바뀐다</b></summary>

`notes.sort()` 를 `filter` 없이 바로 불렀습니다.
`sort` 는 **원본을 바꿉니다.** `notes.filter(...).sort(...)` 또는
`[...notes].sort(...)` 처럼 새 배열을 만들어 정렬하세요.
</details>

<details>
<summary><b>3. 검색은 되는데 정렬이 안 먹는다 (혹은 반대)</b></summary>

`visible` 을 `useState` 에 넣어 두고 한쪽에서만 갱신하고 있을 가능성이 큽니다.
**계산으로 바꾸세요.** 상태는 `query` 와 `sort` 두 개면 충분합니다.
</details>

<details>
<summary><b>4. <code>Type '"newst"' is not assignable to type 'SortKey'</code></b></summary>

**오타를 타입스크립트가 잡아 준 것입니다.** 고마운 에러입니다.
`"newest"` / `"oldest"` / `"title"` 중 하나여야 합니다.
</details>

<details>
<summary><b>5. <code>Functions cannot be passed directly to Client Components</code></b></summary>

**서버 컴포넌트**에서 클라이언트 컴포넌트로 함수를 넘겼습니다.

```tsx
// page.tsx (서버)
<NoteBrowser notes={notes} onSelect={() => {}} />   // ❌
```

서버 → 클라이언트로는 데이터만 넘어갑니다. 함수가 필요하면
**클라이언트 컴포넌트 안에서** 만드세요.
</details>

<details>
<summary><b>6. 검색할 때마다 화면이 버벅인다</b></summary>

메모가 수천 개라면 매번 전부 거르는 게 부담이 됩니다.
지금 규모(수십 개)에서는 **문제가 안 됩니다.** 미리 최적화하지 마세요.

정말 많아지면 두 가지 길이 있습니다:
- `useMemo` 로 계산 결과를 재사용
- **서버에서 걸러 오기** ← 11편에서 이 방식으로 다시 만듭니다
</details>

## 개념 먼저

### 지금 뭐가 문제인가

08편까지의 페이지는 이렇게 생겼습니다.

```tsx
let notes: Note[] = [];
let error: string | null = null;

try {
  notes = await listNotes();
} catch {
  error = "백엔드 서버에 연결할 수 없습니다.";
}
```

문제 세 가지:

1. **페이지마다 똑같은 `try/catch` 를 반복**해야 합니다
2. 데이터를 기다리는 동안 **아무것도 안 보입니다** (하얀 화면)
3. `catch` 를 빠뜨린 페이지는 **화면이 통째로 깨집니다**

### Next.js의 답: 파일 이름이 곧 약속

폴더에 정해진 이름의 파일을 두면, Next.js가 **알아서** 씁니다.

```
app/notes/
├─ page.tsx          잘 됐을 때
├─ loading.tsx       기다리는 중
├─ error.tsx         실패했을 때
└─ [id]/
    ├─ page.tsx
    ├─ loading.tsx   상세 페이지용 로딩 (더 가까운 것이 이깁니다)
    └─ not-found.tsx 없을 때
```

**우리가 부르는 코드는 없습니다.** 파일을 두기만 하면 됩니다.

```
       요청
        │
        ▼
   loading.tsx 를 먼저 보여 줌
        │
        ├── 성공 → page.tsx 로 교체
        ├── 실패 → error.tsx
        └── notFound() → not-found.tsx
```

### 오류를 두 갈래로 나눠 생각하기

| 상황 | 누가 판단 | 보여 줄 화면 |
|---|---|---|
| **없는 메모** (404) | **내가** — "이건 없는 거네" | `not-found.tsx` |
| 서버 죽음, 네트워크 끊김, 버그 | **Next.js** — "예외가 올라왔네" | `error.tsx` |

404는 **정상적인 상황**입니다. 주소를 잘못 친 것뿐이죠.
그래서 우리가 `notFound()` 로 **명시적으로** 알려 줍니다.

나머지는 **예상 못 한 일**입니다. 그냥 던지면 Next.js가 받습니다.

export default function NotesError({ error, reset }: Props) {

**규칙 세 가지:**

#### ① `"use client"` 가 **반드시** 필요합니다

"다시 시도" 버튼을 눌러야 하니까요. 이건 선택이 아니라 필수입니다.

#### ② props 두 개는 Next.js가 넣어 줍니다

```tsx
type Props = {
  error: Error & { digest?: string };
  reset: () => void;
};
```

- `error` — 무슨 일이 났는지
- `reset` — 부르면 **이 구간을 다시 그려 봅니다** (재시도)

> **`digest` 는 뭔가요?** 프로덕션 빌드에서는 보안을 위해 오류 메시지가 지워집니다.
> 대신 서버 로그와 대조할 수 있는 짧은 식별자가 들어옵니다.

#### ③ `error.message` 를 보여 줄지는 신중히

개발 중엔 편하지만, 실제 서비스에서는 **내부 정보가 새어 나갈 수 있습니다.**
이 교재에서는 학습을 위해 보여 줍니다.

### 7단계. API에 실습용 옵션 추가

`lib/api.ts` 를 고칩니다.

```ts
type DemoOptions = {
  delay?: number;
  fail?: boolean;
};

function demoQuery({ delay, fail }: DemoOptions = {}): string {
  const params = new URLSearchParams();
  if (delay) params.set("delay", String(delay));
  if (fail) params.set("fail", "1");

  const q = params.toString();
  return q ? `?${q}` : "";
}

export async function listNotes(options: DemoOptions = {}): Promise<Note[]> {
  const res = await fetch(`${API_URL}/notes${demoQuery(options)}`, {
    cache: "no-store",
  });
  if (!res.ok) throw new Error(await readError(res));
  return res.json();
}

export async function getNote(id: number, delay = 0): Promise<Note> {
  const res = await fetch(
    `${API_URL}/notes/${id}${delay ? `?delay=${delay}` : ""}`,
    { cache: "no-store" }
  );

  if (res.status === 404) throw new NotFoundError(await readError(res));
  if (!res.ok) throw new Error(await readError(res));

  return res.json();
}
```

**`URLSearchParams`** 는 주소의 `?a=1&b=2` 부분을 안전하게 만들어 주는 도구입니다.
문자열을 직접 이어 붙이면 특수문자(한글, 공백, `&`)에서 깨집니다.
**11편에서 본격적으로 씁니다.**

**비교해 보세요.**

```tsx

let error = null;
try {                                 // 끝.

**페이지는 "잘 됐을 때"만 신경 쓰면 됩니다.** 실패는 `error.tsx` 담당입니다.

#### `searchParams` — 주소의 `?` 뒤를 읽기

```tsx
type Props = {
  searchParams: Promise<{ delay?: string; fail?: string }>;
};

const { delay, fail } = await searchParams;
```

`params` 와 마찬가지로 **Promise 입니다. `await` 하세요.**
그리고 **값은 항상 문자열**입니다. `?delay=2` 의 `2` 도 `"2"` 죠.
그래서 `Number(delay ?? 0)` 으로 바꿉니다.

### 9단계. 상세 페이지의 두 갈래 처리

`app/notes/[id]/page.tsx` 의 앞부분:

```tsx
type Props = {
  params: Promise<{ id: string }>;
  searchParams: Promise<{ delay?: string }>;
};

export default async function NoteDetailPage({ params, searchParams }: Props) {
  const { id } = await params;
  const { delay } = await searchParams;

  let note;
  try {
    note = await getNote(Number(id), Number(delay ?? 0));
  } catch (err) {
    if (err instanceof NotFoundError) notFound();
    throw err;     // ★ 404 가 아니면 다시 던진다 → error.tsx 가 받는다
  }
  // ...
```

**`throw err;` 한 줄이 중요합니다.**

```tsx
} catch (err) {
  if (err instanceof NotFoundError) notFound();
  // throw err 를 빠뜨리면?
}
// → note 가 undefined 인 채로 아래로 내려가서 "Cannot read properties of undefined"
```

**`catch` 로 잡았으면 처리하거나 다시 던져야 합니다.** 그냥 삼키면 안 됩니다.

## 실행 & 확인

**★ 이번 편은 "직접 부숴 보는" 것이 핵심입니다.**

| 주소 | 봐야 할 것 |
|---|---|
| `/notes?delay=3` | **3초 동안 회색 뼈대**가 보이다가 목록으로 바뀜 |
| `/notes/1?delay=3` | 상세 페이지용 뼈대 (목록과 모양이 다름) |
| `/notes?fail=1` | **ERROR 화면** + "일부러 낸 서버 오류입니다." |
| `/notes?fail=1` → "다시 시도" | 다시 시도하고, 또 실패함 (`fail=1` 이 그대로니까) |
| `/notes/999` | **404 화면** (에러 화면이 아님!) |
| **백엔드를 끄고** `/notes` | ERROR 화면 + 연결 실패 메시지 |
| 백엔드를 켜고 → "다시 시도" | **정상 복구** ← 이게 `reset()` 의 진가입니다 |

- [ ] 로딩 화면의 회색 덩어리 위치가 실제 화면과 **비슷하다**
- [ ] 404와 ERROR가 **다른 화면**이다
- [ ] 백엔드를 켠 뒤 "다시 시도"로 복구된다

전체 코드: [`reference/09-loading-error/`](../reference/09-loading-error/)

<details open>
<summary><b>1. 로딩 화면이 안 보인다</b></summary>

- **너무 빨라서** 못 본 것일 수 있습니다. `?delay=3` 을 붙여 보세요.
- 파일 이름이 정확히 `loading.tsx` 인가요? 위치는 `page.tsx` 와 **같은 폴더**입니다.
- `export default` 를 했나요?
</details>

<details>
<summary><b>2. <code>error.tsx</code> 가 안 뜨고 개발용 오류 화면이 뜬다</b></summary>

**개발 모드에서는 원래 그렇습니다.** Next.js가 오류 상세를 먼저 보여 줍니다.
그 화면 구석의 **×** 를 누르면 우리가 만든 `error.tsx` 가 나옵니다.
`npm run build && npm start` 로 돌리면 바로 `error.tsx` 가 보입니다.
</details>

<details>
<summary><b>3. <code>error.tsx</code> 에서 <code>useEffect is not defined</code> 계열 오류</b></summary>

`"use client"` 를 빠뜨렸습니다. `error.tsx` 는 **항상** 클라이언트 컴포넌트입니다.
</details>

<details>
<summary><b>4. 없는 메모인데 404가 아니라 ERROR 화면이 뜬다</b></summary>

- `getNote` 에서 404를 `NotFoundError` 로 던지고 있나요?
- `catch` 안에서 `notFound()` 를 부르고 있나요?
- **`notFound()` 를 `try` 블록 안에서 부르면 안 됩니다.**
  내부적으로 예외를 던지는데 내 `catch` 가 그걸 잡아 버립니다.

## 조금 더: `error.tsx` 가 못 잡는 것

| 오류 위치 | `error.tsx` 가 잡나? |
|---|---|
| 서버 컴포넌트에서 데이터 가져오기 실패 | ✅ |
| 클라이언트 컴포넌트 렌더링 중 오류 | ✅ |
| **이벤트 핸들러 안의 오류** (버튼 클릭 등) | ❌ |
| `layout.tsx` 자체의 오류 | ❌ (같은 층은 못 잡음) |

**이벤트 핸들러는 직접 `try/catch` 해야 합니다.**
그래서 05편의 `handleDelete` 에는 여전히 `try/catch` 가 있는 것입니다.

```tsx
async function handleDelete() {
  try {
    await deleteNote(id);
  } catch (err) {
    setError(...);      // ← 여긴 우리가 직접
  }
}
```

`layout.tsx` 의 오류까지 잡으려면 **`app/global-error.tsx`** 를 만듭니다.
자기 `<html>` 과 `<body>` 를 직접 그려야 하는 특별한 파일입니다.
지금은 "그런 게 있다" 정도만 알아 두세요.

### 알아 두면 좋은 것: 404인데 상태 코드가 200

`loading.tsx` 를 둔 뒤로 `/notes/999` 를 열면 **화면은 404인데 HTTP 상태는 200**입니다.

이유는 이렇습니다. 로딩 화면을 먼저 보내려면 응답을 **미리 시작**해야 하는데,
HTTP 상태 코드는 응답의 맨 앞에 한 번만 보낼 수 있습니다.
그러니까 `notFound()` 가 불린 시점엔 **이미 200을 보내 버린 뒤**인 것이죠.

이걸 **스트리밍**이라고 합니다. 사용자 경험에는 문제가 없지만,
검색엔진에게 "이 주소는 없다"고 알려야 한다면 신경 써야 합니다.
그럴 땐 `loading.tsx` 대신 `<Suspense>` 로 **느린 부분만** 감싸면 됩니다
(아래 ★★★ 문제 3).

### ★★★ 문제 3 — 부분 로딩 (Suspense)

지금은 **페이지 전체**가 로딩 화면으로 바뀝니다.
제목은 바로 보여 주고, **느린 목록만** 뼈대로 두는 게 더 좋겠죠.

`<Suspense>` 를 찾아보고 적용해 보세요.

```tsx
import { Suspense } from "react";

export default async function NotesPage() {
  return (
    <main>
      <PageHeader title="메모장" />        {/* 바로 보임 */}

      <Suspense fallback={<NotesSkeleton />}>
        <NoteList />                       {/* 준비되면 채워짐 */}
      </Suspense>
    </main>
  );
}
```

> 핵심: **`await` 를 하는 부분을 별도의 async 컴포넌트로 빼야** 합니다.
> 페이지에서 `await` 하면 페이지 전체가 기다리게 되니까요.
>
> 이 방식을 **스트리밍**이라고 합니다. 느린 부분이 여러 개일 때 특히 좋습니다.

# 10. 폼 검증 제대로

> **난이도** ★★★☆☆ · **소요 시간** 1.5~2시간
> 지금 폼은 `title.trim() !== ""` 하나로 버티고 있습니다.
> 규칙이 늘어나면 `useState` 지옥이 됩니다. 도구를 씁니다.

## 이번에 바꾸는 것

화면은 거의 그대로인데, **속이 완전히 달라집니다.**

```
┌────────────────────────────────────────────┐
│  제목                             0 / 100  │
│  ┌──────────────────────────────────────┐  │
│  │                                      │  │

│                                            │

│  │                                      │  │
│  └──────────────────────────────────────┘  │
│                                            │
│  [ 저장 ]  [ 취소 ]                         │
└────────────────────────────────────────────┘
```

**`useState` 가 전부 사라집니다.**

## 개념 먼저

### 지금 방식의 한계

07편의 폼에는 규칙이 하나뿐이었습니다.

```tsx
<Button disabled={title.trim() === "" || saving}>
```

여기에 요구사항을 더해 봅시다.

- 제목은 100자까지
- 공백만 입력하면 안 됨
- 내용은 2000자까지
- **어떤 칸이 왜 틀렸는지** 사용자에게 알려 주기

`useState` 로 하려면 칸마다 값·오류·터치 여부를 들고 있어야 합니다.
칸이 5개면 상태가 15개가 됩니다. 그래서 도구를 씁니다.

### 두 가지 도구, 각자의 일

```
   zod                        react-hook-form
   "규칙을 적는다"               "폼을 관리한다"
   ─────────────               ─────────────────
   제목은 1~100자                입력값 들고 있기
   내용은 2000자까지              언제 검사할지
   이메일 형식이어야              오류 메시지 보관
                               제출 중인지
        └──── zodResolver ────┘
              (둘을 이어 줌)
```

**둘은 서로 몰라도 됩니다.** `zodResolver` 가 통역해 줍니다.

### zod — 규칙을 "값"으로 적는다

```ts
import { z } from "zod";

const noteSchema = z.object({
  title: z.string().trim().min(1, "제목을 입력해 주세요.").max(100, "..."),
  content: z.string().trim().max(2000, "..."),
});
```

점을 이어 붙여 규칙을 쌓습니다. `.min(1, "메시지")` — 두 번째 인자가 **실패했을 때 보여 줄 말**입니다.

### ★ 규칙에서 타입이 나온다

```ts
export type NoteValues = z.infer<typeof noteSchema>;
// → { title: string; content: string }
```

**타입을 손으로 안 적습니다.** 규칙을 고치면 타입이 따라 바뀝니다.
그래서 규칙과 타입이 **절대 어긋날 수 없습니다.**

> 07편에서는 `type NoteValues` 를 직접 적었죠. 그때는 규칙을 고쳐도
> 타입이 안 따라왔습니다. 이제 한 곳만 고치면 됩니다.

## 따라 만들기

### 1단계. 설치

```powershell
cd D:\Work\클로드_정리\temp\practice
Copy-Item 09-loading-error 10-form-validation -Recurse
cd 10-form-validation\frontend

npm install react-hook-form zod @hookform/resolvers
```

| 패키지 | 역할 |
|---|---|
| `zod` | 규칙 |
| `react-hook-form` | 폼 관리 |
| `@hookform/resolvers` | 둘을 이어 주는 통역 |

### 2단계. 규칙 파일

`frontend/lib/schemas.ts`:

```ts
// frontend/lib/schemas.ts
import { z } from "zod";

export const noteSchema = z.object({
  title: z
    .string()
    .trim()
    .min(1, "제목을 입력해 주세요.")
    .max(100, "제목은 100자까지 쓸 수 있습니다."),

  content: z
    .string()
    .trim()
    .max(2000, "내용은 2000자까지 쓸 수 있습니다."),
});

export type NoteValues = z.infer<typeof noteSchema>;
```

**`.trim()` 을 `.min(1)` 보다 먼저** 씁니다.
그래야 `"   "` (공백만)이 `""` 로 다듬어진 뒤 검사되어 걸립니다.

> **백엔드에도 같은 규칙이 있습니다** (`Field(..., min_length=1, max_length=100)`).
> 중복 같지만 **둘 다 필요합니다.**
>
> - 프론트 검증 = **친절** (바로 알려 줌)
> - 백엔드 검증 = **안전** (브라우저는 얼마든지 우회할 수 있음)
>
> 프론트 검증만 믿으면, `curl` 로 아무 값이나 보내는 사람을 막을 수 없습니다.

### 3단계. ★ 폼 다시 만들기

`frontend/components/note-editor.tsx` 를 전부 지우고:

```tsx
// frontend/components/note-editor.tsx
"use client";

import { zodResolver } from "@hookform/resolvers/zod";
import { useForm } from "react-hook-form";

import { Button } from "@/components/ui/button";
import { Card, CardContent } from "@/components/ui/card";
import { Input } from "@/components/ui/input";
import { Label } from "@/components/ui/label";
import { Textarea } from "@/components/ui/textarea";
import { noteSchema, type NoteValues } from "@/lib/schemas";

type Props = {
  defaultValues?: NoteValues;
  submitLabel?: string;
  onSubmit: (values: NoteValues) => Promise<void>;
  onCancel?: () => void;
};

export function NoteEditor({
  defaultValues = { title: "", content: "" },
  submitLabel = "저장",
  onSubmit,
  onCancel,
}: Props) {
  const {
    register,
    handleSubmit,
    watch,
    setError,
    formState: { errors, isSubmitting },
  } = useForm<NoteValues>({
    resolver: zodResolver(noteSchema),
    defaultValues,
    mode: "onBlur",
  });

  const title = watch("title") ?? "";

  async function submit(values: NoteValues) {
    try {
      await onSubmit(values);
    } catch (err) {
      const message =
        err instanceof Error ? err.message : "저장하지 못했습니다.";

      if (message.includes("제목") || message.toLowerCase().includes("title")) {
        setError("title", { message });
      } else {
        setError("root", { message });
      }
    }
  }

  return (
    <Card>
      <CardContent className="pt-6">
        <form onSubmit={handleSubmit(submit)} className="flex flex-col gap-4">
          <div className="flex flex-col gap-2">
            <div className="flex items-baseline justify-between">
              <Label htmlFor="title">제목</Label>
              <span
                className={
                  title.length > 100
                    ? "text-xs tabular-nums text-destructive"
                    : "text-xs tabular-nums text-muted-foreground"
                }
              >
                {title.length} / 100
              </span>
            </div>

            <Input
              id="title"
              placeholder="오늘 할 일"
              aria-invalid={errors.title ? true : undefined}
              {...register("title")}
            />

            {errors.title && (
              <p className="text-sm text-destructive">{errors.title.message}</p>
            )}
          </div>

          <div className="flex flex-col gap-2">
            <Label htmlFor="content">내용</Label>
            <Textarea
              id="content"
              rows={6}
              placeholder="자세한 내용 (비워도 됩니다)"
              aria-invalid={errors.content ? true : undefined}
              {...register("content")}
            />

            {errors.content && (
              <p className="text-sm text-destructive">
                {errors.content.message}
              </p>
            )}
          </div>

          {errors.root && (
            <p className="rounded-md bg-destructive/10 px-3 py-2 text-sm text-destructive">
              {errors.root.message}
            </p>
          )}

          <div className="flex gap-2">
            <Button type="submit" disabled={isSubmitting}>
              {isSubmitting ? "저장 중..." : submitLabel}
            </Button>

            {onCancel && (
              <Button
                type="button"
                variant="outline"
                onClick={onCancel}
                disabled={isSubmitting}
              >
                취소
              </Button>
            )}
          </div>
        </form>
      </CardContent>
    </Card>
  );
}
```

### 4단계. 코드 뜯어보기

#### `{...register("title")}` — 한 줄이 다섯 가지를 한다

```tsx
<Input {...register("title")} />
```

이 한 줄이 `value`, `onChange`, `onBlur`, `name`, `ref` 를 전부 붙여 줍니다.

07편에서 이렇게 썼던 것과 비교해 보세요:

```tsx
<Input value={title} onChange={(e) => setTitle(e.target.value)} />
```

> **`...` 은 뭔가요?** 객체를 펼쳐서 속성으로 넘기는 문법입니다.
> `register("title")` 이 `{name, onChange, onBlur, ref}` 를 돌려주는데,
> `{...}` 로 펼치면 각각이 속성이 됩니다.

#### `handleSubmit(submit)` — 검증을 통과했을 때만 부른다

```tsx
<form onSubmit={handleSubmit(submit)}>
```

`handleSubmit` 이 알아서:

1. `event.preventDefault()` ← 04편에서 손으로 했던 것
2. zod 규칙으로 검사
3. **통과하면** 내 `submit(values)` 를 부름
4. 실패하면 `errors` 를 채우고 **내 함수는 안 부름**

`submit` 안에서는 **값이 이미 검증된 것이 보장**됩니다.

#### `formState` — 폼이 알아서 챙기는 것들

| 이름 | 뜻 |
|---|---|
| `errors.title.message` | 제목 칸의 오류 메시지 |
| `isSubmitting` | 제출 중인가 (버튼 잠그기) |
| `isDirty` | 뭔가 고쳤는가 |
| `isValid` | 지금 전부 유효한가 |

**`useState`를 하나도 안 썼는데** 이게 다 됩니다.
07편에서 `saving`, `error` 를 손으로 관리했던 걸 떠올려 보세요.

#### `mode: "onBlur"` — 언제 검사할까

| 값 | 언제 | 느낌 |
|---|---|---|
| `"onSubmit"` (기본) | 제출할 때만 | 늦게 알려 줌 |
| **`"onBlur"`** | 칸을 벗어날 때 | **적당함** |
| `"onChange"` | 글자 칠 때마다 | 다 치기도 전에 빨간 글씨 → 짜증 |

> 첫 글자를 치자마자 "제목을 입력해 주세요"가 뜨면 사용자는 혼란스럽습니다.
> **다 쓰고 나갔을 때** 알려 주는 게 자연스럽습니다.

#### `watch("title")` — 지금 값 엿보기

```tsx
const title = watch("title") ?? "";
// ...
{title.length} / 100
```

글자 수를 세려면 지금 값이 필요합니다. `watch` 가 그걸 줍니다.

> **주의**: `watch` 를 쓰면 그 값이 바뀔 때마다 컴포넌트가 다시 그려집니다.
> 글자 수 표시처럼 **정말 필요할 때만** 쓰세요.
> `register` 만 쓰는 칸은 아무리 타이핑해도 다시 그려지지 않습니다.
> (react-hook-form이 빠른 이유입니다.)

#### ★ `setError` — 서버가 거절한 이유 붙이기

프론트 검증을 통과해도 **서버가 거절할 수 있습니다.**
(중복된 제목, 권한 없음, 백엔드 규칙이 더 엄격함...)

```tsx
try {
  await onSubmit(values);
} catch (err) {
  const message = err instanceof Error ? err.message : "저장하지 못했습니다.";

  if (message.includes("제목")) {
    setError("title", { message });    // 제목 칸 아래에 표시
  } else {
    setError("root", { message });     // 폼 전체 오류로 표시
  }
}
```

**`"root"`** 는 "특정 칸의 문제가 아님"을 뜻하는 특별한 이름입니다.
서버 연결 실패 같은 게 여기 들어갑니다.

> 지금은 메시지에 "제목"이 들어 있는지로 대충 판단합니다.
> 제대로 하려면 백엔드가 `{"field": "title", "message": "..."}` 처럼
> **어느 칸인지 알려 주는 형식**으로 응답해야 합니다.
> 실무에서는 그렇게 약속을 정합니다.

### 5단계. 나머지 두 파일 손보기

`NoteValues` 의 출처가 바뀌었으니 import를 고칩니다.

`components/create-form.tsx`:

```tsx
import { NoteEditor } from "@/components/note-editor";
import { createNote } from "@/lib/api";
import { type NoteValues } from "@/lib/schemas";     // ← 여기서 가져옵니다
```

`components/edit-form.tsx` 도 똑같이 고칩니다.

**그리고 두 파일에서 `try/catch` 를 지웁니다.**
실패하면 그냥 예외가 올라가고, `NoteEditor` 가 받아서 처리하니까요.

## 실행 & 확인

- [ ] 제목을 비운 채 **다른 칸을 클릭** → "제목을 입력해 주세요."
- [ ] 제목에 **공백만** 입력 → 같은 메시지 (`.trim()` 이 일합니다)
- [ ] 제목을 101자 이상 → 글자 수가 **빨개지고** 오류 메시지
- [ ] 제목을 채우면 오류 메시지가 **사라진다**
- [ ] 저장 중에는 버튼이 "저장 중..." 으로 바뀌고 잠긴다
- [ ] **백엔드를 끄고** 저장 → 폼 아래에 서버 오류 메시지
- [ ] 수정 화면에 원래 내용이 채워져 있다

**★ 우회 시험**: 브라우저 콘솔에서 백엔드에 직접 빈 제목을 보내 보세요.

```js
await fetch("http://127.0.0.1:8000/notes", {
  method: "POST",
  headers: { "Content-Type": "application/json" },
  body: JSON.stringify({ title: "" }),
}).then((r) => r.status);
// → 422
```

**프론트 검증을 건너뛰어도 백엔드가 막습니다.** 이래야 안전한 것입니다.

## 흔한 에러

<details open>
<summary><b>1. 입력칸에 글자가 안 써진다</b></summary>

`{...register("title")}` 과 `value={...}` 를 **같이** 썼을 가능성이 큽니다.
둘 중 하나만 씁니다. react-hook-form을 쓰면 `value` 는 필요 없습니다.
</details>

<details>
<summary><b>2. 검증이 아예 안 걸린다</b></summary>

- `resolver: zodResolver(noteSchema)` 를 빠뜨렸나요?
- `onSubmit={handleSubmit(submit)}` 인가요? `onSubmit={submit}` 이면 검증을 건너뜁니다.
- `register("titel")` 처럼 **이름 오타**는 아닌가요? 스키마의 키와 정확히 같아야 합니다.
</details>

<details>
<summary><b>3. <code>Property 'title' does not exist on type ...</code></b></summary>

`useForm<NoteValues>()` 에 타입을 안 넣었습니다.
넣으면 `register("...")` 에서 **필드 이름까지 자동완성**됩니다.
</details>

<details>
<summary><b>4. <code>Cannot find module '@hookform/resolvers/zod'</code></b></summary>

```powershell
npm install @hookform/resolvers
```

`react-hook-form` 과 `zod` 는 깔았는데 통역기를 안 깐 경우입니다.
</details>

<details>
<summary><b>5. 오류 메시지가 영어로 나온다</b></summary>

`.min(1)` 처럼 **메시지를 안 준** 규칙입니다. zod 기본 메시지가 영어입니다.

```ts
.min(1, "제목을 입력해 주세요.")   // ← 두 번째 인자를 꼭 주세요
```
</details>

<details>
<summary><b>6. 글자 수가 안 올라간다</b></summary>

`watch("title")` 을 안 썼거나, 다른 이름을 감시하고 있습니다.
</details>

<details>
<summary><b>7. 저장에 성공했는데도 오류 메시지가 남아 있다</b></summary>

`setError` 로 넣은 오류는 **다음 검증 때** 지워집니다.
바로 지우고 싶다면 `clearErrors()` 를 부르세요.
</details>

## 스스로 해보기

### ★ 문제 1 — 내용 글자 수

내용 칸에도 `0 / 2000` 표시를 넣으세요.

> 힌트: `watch("content")`. 제목과 똑같은 방식입니다.
> **같은 코드를 두 번 쓰게 되면** 07편에서 배운 대로 컴포넌트로 빼세요.

### ★★ 문제 2 — 저장 안 하고 나가려 할 때 경고

수정 중에 "취소"를 누르면, **고친 게 있을 때만** 확인창을 띄우세요.

> 힌트: `formState.isDirty` 가 "뭔가 고쳤는가"를 알려 줍니다.
>
> ```tsx
> function handleCancel() {
>   if (isDirty && !confirm("저장하지 않은 변경사항이 있습니다. 나갈까요?")) return;
>   onCancel();
> }
> ```

### ★★★ 문제 3 — 백엔드가 어느 칸인지 알려 주게 만들기

지금은 오류 메시지에 "제목"이 들어 있는지로 **추측**합니다. 엉성하죠.

백엔드가 이런 모양으로 응답하게 고쳐 보세요.

```json
{ "detail": { "field": "title", "message": "이미 같은 제목의 메모가 있습니다." } }
```

1. 백엔드: 같은 제목의 메모가 있으면 409(Conflict)로 거절
2. `lib/api.ts`: `detail` 이 객체면 `field` 와 `message` 를 담은 오류를 던짐
3. `NoteEditor`: 그 `field` 에 `setError`

> 이게 실무에서 쓰는 방식입니다. **추측하지 않고 서버가 알려 줍니다.**
>
> 커스텀 오류 클래스(`class FieldError extends Error`)를 하나 만들면 깔끔합니다.
> 06편의 `NotFoundError` 와 같은 방식입니다.

## 개념 먼저

### ★ 하이드레이션 — 이번 편의 진짜 주제

Next.js는 화면을 **두 번** 만듭니다.

```
  1) 서버에서 HTML 을 만들어 보냄        → 사용자가 화면을 빨리 봄
  2) 브라우저에서 React 가 다시 실행     → 버튼이 눌리기 시작함
       └── 이 과정을 하이드레이션이라고 합니다
```

물을 부어(hydrate) 마른 HTML을 살아 있게 만든다는 비유입니다.

**규칙 하나**: 두 결과가 **똑같아야** 합니다. 다르면 React가 경고합니다.

```
Hydration failed because the server rendered HTML didn't match the client
```

**언제 달라지나요?**

| 원인 | 예 |
|---|---|
| 시간 | `new Date().toLocaleString()` — 서버와 브라우저 시간대가 다름 |
| 무작위 | `Math.random()` |
| **브라우저에만 있는 정보** | `localStorage`, `window.innerWidth` |

**다크모드가 딱 세 번째 경우입니다.** 사용자가 고른 테마는 브라우저에 저장돼 있고,
서버는 그걸 **모릅니다.**

> 05편에서 날짜를 `toLocaleString()` 대신 문자열 자르기로 만든 것도 이 때문이었습니다.

## 따라 만들기

### 1단계. 설치

```powershell
cd D:\Work\클로드_정리\temp\practice
Copy-Item 10-form-validation 11-layout-darkmode -Recurse
cd 11-layout-darkmode\frontend

npm install next-themes
```

> **shadcn이 이미 준비해 놨습니다.** `app/globals.css` 를 열어 보면
> `.dark { ... }` 블록에 어두운 화면용 색이 전부 정의돼 있습니다.
> 우리가 할 일은 `<html>` 에 `class="dark"` 를 붙였다 뗐다 하는 것뿐입니다.

### 2단계. Provider 감싸기

`frontend/components/theme-provider.tsx`:

```tsx
// frontend/components/theme-provider.tsx
"use client";

import { ThemeProvider as NextThemesProvider } from "next-themes";

export function ThemeProvider({
  children,
  ...props
}: React.ComponentProps<typeof NextThemesProvider>) {
  return <NextThemesProvider {...props}>{children}</NextThemesProvider>;
}
```

**왜 한 겹 감싸나요?**

`layout.tsx` 는 서버 컴포넌트인데, Provider는 클라이언트에서 돌아야 합니다.
이렇게 얇은 껍데기를 만들어 두면 **`layout.tsx` 를 서버 컴포넌트로 유지**할 수 있습니다.
07편에서 `SiteNav` 를 뺐던 것과 똑같은 요령입니다.

> `React.ComponentProps<typeof NextThemesProvider>` 는
> "저 컴포넌트가 받는 props와 똑같이 받겠다"는 뜻입니다. 타입을 베껴 오는 문법입니다.

### 3단계. ★ 테마 전환 버튼

`frontend/components/theme-toggle.tsx`:

```tsx
// frontend/components/theme-toggle.tsx
"use client";

import { MoonIcon, SunIcon } from "lucide-react";
import { useTheme } from "next-themes";
import { useEffect, useState } from "react";

import { Button } from "@/components/ui/button";

export function ThemeToggle() {
  const { resolvedTheme, setTheme } = useTheme();

  const [mounted, setMounted] = useState(false);
  useEffect(() => setMounted(true), []);

  const isDark = resolvedTheme === "dark";

  return (
    <Button
      variant="ghost"
      size="icon-sm"
      aria-label={isDark ? "밝은 화면으로" : "어두운 화면으로"}
      onClick={() => setTheme(isDark ? "light" : "dark")}
    >
      {mounted ? isDark ? <SunIcon /> : <MoonIcon /> : null}
    </Button>
  );
}
```

**`mounted` 는 왜 필요한가요?** 이번 편의 핵심입니다.

```
서버:    지금 테마를 모름 → 달 아이콘 ☾ 을 그림
브라우저: localStorage 를 보니 dark → 해 아이콘 ☀ 을 그려야 함
                                    ↓
                            "서버랑 다른데?" 경고 💥
```

`useEffect` 는 **브라우저에서만** 실행됩니다. 서버에서는 안 돕니다.
그래서 `mounted` 는 서버에서 항상 `false` 이고, 브라우저에서만 `true` 가 됩니다.

```tsx
{mounted ? (아이콘) : null}
```

- **서버**: `mounted=false` → 빈 버튼
- **브라우저 첫 렌더**: `mounted=false` → 빈 버튼 ← **서버와 같음! 통과**
- 그 직후 `useEffect` 실행 → `mounted=true` → 아이콘 등장

**이 패턴은 다크모드 말고도 계속 씁니다.** "브라우저에만 있는 정보를 쓸 때"의 정석입니다.

#### `useEffect` 처음 만나기

```tsx
useEffect(() => setMounted(true), []);
```

> "화면이 그려진 **뒤에** 이걸 실행해라"

두 번째 인자 `[]` 는 **"처음 한 번만"** 이라는 뜻입니다.
(빈 배열 = 지켜볼 값이 없음 = 다시 실행할 일 없음)

`[]` 를 빠뜨리면 그릴 때마다 실행되고, `setMounted` 가 또 그리게 만들어 **무한 반복**이 됩니다.

### 4단계. layout에 붙이기

`frontend/app/layout.tsx`:

```tsx
// frontend/app/layout.tsx
import type { Metadata } from "next";
import { Geist, Geist_Mono } from "next/font/google";
import "./globals.css";

import { SiteNav } from "@/components/site-nav";
import { ThemeProvider } from "@/components/theme-provider";

const geistSans = Geist({ variable: "--font-geist-sans", subsets: ["latin"] });
const geistMono = Geist_Mono({ variable: "--font-geist-mono", subsets: ["latin"] });

export const metadata: Metadata = {
  title: "메모장",
  description: "FastAPI + Next.js 실습 교재 예제 11",
};

export default function RootLayout({
  children,
}: Readonly<{ children: React.ReactNode }>) {
  return (
    <html
      lang="ko"
      suppressHydrationWarning
      className={`${geistSans.variable} ${geistMono.variable} h-full antialiased`}
    >
      <body className="min-h-full flex flex-col">
        <ThemeProvider
          attribute="class"
          defaultTheme="system"
          enableSystem
          disableTransitionOnChange
        >
          <SiteNav />

          <div className="flex-1">{children}</div>

          <footer className="border-t py-6">
            <p className="mx-auto max-w-3xl px-6 text-xs text-muted-foreground">
              FastAPI + Next.js 실습 교재 · 예제 11
            </p>
          </footer>
        </ThemeProvider>
      </body>
    </html>
  );
}
```

#### `suppressHydrationWarning` — 여기만 예외

next-themes는 화면이 그려지기 **직전에** `<html>` 에 `class="dark"` 를 붙입니다.
(안 그러면 밝은 화면이 번쩍 보였다가 어두워지는 "깜빡임"이 생깁니다.)

그러면 서버가 보낸 `<html>` 과 달라지죠. 이 속성은 **"이 태그는 달라도 괜찮다"** 는 표시입니다.

> ⚠️ **아무 데나 붙이지 마세요.** 이 속성은 하이드레이션 문제를 **가리는** 것이지
> 고치는 게 아닙니다. `<html>` 태그처럼 이유가 명확할 때만 씁니다.

#### ThemeProvider 옵션

| 옵션 | 뜻 |
|---|---|
| `attribute="class"` | `<html class="dark">` 방식 (Tailwind가 이걸 봅니다) |
| `defaultTheme="system"` | 처음엔 **운영체제 설정**을 따름 |
| `enableSystem` | "시스템 설정 따르기"를 허용 |
| `disableTransitionOnChange` | 전환할 때 색이 스르륵 변하는 걸 막음 |

#### 푸터를 아래에 붙이는 법

```tsx
<body className="min-h-full flex flex-col">
  <SiteNav />
  <div className="flex-1">{children}</div>    {/* ← 남는 공간을 다 차지 */}
  <footer>...</footer>
</body>
```

**`flex-1` 이 핵심입니다.** 내용이 짧아도 가운데가 늘어나서 푸터를 아래로 밉니다.
이게 없으면 내용이 적을 때 푸터가 화면 중간에 붕 뜹니다.

### 5단계. 상단 바 고정 + 버튼 배치

`frontend/components/site-nav.tsx`:

```tsx
// frontend/components/site-nav.tsx
"use client";

import Link from "next/link";
import { usePathname } from "next/navigation";

import { ThemeToggle } from "@/components/theme-toggle";

const LINKS = [
  { href: "/notes", label: "목록" },
  { href: "/notes/new", label: "새 메모" },
];

export function SiteNav() {
  const pathname = usePathname();

  return (
    <header className="sticky top-0 z-10 border-b bg-background/80 backdrop-blur">
      <nav className="mx-auto flex max-w-3xl items-center gap-4 px-6 py-3 sm:gap-6">
        <Link href="/notes" className="font-semibold">
          메모장
        </Link>

        <div className="flex gap-4 text-sm">
          {LINKS.map((link) => {
            const active = pathname === link.href;

            return (
              <Link
                key={link.href}
                href={link.href}
                className={
                  active
                    ? "font-medium text-foreground"
                    : "text-muted-foreground hover:text-foreground"
                }
              >
                {link.label}
              </Link>
            );
          })}
        </div>

        <div className="ml-auto">
          <ThemeToggle />
        </div>
      </nav>
    </header>
  );
}
```

**새로 나온 Tailwind 클래스들:**

| 클래스 | 하는 일 |
|---|---|
| `sticky top-0` | 스크롤해도 맨 위에 붙어 있음 |
| `z-10` | 다른 것보다 **위에** 그림 (없으면 카드에 가려집니다) |
| `bg-background/80` | 배경색을 **80% 투명도**로 |
| `backdrop-blur` | 뒤에 있는 것을 흐리게 → 반투명 유리 느낌 |
| **`ml-auto`** | 남는 공간을 왼쪽에 몰아 **오른쪽 끝으로** 보냄 |

`ml-auto` 는 flex 레이아웃에서 "이것만 오른쪽 끝으로"를 만드는 관용구입니다.
`justify-between` 을 쓰면 다른 것들 간격까지 벌어져 버리죠.

## 실행 & 확인

- [ ] ☾ 를 누르면 **화면 전체**가 어두워진다 (카드, 입력칸, 버튼까지)
- [ ] 새로고침해도 **선택한 테마가 유지된다** (localStorage에 저장됨)
- [ ] 페이지를 이동해도 유지된다
- [ ] 스크롤해도 **상단 바가 따라온다**
- [ ] 메모가 하나도 없을 때도 **푸터가 화면 아래**에 있다
- [ ] **브라우저 콘솔(F12)에 하이드레이션 경고가 없다** ← 이게 제일 중요합니다
- [ ] 창을 좁혀도 상단 바가 안 깨진다

**★ 일부러 부숴 보기**: `theme-toggle.tsx` 의 `mounted` 검사를 지워 보세요.

```tsx
{isDark ? <SunIcon /> : <MoonIcon />}      {/* mounted 없이 */}
```

다크모드로 둔 채 새로고침하면 콘솔에 **하이드레이션 경고**가 뜹니다.
직접 보고 나면 이 패턴을 잊지 않게 됩니다.

## 흔한 에러

<details open>
<summary><b>1. 버튼을 눌러도 아무 일이 없다</b></summary>

- `ThemeProvider` 로 감쌌나요? `layout.tsx` 를 확인하세요.
- `attribute="class"` 인가요? 기본값은 `data-theme` 라서 Tailwind가 못 알아봅니다.
- `globals.css` 에 `.dark { ... }` 블록이 있나요? (shadcn init이 만들어 줍니다)
</details>

<details>
<summary><b>2. 콘솔에 <code>Hydration failed</code></b></summary>

- `<html>` 에 `suppressHydrationWarning` 을 붙였나요?
- 테마 토글에 `mounted` 검사를 넣었나요?
- 다른 곳에서 `new Date()` 나 `Math.random()` 을 쓰고 있진 않나요?
</details>

<details>
<summary><b>3. 밝은 화면이 번쩍하고 어두워진다</b></summary>

`ThemeProvider` 가 `layout.tsx` 가 아니라 페이지 안쪽에 있을 가능성이 큽니다.
**최상위 layout에** 있어야 합니다.
</details>

<details>
<summary><b>4. 상단 바가 카드에 가려진다</b></summary>

`z-10` 을 빠뜨렸습니다. `sticky` 만으로는 위에 그려지지 않습니다.
</details>

<details>
<summary><b>5. 다크모드에서 글씨가 안 보인다</b></summary>

`text-gray-900`, `bg-white` 처럼 **색을 직접 지정**했을 가능성이 큽니다.

shadcn이 준비한 이름을 쓰세요. 이것들은 테마에 따라 알아서 바뀝니다.

| 직접 지정 (❌) | 테마 대응 (✅) |
|---|---|
| `bg-white` | `bg-background` |
| `text-gray-900` | `text-foreground` |
| `text-gray-500` | `text-muted-foreground` |
| `border-gray-200` | `border-border` |
</details>

<details>
<summary><b>6. <code>Cannot find module 'lucide-react'</code></b></summary>

shadcn init이 보통 같이 깔아 줍니다. 없다면 `npm install lucide-react`.
</details>

## 스스로 해보기

### ★ 문제 1 — 3단계 토글

지금은 밝음 ↔ 어두움만 오갑니다. **시스템 설정**까지 세 단계로 돌리세요.

```
☀ 밝음  →  ☾ 어두움  →  🖥 시스템  →  ☀ ...
```

> 힌트: `useTheme()` 은 `theme`(고른 값)과 `resolvedTheme`(실제 적용된 값)을 둘 다 줍니다.
> `theme === "system"` 인지 봐야 합니다. `resolvedTheme` 은 절대 `"system"` 이 안 됩니다.

### ★★ 문제 2 — 좁은 화면 메뉴

창을 아주 좁히면 메뉴가 답답합니다. 640px 미만에서는 메뉴를 숨기고
**햄버거 버튼(☰)** 으로 열게 하세요.

> 힌트: `hidden sm:flex` 로 좁은 화면에서 숨기고, `sm:hidden` 인 버튼을 따로 둡니다.

## 개념 먼저

### 데이터베이스와 이야기하는 두 가지 방법

```python
# 1) SQL 을 직접 씁니다
cursor.execute("SELECT * FROM notes WHERE id = ?", (note_id,))
row = cursor.fetchone()
title = row[1]        # 1번 칸이 title... 이었나?

# 2) ORM 을 씁니다
note = db.get(Note, note_id)
title = note.title    # 이름으로 꺼냅니다
```

**ORM**(Object-Relational Mapping)은 **테이블의 한 줄을 파이썬 객체로** 바꿔 줍니다.

| | SQL 직접 | ORM |
|---|---|---|
| 오타 | 실행해 봐야 앎 | **편집기가 잡아 줌** |
| 자동완성 | 없음 | `note.` 만 쳐도 나옴 |
| DB 바꾸기 | SQL을 다 고쳐야 | **연결 주소만 바꿈** ← 13편 |
| 복잡한 조회 | 자유로움 | 가끔 답답함 |

마지막 줄이 중요합니다. **ORM이 만능은 아닙니다.** 아주 복잡한 통계 쿼리는
SQL을 직접 쓰는 게 낫고, SQLAlchemy도 그걸 허용합니다.

### 세션 — "대화 한 판"

```
요청 도착 ─→ 세션 열기 ─→ 조회/수정 ─→ commit() ─→ 세션 닫기 ─→ 응답
```

세션은 **작업 목록을 모아 뒀다가 한 번에 처리**합니다.

```python
db.add(note1)
db.add(note2)
db.commit()      # ← 여기서 둘 다 저장됩니다
```

**`commit()` 전에는 아직 저장 안 된 것입니다.** 중간에 오류가 나면 둘 다 취소됩니다.
(이걸 **트랜잭션**이라고 합니다. "다 되거나, 다 안 되거나".)

### 파일 세 개로 나눕니다

```
backend/
├─ database.py    연결 · 세션 (한 번 쓰고 거의 안 고침)
├─ models.py      테이블 생김새      ← DB 쪽
├─ schemas.py     주고받는 모양      ← 바깥 쪽
└─ routers/notes.py
```

**`models.py` 와 `schemas.py` 가 비슷해 보여서 헷갈립니다.** 이렇게 기억하세요:

| | models.py (SQLAlchemy) | schemas.py (Pydantic) |
|---|---|---|
| 질문 | "어떻게 **저장**되는가" | "어떻게 **주고받는가**" |
| 예 | `String(100)`, `index=True` | `min_length=1` |
| 비밀번호 | 저장함 (해시) | **응답에 안 넣음** ← 17편 |

**나누는 진짜 이유**: 저장하는 것과 내보내는 것이 **같으면 안 되기 때문**입니다.

## 따라 만들기

### 1단계. 준비

> SQLite는 **설치할 게 없습니다.** 파이썬에 이미 들어 있고, 파일 하나가 곧 데이터베이스입니다.
> 13편에서 PostgreSQL로 옮깁니다.

### 2단계. `database.py`

```python
# backend/database.py
from sqlalchemy import create_engine
from sqlalchemy.orm import DeclarativeBase, sessionmaker

DATABASE_URL = "sqlite:///./notes.db"

engine = create_engine(
    DATABASE_URL,
    connect_args={"check_same_thread": False},
)

SessionLocal = sessionmaker(bind=engine, autoflush=False, autocommit=False)


class Base(DeclarativeBase):
    pass


def get_db():
    db = SessionLocal()
    try:
        yield db
    finally:
        db.close()
```

**세 가지를 짚습니다.**

#### `check_same_thread: False`

SQLite는 기본적으로 "연결을 만든 스레드에서만 써라"라고 막습니다.
FastAPI는 여러 스레드를 쓰므로 그 검사를 끕니다.
**SQLite 전용**이라 13편에서 사라집니다.

#### ★ `get_db` 의 `yield`

```python
def get_db():
    db = SessionLocal()
    try:
        yield db          # ← 요청 처리 중에는 여기서 멈춰 있습니다
    finally:
        db.close()        # ← 응답이 끝난 뒤 실행됩니다
```

`return` 이 아니라 `yield` 입니다.

```
요청 시작 → SessionLocal() 실행 → yield 로 세션을 넘겨줌
                                      ↓
                             (라우터 함수가 db 를 씀)
                                      ↓
응답 완료 → yield 아래로 돌아와 close()
```

`finally` 에 넣었으니 **오류가 나도 반드시 닫힙니다.** 안 닫으면 연결이 쌓여 서버가 죽습니다.

#### `autocommit=False`

"내가 `commit()` 을 부를 때만 저장해라"입니다. **기본값이자 안전한 설정**입니다.

### 3단계. `models.py` — 테이블 정의

```python
# backend/models.py
from datetime import datetime

from sqlalchemy import DateTime, Integer, String, Text, func
from sqlalchemy.orm import Mapped, mapped_column

from database import Base


class Note(Base):
    __tablename__ = "notes"

    id: Mapped[int] = mapped_column(Integer, primary_key=True)
    title: Mapped[str] = mapped_column(String(100), nullable=False, index=True)
    content: Mapped[str] = mapped_column(Text, nullable=False, default="")
    created_at: Mapped[datetime] = mapped_column(
        DateTime, nullable=False, server_default=func.now()
    )
```

이 클래스가 곧 이 SQL입니다:

```sql
CREATE TABLE notes (
  id INTEGER PRIMARY KEY,
  title VARCHAR(100) NOT NULL,
  content TEXT NOT NULL,
  created_at DATETIME NOT NULL DEFAULT (CURRENT_TIMESTAMP)
);
CREATE INDEX ix_notes_title ON notes (title);
```

| 표기 | 뜻 |
|---|---|
| `Mapped[int]` | **파이썬** 쪽 타입 |
| `mapped_column(Integer, ...)` | **데이터베이스** 쪽 타입과 옵션 |
| `primary_key=True` | 이 칸이 식별자. **id를 자동으로 매겨 줍니다** |
| `nullable=False` | 비어 있으면 안 됨 |
| `index=True` | 이 칸으로 검색을 자주 함 (15편에서 씁니다) |
| `server_default=func.now()` | **데이터베이스가** 지금 시각을 넣음 |

> **`default` 와 `server_default` 의 차이**
> `default=` 는 파이썬이 값을 계산해 보냅니다.
> `server_default=` 는 **데이터베이스가** 넣습니다.
> 시각은 후자가 낫습니다. 서버가 여러 대여도 **DB 시계 하나만** 보니까요.
>
> 05편에서는 `datetime.now()` 를 파이썬에서 넣었죠. 그건 서버 시계에 의존합니다.

### 4단계. `schemas.py` — 주고받는 모양

```python
# backend/schemas.py
from datetime import datetime

from pydantic import BaseModel, ConfigDict, Field


class NoteCreate(BaseModel):
    title: str = Field(..., min_length=1, max_length=100)
    content: str = Field(default="", max_length=2000)


class NoteUpdate(BaseModel):
    title: str | None = Field(default=None, min_length=1, max_length=100)
    content: str | None = Field(default=None, max_length=2000)


class NoteRead(BaseModel):
    model_config = ConfigDict(from_attributes=True)

    id: int
    title: str
    content: str
    created_at: datetime
```

#### ★ `from_attributes=True` — 이거 빠뜨리면 반드시 막힙니다

Pydantic은 원래 **dict** 를 받습니다.

```python
NoteRead(**{"id": 1, "title": "..."})     # 이런 걸 기대함
```

그런데 우리가 넘길 것은 **SQLAlchemy 객체**입니다. `note["title"]` 이 아니라 `note.title` 이죠.

```python
model_config = ConfigDict(from_attributes=True)
```

이 한 줄이 **"점으로 꺼내서 읽어라"** 라고 알려 줍니다.

> 옛날 자료에는 `class Config: orm_mode = True` 라고 나옵니다.
> **Pydantic v1 방식**입니다. 지금은 위 방식을 씁니다.

### 5단계. 라우터를 DB용으로

```python
# backend/routers/notes.py
import time

from fastapi import APIRouter, Depends, HTTPException
from sqlalchemy import select
from sqlalchemy.orm import Session

import models
import schemas
from database import get_db

router = APIRouter(prefix="/notes", tags=["메모"])


def find_note(db: Session, note_id: int) -> models.Note:
    note = db.get(models.Note, note_id)
    if note is None:
        raise HTTPException(status_code=404, detail=f"{note_id}번 메모가 없습니다.")
    return note


@router.get("", response_model=list[schemas.NoteRead])
def list_notes(
    delay: float = 0,
    fail: bool = False,
    db: Session = Depends(get_db),
):
    if delay > 0:
        time.sleep(min(delay, 5))
    if fail:
        raise HTTPException(status_code=500, detail="일부러 낸 서버 오류입니다.")

    stmt = select(models.Note).order_by(models.Note.id.desc())
    return db.scalars(stmt).all()


@router.get("/{note_id}", response_model=schemas.NoteRead)
def get_note(note_id: int, delay: float = 0, db: Session = Depends(get_db)):
    if delay > 0:
        time.sleep(min(delay, 5))
    return find_note(db, note_id)


@router.post("", response_model=schemas.NoteRead, status_code=201)
def create_note(payload: schemas.NoteCreate, db: Session = Depends(get_db)):
    note = models.Note(title=payload.title, content=payload.content)

    db.add(note)
    db.commit()
    db.refresh(note)

    return note


@router.patch("/{note_id}", response_model=schemas.NoteRead)
def update_note(
    note_id: int, payload: schemas.NoteUpdate, db: Session = Depends(get_db)
):
    note = find_note(db, note_id)

    changes = payload.model_dump(exclude_unset=True)
    for key, value in changes.items():
        setattr(note, key, value)

    db.commit()
    db.refresh(note)

    return note


@router.delete("/{note_id}", status_code=204)
def delete_note(note_id: int, db: Session = Depends(get_db)):
    note = find_note(db, note_id)

    db.delete(note)
    db.commit()
```

#### `Depends(get_db)` — 의존성 주입

```python
def list_notes(db: Session = Depends(get_db)):
```

> "이 함수를 실행해서, 그 결과를 `db` 에 넣어 줘"

FastAPI가 **요청마다** `get_db()` 를 실행하고, 응답이 끝나면 `finally` 를 실행합니다.
우리는 세션을 열거나 닫는 코드를 **한 줄도 안 씁니다.**

> 이 방식을 **의존성 주입**이라고 합니다. 17편에서 "로그인한 사용자 가져오기"에
> 똑같은 방식을 씁니다. **FastAPI의 핵심 기능**입니다.

#### 세 줄 세트: `add` → `commit` → `refresh`

```python
note = models.Note(title=..., content=...)   # 1. 파이썬 객체
db.add(note)                                 # 2. 세션에 올림 (아직 저장 아님)
db.commit()                                  # 3. INSERT 실행
db.refresh(note)                             # 4. DB가 채운 값 읽어오기
```

**★ `refresh()` 를 빠뜨리면** `note.id` 와 `note.created_at` 이 **비어 있습니다.**
그 값들은 데이터베이스가 채우는 것이라, 다시 읽어와야 알 수 있으니까요.

응답에 `"id": null` 이 나오면 십중팔구 이것입니다.

#### 수정은 UPDATE를 안 씁니다

```python
note.title = "새 제목"
db.commit()          # ← 이것만으로 UPDATE 가 나갑니다
```

세션이 **객체가 바뀐 걸 알아채고** UPDATE 문을 만들어 줍니다. (더티 트래킹)

#### `select()` 문법

```python
stmt = select(models.Note).order_by(models.Note.id.desc())
return db.scalars(stmt).all()
```

| 부분 | SQL |
|---|---|
| `select(models.Note)` | `SELECT * FROM notes` |
| `.order_by(...id.desc())` | `ORDER BY id DESC` |
| `db.scalars(stmt)` | 행이 아니라 **Note 객체**로 꺼냄 |
| `.all()` | 전부 리스트로 |

> 옛날 자료의 `db.query(Note).all()` 은 **SQLAlchemy 1.x 방식**입니다.
> 지금도 되지만, 2.0에서는 `select()` 를 권합니다.

### 6단계. `main.py` — 테이블 만들기

```python
# backend/main.py
from fastapi import FastAPI
from fastapi.middleware.cors import CORSMiddleware

import models  # noqa: F401
from database import Base, engine
from routers import notes

app = FastAPI(title="메모장 API")

Base.metadata.create_all(bind=engine)

origins = ["http://localhost:3000", "http://127.0.0.1:3000"]

app.add_middleware(
    CORSMiddleware,
    allow_origins=origins,
    allow_credentials=True,
    allow_methods=["*"],
    allow_headers=["*"],
)

app.include_router(notes.router)


@app.get("/health")
def health():
    return {"status": "ok"}
```

**`import models` 가 왜 필요한가요?**

`create_all` 은 "Base를 상속한 클래스들"의 테이블을 만듭니다.
그런데 `models.py` 를 **한 번도 import 안 하면** 파이썬이 그 파일을 읽지도 않아서
`Note` 클래스의 존재를 모릅니다.

`# noqa: F401` 은 "안 쓰는 import처럼 보여도 지우지 마"라는 표시입니다.

> **`create_all` 의 한계**: 이미 있는 테이블은 **건드리지 않습니다.**
> 나중에 `models.py` 에 칸을 하나 추가해도 **반영이 안 됩니다.**
> 그래서 13편에서 Alembic으로 넘어갑니다.

- 또는 `main.py` 에서 **`import models` 를 빠뜨렸습니다** (제일 흔합니다)
- `notes.db` 를 지우고 서버를 다시 켜 보세요
</details>

<details>
<summary><b>2. 응답에 <code>"id": null</code> 이 나온다</b></summary>

`db.refresh(note)` 를 빠뜨렸습니다.
`id` 와 `created_at` 은 **데이터베이스가 채우는 값**이라 다시 읽어와야 합니다.
</details>

<details>
<summary><b>3. <code>Unable to serialize unknown type: &lt;class 'models.Note'&gt;</code></b></summary>

`NoteRead` 에 **`model_config = ConfigDict(from_attributes=True)`** 를 빠뜨렸습니다.
</details>

<details>
<summary><b>4. 저장했는데 다시 조회하면 없다</b></summary>

**`db.commit()` 을 빠뜨렸습니다.** `add()` 만으로는 저장되지 않습니다.
</details>

<details>
<summary><b>5. <code>ImportError: cannot import name 'Base' from partially initialized module</code></b></summary>

**순환 import** 입니다. `database.py` 가 `models.py` 를 import하면 안 됩니다.
화살표는 한 방향이어야 합니다:

```
database.py  ←  models.py  ←  routers/notes.py
```
</details>

<details>
<summary><b>6. <code>ModuleNotFoundError: No module named 'database'</code></b></summary>

`backend` 폴더가 아닌 곳에서 서버를 켰습니다.
`main.py` 가 있는 폴더에서 `fastapi dev main.py` 를 실행하세요.
</details>

<details>
<summary><b>7. 칸을 추가했는데 반영이 안 된다</b></summary>

**`create_all` 은 이미 있는 테이블을 안 고칩니다.**

지금은 `notes.db` 를 지우고 다시 켜면 됩니다 (데이터는 날아갑니다).
제대로 된 해결책이 **13편의 Alembic** 입니다.
</details>

### ★ 문제 1 — 완료 표시

`done` 칸을 추가하세요.

1. `models.py`: `done: Mapped[bool] = mapped_column(Boolean, nullable=False, default=False)`
2. `schemas.py`: `NoteRead`, `NoteCreate`, `NoteUpdate` 에 각각 추가
3. **`notes.db` 를 지우고** 서버 재시작 ← `create_all` 의 한계를 직접 겪어 보세요
4. 프론트에서 체크박스로 토글

> `from sqlalchemy import Boolean` 을 import해야 합니다.

### ★★ 문제 2 — 제목으로 검색

`GET /notes?q=장보기` 를 만드세요.

```python
@router.get("", response_model=list[schemas.NoteRead])
def list_notes(q: str | None = None, db: Session = Depends(get_db)):
    stmt = select(models.Note).order_by(models.Note.id.desc())

    if q:
        # ilike = 대소문자 무시 LIKE, % 는 "아무거나"
        stmt = stmt.where(models.Note.title.ilike(f"%{q}%"))

    return db.scalars(stmt).all()
```

> **`stmt` 를 조건에 따라 쌓아 나가는 방식**에 주목하세요.
> 15편에서 이 방식으로 검색·정렬·페이지네이션을 전부 만듭니다.
>
> 내용에서도 찾으려면? `from sqlalchemy import or_` 를 쓰면 됩니다.

### ★★★ 문제 3 — 트랜잭션 직접 겪어 보기

`create_note` 의 `db.commit()` **바로 앞에** 일부러 오류를 내 보세요.

```python
db.add(note)
raise Exception("일부러 낸 오류")
db.commit()
```

메모를 만들어 보고, 서버를 재시작한 뒤 목록을 확인하세요. **없습니다.**

이제 `commit()` **뒤로** 옮겨 보세요.

```python
db.add(note)
db.commit()
raise Exception("일부러 낸 오류")
```

이번엔 **남아 있습니다.**

> `commit()` 이 경계선입니다. 그 전까지는 없던 일이 되고, 넘어가면 확정됩니다.
>
> 그럼 이런 경우는 어떨까요?
> ```python
> db.add(note1)
> db.commit()
> db.add(note2)
> raise Exception()   # note1 은? note2 는?
> ```
> 직접 해 보고 답을 확인하세요. **`commit()` 을 어디에 둘지가 곧 설계**입니다.

## 개념 먼저

### 왜 SQLite를 벗어나나

SQLite는 훌륭합니다. 혼자 개발할 땐 **가장 좋은 선택**입니다.
하지만 한계가 있습니다.

| | SQLite | PostgreSQL |
|---|---|---|
| 형태 | **파일 하나** | 별도 서버 |
| 설치 | 필요 없음 | 필요 (그래서 Docker) |
| 동시 쓰기 | **한 번에 하나** | 여러 개 동시에 |
| 서버 여러 대 | ❌ 파일을 공유 못 함 | ✅ |
| 배포 서비스 지원 | 드묾 | **거의 전부** (20편) |

**"동시 쓰기"가 결정적입니다.** 사용자가 여럿이면 SQLite는 서로 기다리게 됩니다.

### 왜 Docker인가

PostgreSQL을 컴퓨터에 직접 설치할 수도 있습니다. 그런데:

- 설치 과정이 길고, 나중에 지우기 번거롭습니다
- 팀원마다 버전이 다르면 "제 컴퓨터에선 되는데요"가 시작됩니다
- 프로젝트마다 다른 버전이 필요할 수 있습니다

**Docker는 "프로그램을 통째로 담은 상자"입니다.**

```
docker compose up -d      →  PostgreSQL 17 이 뜬다
docker compose down       →  깨끗이 사라진다
```

내 컴퓨터는 더러워지지 않고, 팀원과 **똑같은 버전**을 씁니다.

### ★ `create_all` 의 한계 — 마이그레이션이 필요한 이유

12편에서 이렇게 했습니다.

```python
Base.metadata.create_all(bind=engine)
```

이건 **"없으면 만든다"** 만 합니다. 이미 있는 테이블은 **건드리지 않습니다.**

```
  models.py 에 done 칸 추가
        ↓
  서버 재시작
        ↓
  create_all 실행 → "notes 테이블 있네, 넘어감"
        ↓
  done 칸이 없어서 오류 💥
```

개발 중엔 DB 파일을 지우면 됩니다. 그런데 **운영 중이라면?**
사용자 데이터를 지울 수는 없죠.

**마이그레이션**은 "이 시점에 이 변경을 적용했다"는 **기록을 쌓아 가는 방식**입니다.

```
  0001_create_notes     테이블 만들기
  0002_add_done         done 칸 추가        ← 데이터는 그대로 두고 칸만 추가
  0003_add_user_table   사용자 테이블 추가
```

깃(git) 커밋과 같은 개념입니다. **테이블 구조의 버전 관리**입니다.
